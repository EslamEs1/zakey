<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Hotel Operator Partner Icon">
  <rect width="100" height="100" rx="12" fill="#0c1628"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <!-- Bed icon -->
  <!-- Bed frame -->
  <rect x="20" y="50" width="60" height="28" rx="3" fill="none" stroke="white" stroke-width="1.8" opacity="0.8"/>
  <!-- Headboard -->
  <rect x="20" y="42" width="10" height="36" rx="3" fill="none" stroke="white" stroke-width="1.8" opacity="0.8"/>
  <!-- Pillow -->
  <rect x="34" y="44" width="20" height="10" rx="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
  <rect x="58" y="44" width="18" height="10" rx="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
  <!-- Mattress/blanket line -->
  <line x1="30" y1="58" x2="78" y2="58" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Legs -->
  <line x1="25" y1="78" x2="25" y2="84" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="75" y1="78" x2="75" y2="84" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Cyan star/service indicator -->
