<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Zakey Smart Apartment Package">
  <defs>
    <linearGradient id="sa-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060b14"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sa-bg)"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Title bar -->
  <text x="40" y="36" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.9)">Smart Apartment Package</text>
  <text x="40" y="54" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.5)" letter-spacing="2">CROSS-SECTION VIEW · 4 UNITS</text>

  <!-- Apartment block cross-section: 2x2 grid of units -->
  <!-- Building outer shell -->
  <rect x="80" y="80" width="640" height="350" rx="4" fill="#071220" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Floor divider -->
  <line x1="80" y1="255" x2="720" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Unit divider -->
  <line x1="400" y1="80" x2="400" y2="430" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>

  <!-- Unit 1: Top-Left "Morning Scene" -->
  <rect x="84" y="84" width="312" height="167" rx="2" fill="#091628"/>
  <!-- Furniture schematic -->
  <!-- Sofa area -->
  <rect x="100" y="140" width="80" height="40" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <!-- TV -->
  <rect x="200" y="148" width="60" height="30" rx="2" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <!-- Bed -->
  <rect x="300" y="140" width="80" height="60" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <!-- Lighting spots -->
  <circle cx="130" cy="100" r="4" fill="#22d3ee" opacity="0.7"/>
  <circle cx="220" cy="100" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="340" cy="100" r="4" fill="#22d3ee" opacity="0.6"/>
  <!-- Scene label -->
  <rect x="90" y="88" width="100" height="18" rx="4" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="140" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#22d3ee">Morning Scene</text>
  <text x="380" y="238" text-anchor="end" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">Unit 101</text>

  <!-- Unit 2: Top-Right "Away Scene" -->
  <rect x="404" y="84" width="312" height="167" rx="2" fill="#060e1c"/>
  <!-- Minimal activity - dimmer -->
  <circle cx="450" cy="100" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="540" cy="100" r="4" fill="rgba(255,255,255,0.08)"/>
  <circle cx="680" cy="100" r="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="410" y="88" width="80" height="18" rx="4" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="0.8"/>
  <text x="450" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.5)">Away Scene</text>
  <!-- Security camera indicator -->
  <rect x="420" y="115" width="14" height="10" rx="2" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <polygon points="434,116 440,113 440,125 434,124" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <text x="450" y="132" font-family="system-ui, sans-serif" font-size="6.5" fill="rgba(34,211,238,0.4)">Security · Active</text>
  <text x="716" y="238" text-anchor="end" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">Unit 102</text>

  <!-- Unit 3: Bottom-Left "Good Night Scene" -->
  <rect x="84" y="259" width="312" height="167" rx="2" fill="#07101e"/>
  <!-- Very dark/sleep lights -->
  <circle cx="130" cy="278" r="4" fill="rgba(34,211,238,0.2)"/>
  <circle cx="220" cy="278" r="4" fill="rgba(34,211,238,0.15)"/>
  <circle cx="340" cy="278" r="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="90" y="264" width="100" height="18" rx="4" fill="#0a1a30" stroke="rgba(34,211,238,0.2)" stroke-width="0.8"/>
  <text x="140" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(34,211,238,0.55)">Good Night</text>
  <!-- Bed with person sleeping -->
  <rect x="100" y="320" width="120" height="60" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
  <ellipse cx="200" cy="340" rx="18" ry="12" fill="rgba(255,255,255,0.04)"/>
  <text x="380" y="418" text-anchor="end" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">Unit 201</text>

  <!-- Unit 4: Bottom-Right "Guest Scene" -->
  <rect x="404" y="259" width="312" height="167" rx="2" fill="#091628"/>
  <circle cx="450" cy="278" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="540" cy="278" r="4" fill="#22d3ee" opacity="0.7"/>
  <circle cx="640" cy="278" r="4" fill="#22d3ee" opacity="0.5"/>
  <rect x="410" y="264" width="80" height="18" rx="4" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="450" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#22d3ee">Guest Scene</text>
  <!-- Living setup -->
  <rect x="420" y="316" width="60" height="36" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
  <rect x="500" y="316" width="80" height="36" rx="3" fill="rgba(34,211,238,0.05)" stroke="rgba(34,211,238,0.2)" stroke-width="0.8"/>
  <text x="716" y="418" text-anchor="end" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">Unit 202</text>

  <!-- Building roof / top ledge -->
  <rect x="80" y="74" width="640" height="10" rx="2" fill="#0a1a30" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Floor numbers on side -->
  <text x="66" y="178" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">2F</text>
  <text x="66" y="345" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">1F</text>

  <!-- Status bar at bottom -->
  <rect x="80" y="436" width="640" height="30" rx="4" fill="#071220" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <text x="100" y="455" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">4 Units · Centrally Managed</text>
  <text x="700" y="455" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Zakey Hub · Online</text>

  <text x="400" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.25)" letter-spacing="2">ZAKEY MULTI-UNIT APARTMENT SOLUTION</text>
</svg>