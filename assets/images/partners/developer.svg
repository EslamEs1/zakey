<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Real Estate Developer Partner Icon">
  <rect width="100" height="100" rx="12" fill="#0c1628"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <!-- Building with floors icon -->
  <!-- Main building -->
  <rect x="30" y="32" width="40" height="46" rx="2" fill="none" stroke="white" stroke-width="1.8" opacity="0.8"/>
  <!-- Floor lines -->
  <line x1="30" y1="46" x2="70" y2="46" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="30" y1="60" x2="70" y2="60" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="30" y1="74" x2="70" y2="74" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <!-- Window lights - cyan for "smart" floors -->
  <rect x="35" y="35" width="7" height="7" rx="1" fill="#22d3ee" opacity="0.7"/>
  <rect x="46" y="35" width="7" height="7" rx="1" fill="#22d3ee" opacity="0.5"/>
  <rect x="57" y="35" width="7" height="7" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="35" y="49" width="7" height="7" rx="1" fill="#22d3ee" opacity="0.6"/>
  <rect x="46" y="49" width="7" height="7" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="57" y="49" width="7" height="7" rx="1" fill="#22d3ee" opacity="0.4"/>
  <rect x="35" y="63" width="7" height="7" rx="1" fill="rgba(255,255,255,0.12)"/>
  <rect x="46" y="63" width="7" height="7" rx="1" fill="#22d3ee" opacity="0.3"/>
  <rect x="57" y="63" width="7" height="7" rx="1" fill="rgba(255,255,255,0.12)"/>
  <!-- Door -->
  <rect x="44" y="68" width="12" height="10" rx="1" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
  <!-- Cyan accent dot at top -->
  <circle cx="50" cy="28" r="3" fill="#22d3ee" opacity="0.6"/>
