<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0f17"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#c9a45c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c9a45c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative grid lines (subtle) -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#22d3ee" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#22d3ee" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Decorative concentric rings (top-right corner) -->
  <circle cx="1080" cy="80" r="120" fill="none" stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="1080" cy="80" r="200" fill="none" stroke="#22d3ee" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="1080" cy="80" r="290" fill="none" stroke="#22d3ee" stroke-opacity="0.025" stroke-width="1"/>

  <!-- Small accent dots (ecosystem nodes) -->
  <circle cx="820" cy="210" r="4" fill="#22d3ee" fill-opacity="0.35"/>
  <circle cx="900" cy="170" r="3" fill="#22d3ee" fill-opacity="0.25"/>
  <circle cx="960" cy="240" r="3" fill="#22d3ee" fill-opacity="0.20"/>
  <circle cx="840" cy="290" r="2.5" fill="#c9a45c" fill-opacity="0.30"/>

  <!-- Connecting lines between nodes -->
  <line x1="820" y1="210" x2="900" y2="170" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="0.75"/>
  <line x1="900" y1="170" x2="960" y2="240" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="0.75"/>
  <line x1="820" y1="210" x2="840" y2="290" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="0.75"/>
  <line x1="960" y1="240" x2="840" y2="290" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="0.75"/>

  <!-- Brand wordmark "ZAKEY" -->
  <text
    x="100" y="268"
    font-family="Manrope, Inter, system-ui, sans-serif"
    font-size="92" font-weight="800"
    fill="#f5f7fb"
    letter-spacing="-2">ZAKEY</text>

  <!-- Accent underline beneath wordmark -->
  <rect x="100" y="285" width="220" height="3" rx="1.5" fill="#22d3ee" fill-opacity="0.90"/>

  <!-- Tagline -->
  <text
    x="100" y="340"
    font-family="Inter, system-ui, sans-serif"
    font-size="22" font-weight="400"
    fill="#9aa3b2"
    letter-spacing="0.5">Premium Smart Home &amp; AIoT Ecosystem</text>

  <!-- Feature pills -->
  <rect x="100" y="390" width="130" height="32" rx="16" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <text x="165" y="411" font-family="Inter,sans-serif" font-size="13" fill="#22d3ee" fill-opacity="0.85" text-anchor="middle">Smart Home</text>

  <rect x="244" y="390" width="110" height="32" rx="16" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <text x="299" y="411" font-family="Inter,sans-serif" font-size="13" fill="#22d3ee" fill-opacity="0.85" text-anchor="middle">Security</text>

  <rect x="368" y="390" width="120" height="32" rx="16" fill="#22d3ee" fill-opacity="0.10" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <text x="428" y="411" font-family="Inter,sans-serif" font-size="13" fill="#22d3ee" fill-opacity="0.85" text-anchor="middle">Automation</text>

  <rect x="502" y="390" width="90" height="32" rx="16" fill="#c9a45c" fill-opacity="0.10" stroke="#c9a45c" stroke-opacity="0.30" stroke-width="1"/>
  <text x="547" y="411" font-family="Inter,sans-serif" font-size="13" fill="#c9a45c" fill-opacity="0.85" text-anchor="middle">Luxury</text>

  <!-- Domain label -->
  <text
    x="100" y="570"
    font-family="Inter, system-ui, sans-serif"
    font-size="16" font-weight="400"
    fill="#9aa3b2" fill-opacity="0.60"
    letter-spacing="0.5">zakey.example</text>
</svg>
