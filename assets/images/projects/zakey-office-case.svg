      <stop offset="60%" stop-color="#fff0cc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffdd88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pendantGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5cc" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#ffdd77" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffaa33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanPanel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="officeClip">
      <rect x="430" y="0" width="170" height="338"/>
