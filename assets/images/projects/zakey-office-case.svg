<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338">
  <defs>
    <linearGradient id="concreteCeilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b5b0"/>
      <stop offset="100%" stop-color="#a8a5a0"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0cec9"/>
      <stop offset="100%" stop-color="#bcb9b4"/>
