<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#05070d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#080c14;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="starField" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2035;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2540;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="340" cy="45" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="580" cy="120" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="820" cy="60" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="1060" cy="90" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="1280" cy="35" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="1480" cy="110" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="200" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="450" cy="160" r="1.5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="720" cy="180" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="960" cy="140" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="1180" cy="210" r="1" fill="#00d4ff" opacity="0.4"/>
  <circle cx="1380" cy="170" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="80" cy="300" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="1520" cy="280" r="1" fill="#ffffff" opacity="0.4"/>

  <!-- Title text -->
  <text x="800" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="6" fill="#c0c0c0" text-anchor="middle" opacity="0.9">ZAKEY SMART LIVING PROJECTS</text>
  <line x1="600" y1="82" x2="1000" y2="82" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Network ground line -->
  <line x1="100" y1="700" x2="1500" y2="700" stroke="url(#cyanGlow)" stroke-width="1.5" opacity="0.5"/>

  <!-- Network connection lines between buildings -->
  <line x1="420" y1="650" x2="760" y2="700" stroke="#00d4ff" stroke-width="1" opacity="0.4" stroke-dasharray="8,4"/>
  <line x1="760" y1="700" x2="1180" y2="640" stroke="#00d4ff" stroke-width="1" opacity="0.4" stroke-dasharray="8,4"/>

  <!-- Network nodes -->
  <circle cx="420" cy="650" r="5" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="760" cy="700" r="6" fill="#00d4ff" filter="url(#glow)" opacity="1"/>
  <circle cx="1180" cy="640" r="5" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="700" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="1500" cy="700" r="3" fill="#00d4ff" opacity="0.5"/>

  <!-- LEFT: Luxury Villa -->
  <!-- Villa roof -->
  <polygon points="180,500 420,380 660,500" fill="#0f1a2e" stroke="#1e3050" stroke-width="1"/>
  <polygon points="220,500 420,400 620,500" fill="#121d30"/>
  <!-- Villa body -->
  <rect x="220" y="500" width="400" height="180" fill="#0d1828" stroke="#1e3050" stroke-width="1"/>
  <!-- Villa windows with warm light -->
  <rect x="260" y="530" width="70" height="80" fill="#f59e0b" opacity="0.25" rx="2"/>
  <rect x="260" y="530" width="70" height="80" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="2" opacity="0.6"/>
  <rect x="360" y="530" width="70" height="80" fill="#f59e0b" opacity="0.2" rx="2"/>
  <rect x="360" y="530" width="70" height="80" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="2" opacity="0.5"/>
  <!-- Cyan smart panel window -->
  <rect x="480" y="530" width="70" height="80" fill="#00d4ff" opacity="0.15" rx="2"/>
  <rect x="480" y="530" width="70" height="80" fill="none" stroke="#00d4ff" stroke-width="2" rx="2" opacity="0.8" filter="url(#glow)"/>
  <!-- Smart panel detail -->
  <rect x="492" y="545" width="46" height="30" fill="#00d4ff" opacity="0.2" rx="1"/>
  <line x1="492" y1="580" x2="538" y2="580" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="492" y1="588" x2="528" y2="588" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- Villa door -->
  <rect x="370" y="610" width="60" height="70" fill="#0a1020" stroke="#1e3050" stroke-width="1" rx="2"/>
  <!-- Villa label -->
  <text x="420" y="760" font-family="Arial, sans-serif" font-size="16" fill="#c0c0c0" text-anchor="middle" opacity="0.8">Luxury Smart Villa</text>
  <line x1="360" y1="768" x2="480" y2="768" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- Villa perimeter cyan glow -->
  <rect x="215" y="495" width="410" height="190" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2" rx="1"/>

  <!-- CENTER: Hotel Tower -->
  <!-- Tower body -->
  <rect x="640" y="280" width="240" height="420" fill="#0d1828" stroke="#1e3050" stroke-width="1"/>
  <!-- Tower top spire -->
  <polygon points="720,280 760,200 800,280" fill="#0f1a2e" stroke="#1e3050" stroke-width="1"/>
  <!-- Tower spire glow -->
  <circle cx="760" cy="205" r="8" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <!-- Hotel floors and windows -->
  <rect x="660" y="300" width="40" height="25" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="720" y="300" width="40" height="25" fill="#00d4ff" opacity="0.15" rx="1"/>
  <rect x="780" y="300" width="40" height="25" fill="#f59e0b" opacity="0.25" rx="1"/>
  <rect x="660" y="345" width="40" height="25" fill="#f59e0b" opacity="0.15" rx="1"/>
  <rect x="720" y="345" width="40" height="25" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="780" y="345" width="40" height="25" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="660" y="390" width="40" height="25" fill="#00d4ff" opacity="0.15" rx="1"/>
  <rect x="720" y="390" width="40" height="25" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="780" y="390" width="40" height="25" fill="#f59e0b" opacity="0.18" rx="1"/>
  <rect x="660" y="435" width="40" height="25" fill="#f59e0b" opacity="0.22" rx="1"/>
  <rect x="720" y="435" width="40" height="25" fill="#f59e0b" opacity="0.15" rx="1"/>
  <rect x="780" y="435" width="40" height="25" fill="#00d4ff" opacity="0.18" rx="1"/>
  <rect x="660" y="480" width="40" height="25" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="720" y="480" width="40" height="25" fill="#f59e0b" opacity="0.25" rx="1"/>
  <rect x="780" y="480" width="40" height="25" fill="#00d4ff" opacity="0.15" rx="1"/>
  <rect x="660" y="525" width="40" height="25" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="720" y="525" width="40" height="25" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="780" y="525" width="40" height="25" fill="#f59e0b" opacity="0.15" rx="1"/>
  <!-- Hotel lobby -->
  <rect x="660" y="600" width="200" height="100" fill="#0a1525" stroke="#1e3050" stroke-width="1"/>
  <rect x="680" y="615" width="160" height="70" fill="#f59e0b" opacity="0.08"/>
  <!-- Hotel label -->
  <text x="760" y="760" font-family="Arial, sans-serif" font-size="16" fill="#c0c0c0" text-anchor="middle" opacity="0.8">Smart Hotel Tower</text>
  <line x1="700" y1="768" x2="820" y2="768" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- RIGHT: Office Building -->
  <!-- Office body -->
  <rect x="980" y="350" width="360" height="350" fill="#0d1828" stroke="#1e3050" stroke-width="1"/>
  <!-- Office grid windows -->
  <rect x="1000" y="370" width="50" height="35" fill="#00d4ff" opacity="0.12" rx="1"/>
  <rect x="1065" y="370" width="50" height="35" fill="#00d4ff" opacity="0.18" rx="1"/>
  <rect x="1130" y="370" width="50" height="35" fill="#00d4ff" opacity="0.1" rx="1"/>
  <rect x="1195" y="370" width="50" height="35" fill="#00d4ff" opacity="0.15" rx="1"/>
  <rect x="1260" y="370" width="50" height="35" fill="#00d4ff" opacity="0.12" rx="1"/>
  <rect x="1000" y="420" width="50" height="35" fill="#00d4ff" opacity="0.15" rx="1"/>
  <rect x="1065" y="420" width="50" height="35" fill="#00d4ff" opacity="0.1" rx="1"/>
  <rect x="1130" y="420" width="50" height="35" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="1195" y="420" width="50" height="35" fill="#00d4ff" opacity="0.12" rx="1"/>
  <rect x="1260" y="420" width="50" height="35" fill="#00d4ff" opacity="0.18" rx="1"/>
  <rect x="1000" y="470" width="50" height="35" fill="#00d4ff" opacity="0.1" rx="1"/>
  <rect x="1065" y="470" width="50" height="35" fill="#00d4ff" opacity="0.15" rx="1"/>
  <rect x="1130" y="470" width="50" height="35" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="1195" y="470" width="50" height="35" fill="#00d4ff" opacity="0.1" rx="1"/>
  <rect x="1260" y="470" width="50" height="35" fill="#00d4ff" opacity="0.15" rx="1"/>
  <!-- Dashboard wall screen -->
  <rect x="1000" y="530" width="310" height="100" fill="#00d4ff" opacity="0.05" stroke="#00d4ff" stroke-width="1" opacity="0.3" rx="2"/>
  <rect x="1010" y="540" width="290" height="80" fill="#001a22" rx="1"/>
  <!-- Bar chart on screen -->
  <rect x="1020" y="600" width="18" height="15" fill="#00d4ff" opacity="0.7"/>
  <rect x="1045" y="590" width="18" height="25" fill="#00d4ff" opacity="0.8"/>
  <rect x="1070" y="570" width="18" height="45" fill="#00d4ff" opacity="0.9"/>
  <rect x="1095" y="580" width="18" height="35" fill="#00d4ff" opacity="0.7"/>
  <rect x="1120" y="595" width="18" height="20" fill="#00d4ff" opacity="0.6"/>
  <rect x="1145" y="585" width="18" height="30" fill="#00d4ff" opacity="0.8"/>
  <rect x="1170" y="575" width="18" height="40" fill="#00d4ff" opacity="0.7"/>
  <text x="1160" y="555" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" opacity="0.8">ENERGY DASHBOARD</text>
  <!-- Office label -->
  <text x="1160" y="760" font-family="Arial, sans-serif" font-size="16" fill="#c0c0c0" text-anchor="middle" opacity="0.8">Smart Office Complex</text>
  <line x1="1080" y1="768" x2="1240" y2="768" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Ground glow -->
  <rect x="0" y="700" width="1600" height="200" fill="url(#groundGrad)" opacity="0.3"/>

  <!-- Bottom network decoration -->
  <circle cx="260" cy="700" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="540" cy="700" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="1000" cy="700" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="1300" cy="700" r="2" fill="#00d4ff" opacity="0.3"/>

  <!-- Bottom subtitle -->
  <text x="800" y="850" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#00d4ff" text-anchor="middle" opacity="0.6">INTELLIGENT BUILDING AUTOMATION · PREMIUM SMART SOLUTIONS</text>
</svg>