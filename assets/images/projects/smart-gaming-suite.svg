<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="gamingBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#080510;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0818;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#060510;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#12101e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0814;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="cyanLED" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="purpleLED" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="greenLED" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="pinkLED" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff0080;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#gamingBg)"/>
  <!-- Wall -->
  <rect x="0" y="0" width="1600" height="620" fill="url(#wallGrad)"/>
  <!-- Floor -->
  <rect x="0" y="620" width="1600" height="280" fill="#05070d"/>

  <!-- Ambient LED strips on ceiling - multicolor -->
  <rect x="0" y="0" width="1600" height="8" fill="#8b5cf6" opacity="0.6" filter="url(#glow)"/>
  <rect x="0" y="8" width="400" height="3" fill="#00d4ff" opacity="0.5"/>
  <rect x="400" y="8" width="400" height="3" fill="#8b5cf6" opacity="0.5"/>
  <rect x="800" y="8" width="400" height="3" fill="#ff0080" opacity="0.4"/>
  <rect x="1200" y="8" width="400" height="3" fill="#00ff88" opacity="0.4"/>

  <!-- Ambient ceiling color washes -->
  <ellipse cx="200" cy="0" rx="300" ry="200" fill="url(#cyanLED)" opacity="0.5"/>
  <ellipse cx="700" cy="0" rx="300" ry="200" fill="url(#purpleLED)" opacity="0.5"/>
  <ellipse cx="1200" cy="0" rx="300" ry="200" fill="url(#pinkLED)" opacity="0.4"/>

  <!-- Left wall LED strip (vertical) -->
  <rect x="0" y="0" width="5" height="620" fill="url(#purpleLED)" opacity="0.6"/>
  <line x1="3" y1="0" x2="3" y2="620" stroke="#8b5cf6" stroke-width="3" opacity="0.7" filter="url(#glow)"/>

  <!-- Right wall LED strip (vertical) -->
  <rect x="1595" y="0" width="5" height="620" fill="url(#greenLED)" opacity="0.5"/>
  <line x1="1597" y1="0" x2="1597" y2="620" stroke="#00ff88" stroke-width="3" opacity="0.6" filter="url(#glow)"/>

  <!-- Dot pattern wall panels -->
  <pattern id="panelDots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#8b5cf6" opacity="0.15"/>
  </pattern>
  <rect x="0" y="0" width="1600" height="620" fill="url(#panelDots)"/>

  <!-- Acoustic panels on back wall -->
  <rect x="50" y="60" width="140" height="200" fill="#0d0a18" rx="3" stroke="#1a1530" stroke-width="1"/>
  <rect x="200" y="60" width="140" height="200" fill="#0d0a18" rx="3" stroke="#1a1530" stroke-width="1"/>
  <rect x="350" y="60" width="140" height="200" fill="#0d0a18" rx="3" stroke="#1a1530" stroke-width="1"/>
  <rect x="1110" y="60" width="140" height="200" fill="#0d0a18" rx="3" stroke="#1a1530" stroke-width="1"/>
  <rect x="1260" y="60" width="140" height="200" fill="#0d0a18" rx="3" stroke="#1a1530" stroke-width="1"/>
  <rect x="1410" y="60" width="140" height="200" fill="#0d0a18" rx="3" stroke="#1a1530" stroke-width="1"/>

  <!-- MAIN CURVED MONITOR SETUP -->
  <!-- Monitor stand/arm -->
  <rect x="750" y="530" width="100" height="15" fill="#0a0814" rx="2" stroke="#1a1530" stroke-width="1"/>
  <rect x="785" y="440" width="30" height="90" fill="#0d0a18" rx="2"/>
  <rect x="770" y="435" width="60" height="10" fill="#0f0c1a" rx="2"/>

  <!-- Left side monitor -->
  <rect x="420" y="290" width="320" height="200" fill="#030408" rx="6" stroke="#1a1530" stroke-width="2" transform="rotate(-15,580,390)"/>
  <rect x="430" y="298" width="300" height="185" fill="#000810" rx="4" transform="rotate(-15,580,390)"/>
  <!-- Left monitor content (game dark) -->
  <rect x="432" y="300" width="296" height="181" fill="#010208" rx="3" opacity="0.95" transform="rotate(-15,580,390)"/>
  <!-- Screen glow -->
  <ellipse cx="530" cy="370" rx="160" ry="100" fill="#8b5cf6" opacity="0.15" filter="url(#screenGlow)"/>

  <!-- Center main monitor (large curved) -->
  <rect x="540" y="240" width="520" height="310" fill="#030408" rx="8" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <rect x="550" y="250" width="500" height="290" fill="#000810" rx="6"/>
  <!-- Center screen content - gaming scene dark with HUD -->
  <rect x="552" y="252" width="496" height="286" fill="#010510" rx="5"/>
  <!-- HUD elements -->
  <rect x="565" y="265" width="120" height="60" fill="#00d4ff" opacity="0.1" rx="2" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <text x="625" y="285" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.9">HP</text>
  <rect x="568" y="292" width="110" height="8" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="568" y="292" width="85" height="8" fill="#00ff88" opacity="0.7" rx="1"/>
  <text x="625" y="313" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.9">ENERGY</text>
  <rect x="568" y="318" width="110" height="8" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="568" y="318" width="60" height="8" fill="#f59e0b" opacity="0.7" rx="1"/>
  <!-- Center screen map element -->
  <polygon points="800,280 840,350 760,350" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="800" cy="320" r="5" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <!-- Score -->
  <text x="800" y="510" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.8" letter-spacing="2">SCENE: GAMING</text>
  <!-- Minimap corner -->
  <rect x="930" y="265" width="100" height="70" fill="#001015" rx="2" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <text x="980" y="308" font-family="Arial, sans-serif" font-size="7" fill="#00d4ff" text-anchor="middle" opacity="0.7">MINIMAP</text>
  <!-- Screen glow -->
  <ellipse cx="800" cy="395" rx="280" ry="180" fill="#00d4ff" opacity="0.07" filter="url(#screenGlow)"/>

  <!-- Right side monitor -->
  <rect x="860" y="290" width="320" height="200" fill="#030408" rx="6" stroke="#1a1530" stroke-width="2" transform="rotate(15,1020,390)"/>
  <rect x="870" y="298" width="300" height="185" fill="#000810" rx="4" transform="rotate(15,1020,390)"/>
  <rect x="872" y="300" width="296" height="181" fill="#010208" rx="3" opacity="0.95" transform="rotate(15,1020,390)"/>
  <ellipse cx="1070" cy="370" rx="160" ry="100" fill="#ff0080" opacity="0.1" filter="url(#screenGlow)"/>

  <!-- DESK -->
  <rect x="280" y="530" width="1040" height="30" fill="url(#deskGrad)" stroke="#1a1530" stroke-width="1" rx="2"/>
  <!-- Desk underglow LED strip -->
  <line x1="290" y1="558" x2="1310" y2="558" stroke="#8b5cf6" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="800" cy="580" rx="600" ry="40" fill="url(#purpleLED)" opacity="0.3"/>

  <!-- Keyboard on desk -->
  <rect x="640" y="540" width="320" height="20" fill="#0a0814" rx="2" stroke="#1a1530" stroke-width="1"/>
  <!-- Key rows -->
  <rect x="648" y="543" width="304" height="6" fill="#1a1530" rx="1" opacity="0.6"/>
  <rect x="648" y="551" width="304" height="6" fill="#1a1530" rx="1" opacity="0.5"/>
  <!-- RGB keyboard glow -->
  <rect x="640" y="540" width="320" height="20" fill="#8b5cf6" opacity="0.08" rx="2"/>

  <!-- Gaming chair (simple) -->
  <rect x="710" y="595" width="180" height="30" fill="#0d0a18" rx="4" stroke="#1a1530" stroke-width="1"/>
  <!-- Chair back -->
  <rect x="730" y="540" width="140" height="60" fill="#0d0a18" rx="4 4 0 0" stroke="#1a1530" stroke-width="1"/>
  <!-- Chair LED strip -->
  <line x1="730" y1="598" x2="870" y2="598" stroke="#ff0080" stroke-width="2" opacity="0.7" filter="url(#glow)"/>

  <!-- Smart lighting control panel on right wall -->
  <rect x="1480" y="250" width="100" height="180" fill="#05080f" rx="4" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="1530" y="275" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.9">SCENE</text>
  <rect x="1490" y="285" width="80" height="22" fill="#8b5cf6" opacity="0.4" rx="2"/>
  <text x="1530" y="301" font-family="Arial, sans-serif" font-size="8" fill="#fff" text-anchor="middle" opacity="0.9">Gaming</text>
  <rect x="1490" y="315" width="80" height="22" fill="#1a1530" rx="2" stroke="#1a1530" stroke-width="1"/>
  <text x="1530" y="331" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Movie</text>
  <rect x="1490" y="345" width="80" height="22" fill="#1a1530" rx="2"/>
  <text x="1530" y="361" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Relax</text>
  <rect x="1490" y="375" width="80" height="22" fill="#1a1530" rx="2"/>
  <text x="1530" y="391" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.5">Sleep</text>

  <!-- Floor LED strips -->
  <line x1="0" y1="622" x2="280" y2="622" stroke="#00ff88" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  <line x1="1320" y1="622" x2="1600" y2="622" stroke="#00ff88" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

  <!-- Label -->
  <text x="800" y="860" font-family="Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="4" fill="#c0c0c0" text-anchor="middle" opacity="0.85">SMART GAMING SUITE</text>
  <text x="800" y="885" font-family="Arial, sans-serif" font-size="12" letter-spacing="2" fill="#8b5cf6" text-anchor="middle" opacity="0.7">IMMERSIVE RGB SCENES · SMART CLIMATE · AMBIENT SYNC</text>
</svg>