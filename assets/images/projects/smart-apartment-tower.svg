  <rect x="638" y="315" width="48" height="28" fill="#00d4ff" opacity="0.18" rx="1"/>
  <rect x="716" y="315" width="48" height="28" fill="#f59e0b" opacity="0.25" rx="1"/>
  <rect x="794" y="315" width="48" height="28" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="872" y="315" width="48" height="28" fill="#00d4ff" opacity="0.22" rx="1"/>
  <!-- Top floors (upper setback) -->
  <rect x="668" y="105" width="48" height="28" fill="#00d4ff" opacity="0.25" rx="1"/>
  <rect x="746" y="105" width="48" height="28" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="824" y="105" width="48" height="28" fill="#00d4ff" opacity="0.18" rx="1"/>
  <rect x="668" y="135" width="48" height="28" fill="#f59e0b" opacity="0.22" rx="1"/>
  <rect x="746" y="135" width="48" height="28" fill="#00d4ff" opacity="0.28" rx="1"/>
  <rect x="824" y="135" width="48" height="28" fill="#f59e0b" opacity="0.2" rx="1"/>

  <!-- Tower vertical accent lines (cyan) -->
  <line x1="570" y1="700" x2="570" y2="120" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <line x1="1030" y1="700" x2="1030" y2="120" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <!-- Horizontal floor separators -->
  <line x1="570" y1="280" x2="1030" y2="280" stroke="#1e3050" stroke-width="0.5" opacity="0.4"/>
  <line x1="570" y1="420" x2="1030" y2="420" stroke="#1e3050" stroke-width="0.5" opacity="0.4"/>
  <line x1="570" y1="560" x2="1030" y2="560" stroke="#1e3050" stroke-width="0.5" opacity="0.4"/>

  <!-- Balcony rails glow line mid tower -->
  <line x1="570" y1="700" x2="1030" y2="700" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>

  <!-- Label -->
  <text x="800" y="850" font-family="Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="4" fill="#c0c0c0" text-anchor="middle" opacity="0.85">SMART APARTMENT TOWER</text>
  <text x="800" y="875" font-family="Arial, sans-serif" font-size="12" letter-spacing="2" fill="#00d4ff" text-anchor="middle" opacity="0.6">RESIDENTIAL AUTOMATION · MULTI-SCENE LIGHTING · SMART ACCESS</text>
</svg>