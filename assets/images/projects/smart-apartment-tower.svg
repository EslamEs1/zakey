  <rect x="910" y="600" width="48" height="28" fill="#00d4ff" opacity="0.18" rx="1"/>
  <!-- Floor 4 -->
  <rect x="598" y="565" width="48" height="28" fill="#f59e0b" opacity="0.28" rx="1"/>
