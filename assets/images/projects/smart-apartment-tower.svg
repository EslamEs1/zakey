  <rect x="754" y="460" width="48" height="28" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="832" y="460" width="48" height="28" fill="#f59e0b" opacity="0.25" rx="1"/>
  <rect x="910" y="460" width="48" height="28" fill="#f59e0b" opacity="0.18" rx="1"/>
  <!-- Floor 8 -->
  <rect x="598" y="425" width="48" height="28" fill="#00d4ff" opacity="0.22" rx="1"/>
