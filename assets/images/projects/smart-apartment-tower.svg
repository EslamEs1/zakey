  <rect x="910" y="495" width="48" height="28" fill="#00d4ff" opacity="0.15" rx="1"/>
  <!-- Floor 7 -->
  <rect x="598" y="460" width="48" height="28" fill="#f59e0b" opacity="0.28" rx="1"/>
