  <rect x="754" y="390" width="48" height="28" fill="#f59e0b" opacity="0.28" rx="1"/>
  <rect x="832" y="390" width="48" height="28" fill="#f59e0b" opacity="0.2" rx="1"/>
  <rect x="910" y="390" width="48" height="28" fill="#00d4ff" opacity="0.2" rx="1"/>
  <!-- Floor 10 upper -->
  <rect x="638" y="355" width="48" height="28" fill="#f59e0b" opacity="0.25" rx="1"/>
  <rect x="716" y="355" width="48" height="28" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="794" y="355" width="48" height="28" fill="#f59e0b" opacity="0.18" rx="1"/>
