<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#080c18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="towerMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#121e30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1520;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1020;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cityGlowFilter">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#nightSky)"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="80" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="30" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="520" cy="60" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="680" cy="20" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="850" cy="50" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="1020" cy="35" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="1180" cy="65" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="1350" cy="25" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="1500" cy="55" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="140" cy="140" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="420" cy="120" r="1.5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="760" cy="100" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="1100" cy="110" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="1440" cy="130" r="1" fill="#00d4ff" opacity="0.4"/>

  <!-- City skyline background buildings (silhouettes) -->
  <!-- Far left buildings -->
  <rect x="0" y="450" width="80" height="280" fill="#080d18"/>
  <rect x="90" y="500" width="60" height="230" fill="#080d18"/>
  <rect x="20" y="430" width="40" height="20" fill="#080d18"/>
  <!-- Far right buildings -->
  <rect x="1520" y="480" width="80" height="250" fill="#080d18"/>
  <rect x="1450" y="510" width="60" height="220" fill="#080d18"/>
  <!-- Mid left buildings -->
  <rect x="160" y="400" width="100" height="330" fill="#090e1a"/>
  <rect x="270" y="470" width="70" height="260" fill="#090e1a"/>
  <!-- Mid right buildings -->
  <rect x="1270" y="430" width="80" height="300" fill="#090e1a"/>
  <rect x="1360" y="490" width="70" height="240" fill="#090e1a"/>
  <!-- Skyline glow at bottom -->
  <rect x="0" y="700" width="1600" height="200" fill="url(#cityGlow)"/>

  <!-- Ground -->
  <rect x="0" y="750" width="1600" height="150" fill="url(#groundGrad)"/>
  <!-- Ground reflections -->
  <rect x="550" y="752" width="500" height="3" fill="#00d4ff" opacity="0.15"/>

  <!-- MAIN TOWER -->
  <!-- Tower base/podium -->
  <rect x="500" y="700" width="600" height="80" fill="#0d1828" stroke="#1e3050" stroke-width="1"/>
  <!-- Tower body -->
  <rect x="570" y="120" width="460" height="580" fill="url(#towerMain)" stroke="#1e3050" stroke-width="1.5"/>
  <!-- Tower setback upper section -->
  <rect x="620" y="80" width="360" height="100" fill="#101d30" stroke="#1e3050" stroke-width="1"/>
  <!-- Tower top -->
  <rect x="720" y="40" width="160" height="50" fill="#0f1c2e" stroke="#1e3050" stroke-width="1"/>
  <!-- Antenna/spire -->
  <line x1="800" y1="0" x2="800" y2="40" stroke="#1e3050" stroke-width="3"/>
  <circle cx="800" cy="5" r="6" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Tower windows - multiple floors with different scene colors -->
  <!-- Floor pattern: 15 floors of 3 windows each, mixed colors -->
  <!-- Floor 1 (lowest) -->
  <rect x="598" y="670" width="48" height="28" fill="#f59e0b" opacity="0.35" rx="1"/>
  <rect x="676" y="670" width="48" height="28" fill="#f59e0b" opacity="0.25" rx="1"/>
  <rect x="754" y="670" width="48" height="28" fill="#00d4ff" opacity="0.2" rx="1"/>
  <rect x="832" y="670" width="48" height="28" fill="#f59e0b" opacity="0.3" rx="1"/>
