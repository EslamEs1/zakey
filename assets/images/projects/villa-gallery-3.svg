<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bedBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1525;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="warmBed" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="mattressG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e4e0"/>
      <stop offset="100%" style="stop-color:#ccc8c4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bedBg)"/>
  <!-- Wall -->
  <rect x="0" y="0" width="800" height="430" fill="#0d1828"/>
  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="45" fill="#090d18"/>
  <!-- Floor -->
  <rect x="0" y="430" width="800" height="170" fill="#070c16"/>
  <!-- Warm ambient -->
  <ellipse cx="400" cy="100" rx="350" ry="200" fill="url(#warmBed)" opacity="0.8"/>
  <!-- Ceiling lights -->
  <circle cx="200" cy="22" r="8" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <circle cx="400" cy="22" r="8" fill="#f59e0b" opacity="0.35" filter="url(#glow)"/>
  <circle cx="600" cy="22" r="8" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <!-- Cove lighting -->
  <line x1="0" y1="45" x2="800" y2="45" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <!-- Headboard wall panel (textured) -->
  <rect x="130" y="100" width="540" height="280" fill="#0f1a2e" stroke="#1e3050" stroke-width="1" rx="2"/>
  <rect x="140" y="110" width="520" height="10" fill="#1a2840" rx="1"/>
  <!-- Tufted headboard pattern -->
  <circle cx="230" cy="220" r="6" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="330" cy="190" r="6" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="220" r="6" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="470" cy="190" r="6" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="570" cy="220" r="6" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Bed frame -->
  <rect x="130" y="350" width="540" height="100" fill="#0d1828" stroke="#1a2840" stroke-width="1" rx="3"/>
  <!-- Mattress / bedding -->
  <rect x="140" y="330" width="520" height="120" fill="url(#mattressG)" rx="2"/>
  <!-- Duvet -->
  <rect x="140" y="355" width="520" height="95" fill="#e8e4e0" rx="2"/>
  <rect x="140" y="355" width="520" height="28" fill="#f0ece8" rx="2"/>
  <!-- Duvet fold lines -->
  <line x1="250" y1="355" x2="250" y2="450" stroke="#d8d4d0" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="355" x2="400" y2="450" stroke="#d8d4d0" stroke-width="1" opacity="0.5"/>
  <line x1="550" y1="355" x2="550" y2="450" stroke="#d8d4d0" stroke-width="1" opacity="0.5"/>
  <!-- Pillows -->
  <rect x="165" y="335" width="140" height="55" fill="#ffffff" rx="6"/>
  <rect x="490" y="335" width="140" height="55" fill="#ffffff" rx="6"/>
  <rect x="165" y="380" width="140" height="12" fill="#e0dcd8" rx="0 0 6 6"/>
  <rect x="490" y="380" width="140" height="12" fill="#e0dcd8" rx="0 0 6 6"/>
  <!-- Under-bed LED glow -->
  <line x1="130" y1="450" x2="670" y2="450" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <!-- Bedside table left -->
  <rect x="30" y="380" width="100" height="80" fill="#0a1525" stroke="#1a2840" stroke-width="1" rx="2"/>
  <!-- SMART CONTROL PANEL beside table -->
  <rect x="38" y="285" width="85" height="150" fill="#050d18" rx="3" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <rect x="46" y="297" width="69" height="40" fill="#001a22" rx="2"/>
  <text x="80" y="313" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.9">BEDROOM</text>
  <text x="80" y="326" font-family="Arial, sans-serif" font-size="7" fill="#c0c0c0" text-anchor="middle" opacity="0.7">Sleep Scene</text>
  <rect x="46" y="344" width="69" height="16" fill="#00d4ff" opacity="0.15" rx="2"/>
  <text x="80" y="356" font-family="Arial, sans-serif" font-size="7" fill="#00d4ff" text-anchor="middle">Sleep</text>
  <rect x="46" y="365" width="69" height="16" fill="#1a2840" rx="2"/>
  <text x="80" y="377" font-family="Arial, sans-serif" font-size="7" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Wake</text>
  <rect x="46" y="386" width="69" height="16" fill="#1a2840" rx="2"/>
  <text x="80" y="398" font-family="Arial, sans-serif" font-size="7" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Reading</text>
  <!-- Bedside lamp left -->
  <rect x="55" y="358" width="30" height="4" fill="#1a2840" rx="1"/>
  <polygon points="62,300 82,360 42,360" fill="#0f1825"/>
  <ellipse cx="70" cy="303" rx="14" ry="7" fill="#f59e0b" opacity="0.4" filter="url(#glow)"/>
  <!-- Bedside table right -->
  <rect x="670" y="380" width="100" height="80" fill="#0a1525" stroke="#1a2840" stroke-width="1" rx="2"/>
  <!-- Lamp right -->
  <rect x="695" y="358" width="30" height="4" fill="#1a2840" rx="1"/>
  <polygon points="702,300 722,360 682,360" fill="#0f1825"/>
  <ellipse cx="712" cy="303" rx="14" ry="7" fill="#f59e0b" opacity="0.35" filter="url(#glow)"/>
  <!-- Floor line -->
  <line x1="0" y1="430" x2="800" y2="430" stroke="#1a2535" stroke-width="1" opacity="0.4"/>
  <!-- Label -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">MASTER SUITE · BEDSIDE SMART CONTROL</text>
</svg>