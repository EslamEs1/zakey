<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="guestBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1525;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="panelAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#guestBg)"/>
  <!-- Wall -->
  <rect x="0" y="0" width="800" height="440" fill="#0e1828"/>
  <!-- Floor -->
  <rect x="0" y="440" width="800" height="160" fill="#070d18"/>
  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="45" fill="#090e1a"/>
  <!-- Ceiling lights -->
  <circle cx="200" cy="22" r="8" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <circle cx="400" cy="22" r="8" fill="#f59e0b" opacity="0.35" filter="url(#glow)"/>
  <circle cx="600" cy="22" r="8" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <!-- BED (side-angle view) -->
  <rect x="180" y="310" width="440" height="130" fill="#0d1828" stroke="#1a2840" stroke-width="1" rx="3"/>
  <rect x="185" y="280" width="430" height="135" fill="#e8e4e0" rx="2"/>
  <rect x="185" y="300" width="430" height="115" fill="#eeebe8" rx="2"/>
  <rect x="185" y="280" width="430" height="28" fill="#f0ece8" rx="2"/>
  <!-- Pillows -->
  <rect x="210" y="287" width="130" height="50" fill="#fff" rx="5"/>
  <rect x="460" y="287" width="130" height="50" fill="#fff" rx="5"/>
  <!-- Headboard -->
  <rect x="180" y="220" width="440" height="65" fill="#0f1828" stroke="#1a2840" stroke-width="1" rx="3 3 0 0"/>
  <!-- Headboard detail -->
  <line x1="190" y1="250" x2="610" y2="250" stroke="#1e3050" stroke-width="1.5"/>
  <circle cx="290" cy="240" r="5" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="240" r="5" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <circle cx="510" cy="240" r="5" fill="#1a2a40" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Under-bed LED -->
  <line x1="180" y1="440" x2="620" y2="440" stroke="#00d4ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <!-- WALL CONTROL PANEL (main feature) -->
  <rect x="660" y="150" width="110" height="250" fill="#040a12" rx="5" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
  <!-- Panel aura glow -->
  <ellipse cx="715" cy="275" rx="90" ry="160" fill="url(#panelAura)" opacity="0.5"/>
  <!-- Panel header -->
  <rect x="668" y="158" width="94" height="35" fill="#001a22" rx="3"/>
  <text x="715" y="172" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.9">ROOM 1204</text>
  <text x="715" y="184" font-family="Arial, sans-serif" font-size="7" fill="#c0c0c0" text-anchor="middle" opacity="0.7">Smart Control</text>
  <!-- Divider line -->
  <line x1="668" y1="198" x2="762" y2="198" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Scene buttons -->
  <rect x="670" y="205" width="90" height="22" fill="#00d4ff" opacity="0.25" rx="3"/>
  <text x="715" y="220" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" font-weight="bold">● WELCOME</text>
  <rect x="670" y="233" width="90" height="22" fill="#1a2840" rx="3" stroke="#1e3050" stroke-width="1"/>
  <text x="715" y="248" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.7">SLEEP</text>
  <rect x="670" y="261" width="90" height="22" fill="#1a2840" rx="3" stroke="#1e3050" stroke-width="1"/>
  <text x="715" y="276" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.7">WAKE UP</text>
  <rect x="670" y="289" width="90" height="22" fill="#1a2840" rx="3" stroke="#1e3050" stroke-width="1"/>
  <text x="715" y="304" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">DND</text>
  <!-- Divider -->
  <line x1="670" y1="318" x2="762" y2="318" stroke="#1e3050" stroke-width="0.5" opacity="0.5"/>
  <!-- Slider control -->
  <text x="715" y="333" font-family="Arial, sans-serif" font-size="7" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Brightness</text>
  <rect x="676" y="337" width="78" height="5" fill="#1a2840" rx="2"/>
  <rect x="676" y="337" width="52" height="5" fill="#00d4ff" opacity="0.7" rx="2"/>
  <circle cx="728" cy="339" r="5" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Temp -->
  <text x="715" y="360" font-family="Arial, sans-serif" font-size="7" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Temp: 22°C</text>
  <rect x="676" y="364" width="78" height="5" fill="#1a2840" rx="2"/>
  <rect x="676" y="364" width="44" height="5" fill="#f59e0b" opacity="0.7" rx="2"/>
  <circle cx="720" cy="366" r="5" fill="#f59e0b" opacity="0.9"/>
  <!-- Left bedside table -->
  <rect x="60" y="365" width="115" height="80" fill="#0a1525" stroke="#1a2840" stroke-width="1" rx="2"/>
  <!-- Bedside lamp -->
  <rect x="95" y="340" width="35" height="5" fill="#1a2840" rx="1"/>
  <polygon points="102,280 122,345 82,345" fill="#0f1825"/>
  <ellipse cx="112" cy="282" rx="15" ry="7" fill="#f59e0b" opacity="0.35" filter="url(#glow)"/>
  <!-- Window left -->
  <rect x="20" y="80" width="140" height="250" fill="#0a1525" stroke="#1e3050" stroke-width="1.5" rx="2"/>
  <rect x="28" y="88" width="124" height="234" fill="#030810" rx="1"/>
  <!-- Night city view -->
  <rect x="50" y="140" width="20" height="80" fill="#0f1825" opacity="0.8"/>
  <rect x="80" y="120" width="15" height="100" fill="#0f1825" opacity="0.8"/>
  <rect x="110" y="130" width="25" height="90" fill="#0f1825" opacity="0.8"/>
  <circle cx="60" cy="265" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="87" cy="250" r="2" fill="#00d4ff" opacity="0.4"/>
  <!-- Floor line -->
  <line x1="0" y1="440" x2="800" y2="440" stroke="#1a2535" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">GUEST ROOM · SMART WALL PANEL</text>
</svg>