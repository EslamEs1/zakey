  <text x="728" y="272" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" opacity="0.9" text-anchor="end">18%</text>
  <rect x="525" y="284" width="10" height="10" fill="#8b5cf6" rx="1"/>
  <text x="542" y="294" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Reception/Common</text>
  <text x="728" y="294" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" opacity="0.9" text-anchor="end">12%</text>
  <rect x="525" y="306" width="10" height="10" fill="#c0c0c0" rx="1" opacity="0.5"/>
  <text x="542" y="316" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.6">Server / Misc</text>
  <text x="728" y="316" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.6" text-anchor="end">6%</text>
  <!-- Gauge circle -->
