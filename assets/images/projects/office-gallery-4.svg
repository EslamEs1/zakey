<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="dashBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050a12;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#03060e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001520;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000d14;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="barGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#dashBg)"/>
  <!-- Dark room background with screen as main light source -->
  <rect x="0" y="0" width="800" height="600" fill="#030810"/>
  <!-- Screen glow effect on room -->
  <ellipse cx="400" cy="300" rx="450" ry="350" fill="url(#screenGlow)" opacity="0.8"/>
  <!-- Screen frame -->
  <rect x="40" y="40" width="720" height="490" fill="#040810" rx="4" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <rect x="52" y="52" width="696" height="466" fill="url(#screenGrad)" rx="2"/>
  <!-- FULL ENERGY DASHBOARD DISPLAY -->
  <!-- Dashboard header bar -->
  <rect x="52" y="52" width="696" height="45" fill="#00d4ff" opacity="0.1" rx="2 2 0 0"/>
  <circle cx="75" cy="74" r="8" fill="#00ff88" opacity="0.8"/>
  <text x="400" y="82" font-family="Arial, sans-serif" font-size="15" fill="#00d4ff" text-anchor="middle" letter-spacing="3" opacity="0.95">ENERGY MANAGEMENT DASHBOARD</text>
  <text x="700" y="82" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.6">LIVE ●</text>
  <!-- KPI cards row -->
  <rect x="60" y="105" width="150" height="70" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
  <text x="135" y="128" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">TODAY'S kWh</text>
  <text x="135" y="158" font-family="Arial, sans-serif" font-size="24" fill="#00d4ff" text-anchor="middle" font-weight="bold">284</text>
  <rect x="222" y="105" width="150" height="70" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
  <text x="297" y="128" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">EFFICIENCY</text>
  <text x="297" y="158" font-family="Arial, sans-serif" font-size="24" fill="#00ff88" text-anchor="middle" font-weight="bold">89%</text>
  <rect x="384" y="105" width="150" height="70" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
  <text x="459" y="128" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">MONTHLY SAVE</text>
  <text x="459" y="158" font-family="Arial, sans-serif" font-size="24" fill="#f59e0b" text-anchor="middle" font-weight="bold">18%</text>
  <rect x="546" y="105" width="150" height="70" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
  <text x="621" y="128" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">CARBON SAVED</text>
  <text x="621" y="158" font-family="Arial, sans-serif" font-size="24" fill="#00ff88" text-anchor="middle" font-weight="bold">142kg</text>
