  <rect x="72" y="335" width="16" height="50" fill="#00d4ff" opacity="0.4" rx="1"/>
  <rect x="94" y="310" width="16" height="75" fill="#00d4ff" opacity="0.6" rx="1"/>
  <rect x="116" y="295" width="16" height="90" fill="#00d4ff" opacity="0.75" rx="1"/>
  <rect x="138" y="280" width="16" height="105" fill="#00d4ff" opacity="0.9" rx="1" filter="url(#barGlow)"/>
  <rect x="160" y="290" width="16" height="95" fill="#00d4ff" opacity="0.8" rx="1"/>
  <rect x="182" y="300" width="16" height="85" fill="#00d4ff" opacity="0.7" rx="1"/>
  <rect x="204" y="265" width="16" height="120" fill="#00d4ff" opacity="1" rx="1" filter="url(#barGlow)"/>
  <rect x="226" y="285" width="16" height="100" fill="#00d4ff" opacity="0.85" rx="1"/>
  <rect x="248" y="310" width="16" height="75" fill="#00d4ff" opacity="0.65" rx="1"/>
  <rect x="270" y="340" width="16" height="45" fill="#00d4ff" opacity="0.45" rx="1"/>
  <rect x="292" y="320" width="16" height="65" fill="#00d4ff" opacity="0.6" rx="1"/>
  <rect x="314" y="295" width="16" height="90" fill="#00d4ff" opacity="0.8" rx="1"/>
  <rect x="336" y="280" width="16" height="105" fill="#00d4ff" opacity="0.9" rx="1"/>
  <rect x="358" y="300" width="16" height="85" fill="#00d4ff" opacity="0.7" rx="1"/>
  <rect x="380" y="325" width="16" height="60" fill="#00d4ff" opacity="0.55" rx="1"/>
