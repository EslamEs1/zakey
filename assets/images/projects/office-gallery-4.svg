  <circle cx="625" cy="360" r="30" fill="none" stroke="#00d4ff" stroke-width="8" stroke-dasharray="168,26" stroke-dashoffset="0" opacity="0.8"/>
  <text x="625" y="365" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="bold">89%</text>
  <!-- Bottom rows / alerts table -->
  <rect x="60" y="405" width="680" height="100" fill="#001015" rx="2" stroke="#1a2535" stroke-width="0.5"/>
  <rect x="60" y="405" width="680" height="22" fill="#00d4ff" opacity="0.08" rx="2 2 0 0"/>
  <text x="400" y="421" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">RECENT AUTOMATIONS</text>
  <text x="75" y="443" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">✓ 14:20 - Zone B lights dimmed (vacancy detected)</text>
  <text x="420" y="443" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">✓ 14:15 - HVAC optimized for 78% occupancy</text>
  <text x="75" y="460" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.6">○ 14:10 - Meeting Room 3: Presentation scene activated</text>
  <text x="420" y="460" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" opacity="0.7">! 13:55 - Peak demand threshold at 85%</text>
  <text x="75" y="477" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.6">○ 13:40 - Lobby lights: Motion-activated</text>
  <text x="420" y="477" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">✓ 13:30 - Scheduled dim cycle complete</text>
  <text x="75" y="494" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.5">○ 13:00 - Lunch mode: Common areas brightened</text>
  <!-- Screen stand -->
  <rect x="360" y="530" width="80" height="10" fill="#1a2535" rx="2"/>
  <rect x="380" y="540" width="40" height="30" fill="#1a2535" rx="1"/>
  <rect x="340" y="565" width="120" height="8" fill="#1a2535" rx="2"/>
  <!-- Label -->
  <text x="400" y="590" font-family="Arial, sans-serif" font-size="12" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">ENERGY DASHBOARD DISPLAY</text>
</svg>