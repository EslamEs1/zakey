<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ede0"/>
      <stop offset="100%" stop-color="#ede0ce"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dbc8"/>
      <stop offset="100%" stop-color="#d8cbb8"/>
    </linearGradient>
    <linearGradient id="headboardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="duvetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f6f2"/>
      <stop offset="100%" stop-color="#eeeae4"/>
    </linearGradient>
    <linearGradient id="curtainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff8f0" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#fffaf5" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#fff8f0" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="windowLightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#ffe8c0"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a28"/>
      <stop offset="100%" stop-color="#3d2518"/>
    </linearGradient>
    <radialGradient id="sconce" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5cc" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffdd77" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffaa33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffee88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="panelCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="windowGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND WALL (fabric textured) ===== -->
  <rect x="0" y="0" width="600" height="338" fill="url(#wallGrad)"/>
  <!-- Subtle vertical fabric texture lines -->
  <line x1="30" y1="0" x2="30" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="60" y1="0" x2="60" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="90" y1="0" x2="90" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="120" y1="0" x2="120" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="150" y1="0" x2="150" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="180" y1="0" x2="180" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="210" y1="0" x2="210" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="240" y1="0" x2="240" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="270" y1="0" x2="270" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="300" y1="0" x2="300" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="330" y1="0" x2="330" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="360" y1="0" x2="360" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="390" y1="0" x2="390" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="420" y1="0" x2="420" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="450" y1="0" x2="450" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="480" y1="0" x2="480" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="510" y1="0" x2="510" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="540" y1="0" x2="540" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>
  <line x1="570" y1="0" x2="570" y2="280" stroke="#e0d5c0" stroke-width="0.8" opacity="0.45"/>

  <!-- ===== LARGE WINDOW BEHIND BED ===== -->
  <rect x="185" y="8" width="230" height="125" fill="url(#windowLightGrad)"/>
  <!-- Window glow -->
  <ellipse cx="300" cy="70" rx="120" ry="80" fill="url(#windowGlow)" opacity="0.65"/>
  <!-- Sheer curtains -->
  <rect x="175" y="8" width="60" height="130" fill="url(#curtainGrad)"/>
  <rect x="365" y="8" width="60" height="130" fill="url(#curtainGrad)"/>
  <!-- Curtain subtle fold lines -->
  <line x1="195" y1="8" x2="198" y2="138" stroke="#e8ddc8" stroke-width="1" opacity="0.4"/>
  <line x1="215" y1="8" x2="212" y2="138" stroke="#e8ddc8" stroke-width="1" opacity="0.4"/>
  <line x1="380" y1="8" x2="383" y2="138" stroke="#e8ddc8" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="8" x2="397" y2="138" stroke="#e8ddc8" stroke-width="1" opacity="0.4"/>
  <!-- Window frame -->
  <rect x="185" y="8" width="230" height="125" fill="none" stroke="#c8b898" stroke-width="2.5"/>
  <line x1="300" y1="8" x2="300" y2="133" stroke="#c8b898" stroke-width="1.5"/>

  <!-- ===== FLOOR (marble tiles) ===== -->
  <rect x="0" y="280" width="600" height="58" fill="url(#floorGrad)"/>
  <!-- Marble tile grid -->
  <line x1="0" y1="298" x2="600" y2="298" stroke="#c8b8a0" stroke-width="0.8" opacity="0.45"/>
  <line x1="0" y1="318" x2="600" y2="318" stroke="#c8b8a0" stroke-width="0.8" opacity="0.45"/>
  <line x1="60" y1="280" x2="60" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="130" y1="280" x2="130" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="200" y1="280" x2="200" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="270" y1="280" x2="270" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="340" y1="280" x2="340" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="410" y1="280" x2="410" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="480" y1="280" x2="480" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="550" y1="280" x2="550" y2="338" stroke="#c8b8a0" stroke-width="0.8" opacity="0.4"/>

  <!-- ===== BED FRAME ===== -->
  <!-- Bed platform base -->
  <rect x="120" y="250" width="360" height="80" rx="4" fill="#2a1c14"/>

  <!-- ===== HEADBOARD (tufted charcoal) ===== -->
  <rect x="130" y="110" width="340" height="145" rx="8" fill="url(#headboardGrad)"/>
  <!-- Tufted button grid (3x4) -->
  <circle cx="200" cy="145" r="5" fill="#383838"/>
  <circle cx="200" cy="145" r="2.5" fill="#1a1a1a"/>
  <circle cx="260" cy="145" r="5" fill="#383838"/>
  <circle cx="260" cy="145" r="2.5" fill="#1a1a1a"/>
  <circle cx="340" cy="145" r="5" fill="#383838"/>
  <circle cx="340" cy="145" r="2.5" fill="#1a1a1a"/>
  <circle cx="400" cy="145" r="5" fill="#383838"/>
  <circle cx="400" cy="145" r="2.5" fill="#1a1a1a"/>
  <circle cx="200" cy="185" r="5" fill="#383838"/>
  <circle cx="200" cy="185" r="2.5" fill="#1a1a1a"/>
  <circle cx="260" cy="185" r="5" fill="#383838"/>
  <circle cx="260" cy="185" r="2.5" fill="#1a1a1a"/>
  <circle cx="340" cy="185" r="5" fill="#383838"/>
  <circle cx="340" cy="185" r="2.5" fill="#1a1a1a"/>
  <circle cx="400" cy="185" r="5" fill="#383838"/>
  <circle cx="400" cy="185" r="2.5" fill="#1a1a1a"/>
  <circle cx="200" cy="225" r="5" fill="#383838"/>
  <circle cx="200" cy="225" r="2.5" fill="#1a1a1a"/>
  <circle cx="260" cy="225" r="5" fill="#383838"/>
  <circle cx="260" cy="225" r="2.5" fill="#1a1a1a"/>
  <circle cx="340" cy="225" r="5" fill="#383838"/>
  <circle cx="340" cy="225" r="2.5" fill="#1a1a1a"/>
  <circle cx="400" cy="225" r="5" fill="#383838"/>
  <circle cx="400" cy="225" r="2.5" fill="#1a1a1a"/>
  <!-- Headboard stitching diamond lines -->
  <line x1="200" y1="145" x2="260" y2="185" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="260" y1="145" x2="200" y2="185" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="260" y1="145" x2="340" y2="185" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="145" x2="260" y2="185" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="145" x2="400" y2="185" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="400" y1="145" x2="340" y2="185" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="200" y1="185" x2="260" y2="225" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="260" y1="185" x2="200" y2="225" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="260" y1="185" x2="340" y2="225" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="185" x2="260" y2="225" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="185" x2="400" y2="225" stroke="#303030" stroke-width="0.8" opacity="0.5"/>
  <line x1="400" y1="185" x2="340" y2="225" stroke="#303030" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== DUVET / BED LINEN ===== -->
  <rect x="130" y="248" width="340" height="60" rx="4" fill="url(#duvetGrad)"/>
  <!-- Duvet fold lines (crease shadows) -->
  <line x1="140" y1="260" x2="460" y2="255" stroke="#d8d2c8" stroke-width="1.5" opacity="0.6"/>
  <line x1="138" y1="272" x2="462" y2="268" stroke="#d8d2c8" stroke-width="1" opacity="0.45"/>
  <!-- Duvet edge shadow -->
  <rect x="130" y="248" width="340" height="8" rx="2" fill="#e0d8cc" opacity="0.6"/>

  <!-- Pillows (4, two pairs) -->
  <!-- Pillow 1 -->
  <rect x="138" y="230" width="85" height="25" rx="5" fill="#faf8f5"/>
  <rect x="138" y="230" width="85" height="25" rx="5" fill="none" stroke="#e0d8cc" stroke-width="1.2"/>
  <!-- Pillow 2 -->
  <rect x="230" y="232" width="75" height="23" rx="5" fill="#f5f3ef"/>
  <rect x="230" y="232" width="75" height="23" rx="5" fill="none" stroke="#e0d8cc" stroke-width="1.2"/>
  <!-- Pillow 3 -->
  <rect x="295" y="232" width="75" height="23" rx="5" fill="#faf8f5"/>
  <rect x="295" y="232" width="75" height="23" rx="5" fill="none" stroke="#e0d8cc" stroke-width="1.2"/>
  <!-- Pillow 4 -->
  <rect x="377" y="230" width="85" height="25" rx="5" fill="#f5f3ef"/>
  <rect x="377" y="230" width="85" height="25" rx="5" fill="none" stroke="#e0d8cc" stroke-width="1.2"/>

  <!-- ===== BEDSIDE TABLES ===== -->
  <!-- Left bedside table -->
  <rect x="38" y="230" width="82" height="60" rx="4" fill="url(#tableGrad)"/>
  <rect x="38" y="283" width="82" height="7" rx="2" fill="#2a1810"/>
  <!-- Left table lamp -->
  <rect x="68" y="215" width="22" height="5" rx="1" fill="#8a8a8a"/>
  <ellipse cx="79" cy="215" rx="20" ry="15" fill="#f5f0e8"/>
  <ellipse cx="79" cy="215" rx="55" ry="45" fill="url(#lampGlow)" opacity="0.7"/>
  <!-- Left Scene Button remote -->
  <rect x="45" y="240" width="32" height="22" rx="4" fill="#222232"/>
  <circle cx="54" cy="248" r="3.5" fill="#333348" opacity="0.9"/>
  <circle cx="67" cy="248" r="3.5" fill="#333348" opacity="0.9"/>
  <circle cx="54" cy="257" r="3.5" fill="#333348" opacity="0.9"/>
  <circle cx="67" cy="257" r="3.5" fill="#333348" opacity="0.9"/>

  <!-- Right bedside table -->
  <rect x="480" y="230" width="82" height="60" rx="4" fill="url(#tableGrad)"/>
  <rect x="480" y="283" width="82" height="7" rx="2" fill="#2a1810"/>
  <!-- Right table lamp -->
  <rect x="510" y="215" width="22" height="5" rx="1" fill="#8a8a8a"/>
  <ellipse cx="521" cy="215" rx="20" ry="15" fill="#f5f0e8"/>
  <ellipse cx="521" cy="215" rx="55" ry="45" fill="url(#lampGlow)" opacity="0.7"/>
  <!-- Right Scene Button remote -->
  <rect x="523" y="240" width="32" height="22" rx="4" fill="#222232"/>
  <circle cx="532" cy="248" r="3.5" fill="#333348" opacity="0.9"/>
  <circle cx="545" cy="248" r="3.5" fill="#333348" opacity="0.9"/>
  <circle cx="532" cy="257" r="3.5" fill="#333348" opacity="0.9"/>
  <circle cx="545" cy="257" r="3.5" fill="#333348" opacity="0.9"/>

  <!-- ===== WALL SCONCES (flanking headboard) ===== -->
  <!-- Left sconce -->
  <rect x="130" y="105" width="18" height="10" rx="2" fill="#c8b898"/>
  <ellipse cx="139" cy="108" rx="38" ry="32" fill="url(#sconce)" opacity="0.75"/>
  <circle cx="139" cy="108" r="6" fill="#fff5cc"/>
  <!-- Right sconce -->
  <rect x="452" y="105" width="18" height="10" rx="2" fill="#c8b898"/>
  <ellipse cx="461" cy="108" rx="38" ry="32" fill="url(#sconce)" opacity="0.75"/>
  <circle cx="461" cy="108" r="6" fill="#fff5cc"/>

  <!-- ===== RIGHT WALL ZAKEY PANEL ===== -->
  <rect x="564" y="150" width="36" height="75" rx="5" fill="#181828"/>
  <!-- Panel display - welcome message -->
  <rect x="568" y="158" width="28" height="42" rx="2" fill="#0d1520"/>
  <text x="582" y="168" font-family="Arial,sans-serif" font-size="4.5" fill="#00e5ff" text-anchor="middle" opacity="0.9">Welcome</text>
  <text x="582" y="176" font-family="Arial,sans-serif" font-size="3.5" fill="#00e5ff" text-anchor="middle" opacity="0.75">Mr. Al Rashidi</text>
  <rect x="571" y="181" width="22" height="1.5" rx="1" fill="#00e5ff" opacity="0.45"/>
  <rect x="571" y="186" width="18" height="1.5" rx="1" fill="#00e5ff" opacity="0.35"/>
  <rect x="571" y="191" width="22" height="1.5" rx="1" fill="#00e5ff" opacity="0.3"/>
  <!-- Status dot -->
  <circle cx="582" cy="212" r="4" fill="#00e5ff" opacity="0.9"/>
  <circle cx="582" cy="212" r="8" fill="#00e5ff" opacity="0.18"/>
  <!-- Panel glow -->
  <ellipse cx="582" cy="188" rx="28" ry="50" fill="url(#panelCyan)" opacity="0.45"/>
</svg>
