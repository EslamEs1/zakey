<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="nightGard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#050a14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#030608;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="pathLight1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cyanLight1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#nightGard)"/>
  <!-- Night sky -->
  <rect x="0" y="0" width="800" height="320" fill="#060a14"/>
  <!-- Stars -->
  <circle cx="60" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="180" cy="20" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="300" cy="60" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="450" cy="30" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="580" cy="50" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="700" cy="25" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="120" cy="100" r="1" fill="#00d4ff" opacity="0.5"/>
  <circle cx="380" cy="90" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="650" cy="80" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Villa silhouette -->
  <rect x="200" y="100" width="400" height="200" fill="#0a1525"/>
  <polygon points="160,100 400,30 640,100" fill="#0d1a28"/>
  <rect x="160" y="100" width="480" height="200" fill="#0a1525"/>
  <!-- Villa windows lit warm -->
  <rect x="230" y="130" width="70" height="80" fill="#f59e0b" opacity="0.3" rx="1"/>
  <rect x="330" y="130" width="70" height="80" fill="#f59e0b" opacity="0.25" rx="1"/>
  <!-- Cyan smart panel window -->
  <rect x="500" y="130" width="70" height="80" fill="#00d4ff" opacity="0.18" rx="1" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <rect x="560" y="130" width="70" height="80" fill="#f59e0b" opacity="0.22" rx="1"/>
  <!-- Main door -->
  <rect x="375" y="215" width="50" height="85" fill="#05070d" stroke="#1e3050" stroke-width="1" rx="1"/>
  <!-- Perimeter wall -->
  <rect x="60" y="310" width="680" height="25" fill="#0d1828" stroke="#1e3050" stroke-width="1"/>
  <!-- CYAN PERIMETER LIGHTING STRIP along wall top -->
  <line x1="60" y1="310" x2="740" y2="310" stroke="#00d4ff" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>
  <!-- Perimeter glow wash -->
  <ellipse cx="400" cy="310" rx="400" ry="30" fill="#00d4ff" opacity="0.05"/>
  <!-- Corner accent lights on wall posts -->
  <rect x="55" y="290" width="15" height="25" fill="#0d1828"/>
  <circle cx="63" cy="290" r="6" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <rect x="730" y="290" width="15" height="25" fill="#0d1828"/>
  <circle cx="738" cy="290" r="6" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Mid wall posts with lights -->
  <rect x="230" y="295" width="12" height="20" fill="#0d1828"/>
  <circle cx="236" cy="295" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <rect x="555" y="295" width="12" height="20" fill="#0d1828"/>
  <circle cx="561" cy="295" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <!-- Garden ground -->
  <rect x="0" y="335" width="800" height="265" fill="#060c10"/>
  <!-- Garden path -->
  <polygon points="320,335 480,335 520,600 280,600" fill="#080f18" opacity="0.8"/>
  <line x1="350" y1="335" x2="310" y2="600" stroke="#0d1828" stroke-width="1" opacity="0.5"/>
  <line x1="450" y1="335" x2="490" y2="600" stroke="#0d1828" stroke-width="1" opacity="0.5"/>
  <!-- Path edge lights -->
  <circle cx="330" cy="360" r="5" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="330" cy="360" rx="20" ry="15" fill="url(#pathLight1)" opacity="0.6"/>
  <circle cx="470" cy="360" r="5" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="470" cy="360" rx="20" ry="15" fill="url(#pathLight1)" opacity="0.6"/>
  <circle cx="320" cy="420" r="5" fill="#f59e0b" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="320" cy="420" rx="20" ry="15" fill="url(#pathLight1)" opacity="0.5"/>
  <circle cx="480" cy="420" r="5" fill="#f59e0b" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="480" cy="420" rx="20" ry="15" fill="url(#pathLight1)" opacity="0.5"/>
  <circle cx="305" cy="490" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="495" cy="490" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="295" cy="560" r="4" fill="#f59e0b" opacity="0.5"/>
  <circle cx="505" cy="560" r="4" fill="#f59e0b" opacity="0.5"/>
  <!-- Garden plants / shrubs -->
  <ellipse cx="130" cy="400" rx="70" ry="40" fill="#0a1a0e"/>
  <ellipse cx="100" cy="380" rx="50" ry="35" fill="#0c1e10"/>
  <ellipse cx="670" cy="400" rx="70" ry="40" fill="#0a1a0e"/>
  <ellipse cx="700" cy="380" rx="50" ry="35" fill="#0c1e10"/>
  <!-- Lawn areas -->
  <ellipse cx="150" cy="480" rx="100" ry="50" fill="#091208" opacity="0.8"/>
  <ellipse cx="650" cy="480" rx="100" ry="50" fill="#091208" opacity="0.8"/>
  <!-- Cyan perimeter ground light glow -->
  <ellipse cx="130" cy="340" rx="80" ry="20" fill="url(#cyanLight1)" opacity="0.4"/>
  <ellipse cx="670" cy="340" rx="80" ry="20" fill="url(#cyanLight1)" opacity="0.4"/>
  <!-- Label -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">GARDEN · PERIMETER SMART LIGHTING</text>
</svg>