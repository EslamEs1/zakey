<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bathBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1422;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050a10;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2535;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1020;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="mirrorGlow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="cyanMirror" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bathBg)"/>
  <!-- Tiles wall -->
  <rect x="0" y="0" width="800" height="450" fill="#0e1828"/>
  <!-- Tile grid pattern -->
  <pattern id="tile" x="0" y="50" width="50" height="50" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="49" height="49" fill="none" stroke="#1a2535" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect x="0" y="0" width="800" height="450" fill="url(#tile)"/>
  <!-- Floor tiles -->
  <rect x="0" y="450" width="800" height="150" fill="#080d18"/>
  <pattern id="floortile" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="79" height="79" fill="none" stroke="#1a2535" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect x="0" y="450" width="800" height="150" fill="url(#floortile)"/>
  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="50" fill="#09101e"/>
  <!-- Recessed ceiling light above mirror -->
  <circle cx="300" cy="25" r="9" fill="#00d4ff" opacity="0.4" filter="url(#glow)"/>
  <circle cx="160" cy="25" r="8" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <circle cx="600" cy="25" r="8" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <!-- SMART MIRROR (main feature) -->
  <rect x="100" y="80" width="400" height="300" fill="url(#mirrorGrad)" stroke="#00d4ff" stroke-width="2.5" opacity="0.9" rx="4"/>
  <!-- Mirror glow -->
  <rect x="100" y="80" width="400" height="300" fill="#00d4ff" opacity="0.03" rx="4"/>
  <ellipse cx="300" cy="230" rx="220" ry="170" fill="url(#cyanMirror)" opacity="0.5"/>
  <!-- Mirror edge LED lighting (top and bottom) -->
  <line x1="108" y1="82" x2="492" y2="82" stroke="#00d4ff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <line x1="108" y1="376" x2="492" y2="376" stroke="#00d4ff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
  <!-- Mirror side LED -->
  <line x1="102" y1="88" x2="102" y2="370" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="498" y1="88" x2="498" y2="370" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <!-- Mirror content - smart display overlay -->
  <rect x="340" y="100" width="140" height="80" fill="#001a22" rx="3" opacity="0.85"/>
  <text x="410" y="125" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle">22°C · 65% RH</text>
  <line x1="345" y1="132" x2="475" y2="132" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <text x="410" y="147" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle" opacity="0.8">Thursday 14 May</text>
  <text x="410" y="163" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">7:42 AM</text>
  <!-- Mirror content bottom panel -->
  <rect x="115" y="330" width="360" height="40" fill="#001a22" rx="2" opacity="0.7"/>
  <text x="295" y="347" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.8">Scene: Morning</text>
  <line x1="120" y1="352" x2="470" y2="352" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <text x="295" y="365" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Lights: 75%  ·  Shower: 40°C ready</text>
  <!-- Vanity unit below mirror -->
  <rect x="80" y="380" width="440" height="80" fill="#0a1525" stroke="#1e3050" stroke-width="1" rx="2"/>
  <rect x="80" y="375" width="440" height="12" fill="#1e3050" rx="2"/>
  <!-- Sink -->
  <ellipse cx="300" cy="390" rx="80" ry="22" fill="#060d18" stroke="#1a2840" stroke-width="1"/>
  <ellipse cx="300" cy="390" rx="65" ry="16" fill="#040810"/>
  <!-- Faucet -->
  <rect x="294" y="370" width="12" height="20" fill="#1e3050" rx="2"/>
  <rect x="285" y="365" width="30" height="8" fill="#1e3050" rx="2"/>
  <!-- Toiletry items -->
  <rect x="410" y="368" width="15" height="30" fill="#1a2840" rx="2"/>
  <rect x="430" y="372" width="12" height="26" fill="#1a2840" rx="2"/>
  <rect x="180" y="368" width="12" height="28" fill="#1a2840" rx="2"/>
  <!-- Right side towel rack -->
  <rect x="580" y="150" width="12" height="200" fill="#1e3050" rx="2"/>
  <rect x="580" y="150" width="150" height="8" fill="#1e3050" rx="2"/>
  <rect x="580" y="230" width="150" height="8" fill="#1e3050" rx="2"/>
  <!-- Towels on rack -->
  <rect x="600" y="158" width="120" height="70" fill="#0f1e30" rx="2" opacity="0.8"/>
  <rect x="600" y="238" width="120" height="60" fill="#0f1e30" rx="2" opacity="0.8"/>
  <!-- Label -->
  <text x="400" y="560" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">BATHROOM · SMART MIRROR PANEL</text>
</svg>