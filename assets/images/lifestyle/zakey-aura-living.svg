<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <title>Zakey Aura Panel — Living Room Close-up</title>
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090c16"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <radialGradient id="aPanelGlow" cx="50%" cy="50%" r="50%" gradientUnits="userSpaceOnUse" x1="250" y1="310" x2="250" y2="310">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aPanelGlowR" cx="250" cy="310" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aWallReflect" cx="350" cy="310" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aLampGlow" cx="970" cy="340" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aFloorGlow" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background wall -->
  <rect width="1280" height="720" fill="url(#aBg)"/>

  <!-- Wall panel glow spread onto adjacent wall -->
  <ellipse cx="250" cy="310" rx="300" ry="280" fill="url(#aPanelGlowR)"/>
  <ellipse cx="400" cy="310" rx="400" ry="320" fill="url(#aWallReflect)"/>

  <!-- Shadow/light play on right wall -->
  <rect x="340" y="0" width="6" height="720" fill="#22d3ee" fill-opacity="0.03"/>

  <!-- Dark hardwood floor strip at bottom -->
  <rect x="0" y="600" width="1280" height="120" fill="#0d1016"/>
  <rect x="0" y="600" width="1280" height="16" fill="#0f1218"/>
  <rect x="0" y="616" width="1280" height="16" fill="#0c0e14"/>
  <rect x="0" y="632" width="1280" height="16" fill="#0f1218"/>
  <rect x="0" y="648" width="1280" height="16" fill="#0c0e14"/>
  <rect x="0" y="664" width="1280" height="16" fill="#0f1218"/>
  <rect x="0" y="680" width="1280" height="16" fill="#0c0e14"/>
  <rect x="0" y="696" width="1280" height="24" fill="#0f1218"/>

  <!-- Aura Panel: outer aluminum frame -->
  <rect x="178" y="138" width="144" height="344" rx="6" fill="#2a2d3e"/>
  <!-- Screen area -->
  <rect x="182" y="142" width="136" height="336" rx="4" fill="#080b18"/>

  <!-- Zakey wordmark at top of screen -->
  <text x="250" y="168" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#22d3ee" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">ZAKEY</text>
  <!-- Thin separator line -->
  <line x1="182" y1="174" x2="318" y2="174" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Touch zone 1: Lightbulb / Lighting - ACTIVE (glowing) -->
  <rect x="182" y="175" width="136" height="60" rx="0" fill="#22d3ee" fill-opacity="0.08"/>
  <!-- Lightbulb icon (simplified path) -->
  <circle cx="218" cy="197" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.9"/>
  <line x1="214" y1="205" x2="222" y2="205" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="215" y1="208" x2="221" y2="208" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="234" y="194" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" fill-opacity="0.9">Lighting</text>
  <text x="234" y="207" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" fill-opacity="0.5">ON · 80%</text>
  <circle cx="304" cy="197" r="4" fill="#22d3ee" fill-opacity="0.8"/>
  <line x1="182" y1="235" x2="318" y2="235" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Touch zone 2: Fan / Climate -->
  <rect x="182" y="235" width="136" height="60" fill="#22d3ee" fill-opacity="0.02"/>
  <!-- Fan icon (circle + lines) -->
  <circle cx="218" cy="257" r="7" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="218" y1="250" x2="218" y2="264" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="211" y1="257" x2="225" y2="257" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="234" y="254" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" fill-opacity="0.6">Climate</text>
  <text x="234" y="267" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" fill-opacity="0.4">22°C</text>
  <circle cx="304" cy="257" r="4" fill="#22d3ee" fill-opacity="0.3"/>
  <line x1="182" y1="295" x2="318" y2="295" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Touch zone 3: Lock / Security -->
  <rect x="182" y="295" width="136" height="60" fill="#22d3ee" fill-opacity="0.02"/>
  <!-- Lock icon -->
  <rect x="213" y="303" width="10" height="8" rx="1" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M214,303 Q218,297 222,303" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="234" y="314" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" fill-opacity="0.6">Security</text>
  <text x="234" y="327" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" fill-opacity="0.4">Locked</text>
  <circle cx="304" cy="317" r="4" fill="#22d3ee" fill-opacity="0.3"/>
  <line x1="182" y1="355" x2="318" y2="355" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Touch zone 4: Sun / Scenes -->
  <rect x="182" y="355" width="136" height="60" fill="#22d3ee" fill-opacity="0.02"/>
  <!-- Sun icon -->
  <circle cx="218" cy="377" r="5" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="218" y1="369" x2="218" y2="367" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="218" y1="385" x2="218" y2="387" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="210" y1="377" x2="208" y2="377" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="226" y1="377" x2="228" y2="377" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <text x="234" y="374" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" fill-opacity="0.6">Scenes</text>
  <text x="234" y="387" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" fill-opacity="0.4">Evening</text>
  <circle cx="304" cy="377" r="4" fill="#22d3ee" fill-opacity="0.3"/>
  <line x1="182" y1="415" x2="318" y2="415" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Touch zone 5: Moon / Night mode -->
  <rect x="182" y="415" width="136" height="63" fill="#22d3ee" fill-opacity="0.02"/>
  <!-- Moon icon -->
  <path d="M221,437 Q214,433 214,440 Q214,447 221,445 Q217,445 217,440 Q217,437 221,437Z" fill="#22d3ee" fill-opacity="0.5"/>
  <text x="234" y="434" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" fill-opacity="0.6">Night</text>
  <text x="234" y="447" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" fill-opacity="0.4">Sleep mode</text>
  <circle cx="304" cy="437" r="4" fill="#22d3ee" fill-opacity="0.3"/>

  <!-- Status bar at bottom -->
  <rect x="182" y="453" width="136" height="25" rx="0" fill="#22d3ee" fill-opacity="0.12"/>
  <rect x="182" y="453" width="136" height="25" rx="0" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="200" cy="465" r="3" fill="#22d3ee" fill-opacity="0.7"/>
  <text x="212" y="469" font-family="system-ui,sans-serif" font-size="9" fill="#22d3ee" fill-opacity="0.6">Connected · All OK</text>

  <!-- Panel strong screen glow -->
  <ellipse cx="250" cy="310" rx="160" ry="200" fill="#22d3ee" fill-opacity="0.05"/>

  <!-- Room context: partial sofa -->
  <rect x="500" y="520" width="600" height="80" rx="5" fill="#161922"/>
  <rect x="505" y="560" width="190" height="44" rx="4" fill="#1c1f2c"/>
  <rect x="700" y="560" width="190" height="44" rx="4" fill="#1c1f2c"/>
  <rect x="895" y="560" width="200" height="44" rx="4" fill="#1c1f2c"/>

  <!-- Floor lamp right side -->
  <rect x="1060" y="280" width="5" height="322" fill="#1e2130"/>
  <polygon points="1042,248 1078,248 1082,280 1038,280" fill="#1c1d25"/>
  <!-- Lamp warm glow -->
  <ellipse cx="1062" cy="340" rx="180" ry="160" fill="url(#aLampGlow)"/>

  <!-- Floor ambient -->
  <rect x="500" y="600" width="780" height="10" fill="#f59e0b" fill-opacity="0.04"/>
</svg>
