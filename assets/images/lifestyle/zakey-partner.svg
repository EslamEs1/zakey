<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f0ec"/>
      <stop offset="100%" stop-color="#e4e0d8"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d4ce"/>
      <stop offset="100%" stop-color="#c0bcb6"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3428"/>
      <stop offset="40%" stop-color="#3d2b1f"/>
      <stop offset="100%" stop-color="#2a1c12"/>
    </linearGradient>
    <linearGradient id="tableReflGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a880" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8a880" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glassBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e5e0"/>
      <stop offset="100%" stop-color="#f0ede8"/>
    </linearGradient>
    <linearGradient id="officeGlassBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#d8e0ee"/>
    </linearGradient>
    <radialGradient id="pendantGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5cc" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffdd77" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffaa33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dlGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffee99" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffcc55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="panelCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- ===== CEILING ===== -->
  <rect x="0" y="0" width="800" height="110" fill="url(#ceilGrad)"/>
  <!-- Recessed downlight grid on ceiling -->
  <ellipse cx="120" cy="55" rx="32" ry="28" fill="url(#dlGlow)" opacity="0.75"/>
  <circle cx="120" cy="55" r="5" fill="#fff8e8"/>
  <ellipse cx="310" cy="55" rx="32" ry="28" fill="url(#dlGlow)" opacity="0.75"/>
  <circle cx="310" cy="55" r="5" fill="#fff8e8"/>
  <ellipse cx="500" cy="55" rx="32" ry="28" fill="url(#dlGlow)" opacity="0.75"/>
  <circle cx="500" cy="55" r="5" fill="#fff8e8"/>

  <!-- ===== GLASS WALL ON RIGHT (50% of image) ===== -->
  <!-- Glass panes background -->
  <rect x="400" y="0" width="400" height="500" fill="url(#officeGlassBg)" opacity="0.65"/>
  <!-- Glass frame verticals -->
  <line x1="400" y1="0" x2="400" y2="500" stroke="#b0b8c8" stroke-width="4"/>
  <line x1="532" y1="0" x2="532" y2="500" stroke="#b0b8c8" stroke-width="3" opacity="0.7"/>
  <line x1="664" y1="0" x2="664" y2="500" stroke="#b0b8c8" stroke-width="3" opacity="0.7"/>
  <!-- Glass frame horizontal -->
  <line x1="400" y1="250" x2="800" y2="250" stroke="#b0b8c8" stroke-width="2.5" opacity="0.55"/>
  <!-- Office people silhouettes behind glass -->
  <!-- Person 1 -->
  <ellipse cx="440" cy="155" rx="12" ry="14" fill="#6b7280" opacity="0.55"/>
  <rect x="428" y="169" width="24" height="38" rx="5" fill="#6b7280" opacity="0.55"/>
  <!-- Person 2 -->
  <ellipse cx="480" cy="160" rx="11" ry="13" fill="#78828f" opacity="0.48"/>
  <rect x="469" y="173" width="22" height="35" rx="5" fill="#78828f" opacity="0.48"/>
  <!-- Person 3 -->
  <ellipse cx="560" cy="152" rx="12" ry="14" fill="#6b7280" opacity="0.52"/>
  <rect x="548" y="166" width="24" height="40" rx="5" fill="#6b7280" opacity="0.52"/>
  <!-- Person 4 - sitting -->
  <ellipse cx="620" cy="168" rx="11" ry="12" fill="#78828f" opacity="0.45"/>
  <rect x="608" y="180" width="23" height="28" rx="5" fill="#78828f" opacity="0.45"/>
  <!-- Person 5 -->
  <ellipse cx="700" cy="155" rx="12" ry="14" fill="#6b7280" opacity="0.5"/>
  <rect x="688" y="169" width="25" height="38" rx="5" fill="#6b7280" opacity="0.5"/>
  <!-- Person 6 (distant) -->
  <ellipse cx="750" cy="162" rx="9" ry="11" fill="#6b7280" opacity="0.38"/>
  <rect x="740" y="173" width="20" height="30" rx="4" fill="#6b7280" opacity="0.38"/>
  <!-- Office furniture hints behind glass -->
  <rect x="415" y="205" width="90" height="45" rx="3" fill="#d0ccbf" opacity="0.35"/>
  <rect x="545" y="198" width="110" height="50" rx="3" fill="#d0ccbf" opacity="0.30"/>
  <rect x="680" y="202" width="95" height="48" rx="3" fill="#d0ccbf" opacity="0.28"/>
  <!-- Office pendant lights behind glass -->
  <ellipse cx="460" cy="95" rx="18" ry="14" fill="url(#pendantGlow)" opacity="0.5"/>
  <circle cx="460" cy="90" r="6" fill="#1a1a1a" opacity="0.6"/>
  <ellipse cx="600" cy="95" rx="18" ry="14" fill="url(#pendantGlow)" opacity="0.5"/>
  <circle cx="600" cy="90" r="6" fill="#1a1a1a" opacity="0.6"/>
  <ellipse cx="740" cy="95" rx="18" ry="14" fill="url(#pendantGlow)" opacity="0.5"/>
  <circle cx="740" cy="90" r="6" fill="#1a1a1a" opacity="0.6"/>
  <!-- Glass wall highlight/reflection -->
  <rect x="400" y="0" width="15" height="500" fill="white" opacity="0.07"/>

  <!-- ===== MAIN ROOM LEFT 50% ===== -->
  <!-- Back wall -->
  <rect x="0" y="105" width="405" height="395" fill="#e8e5e1"/>
  <!-- Wall trim -->
  <rect x="0" y="105" width="405" height="8" fill="#ddd9d5"/>

  <!-- ===== ZAKEY CONTROL PANEL ON LEFT WALL ===== -->
  <rect x="20" y="180" width="52" height="110" rx="6" fill="#181828"/>
  <!-- Panel display -->
  <rect x="25" y="190" width="42" height="60" rx="3" fill="#0d1520"/>
  <!-- Schedule/time display in panel -->
  <text x="46" y="210" font-family="monospace" font-size="7" fill="#00e5ff" text-anchor="middle" opacity="0.9">14:32</text>
  <rect x="28" y="216" width="36" height="1.5" rx="1" fill="#00e5ff" opacity="0.5"/>
  <rect x="28" y="222" width="30" height="1.5" rx="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="28" y="228" width="36" height="1.5" rx="1" fill="#00e5ff" opacity="0.35"/>
  <rect x="28" y="234" width="22" height="1.5" rx="1" fill="#00e5ff" opacity="0.3"/>
  <rect x="28" y="240" width="36" height="8" rx="2" fill="#00e5ff" opacity="0.12"/>
  <!-- Status indicator -->
  <circle cx="46" cy="272" r="5" fill="#00e5ff" opacity="0.9"/>
  <circle cx="46" cy="272" r="10" fill="#00e5ff" opacity="0.18"/>
  <!-- Panel glow halo -->
  <ellipse cx="46" cy="235" rx="36" ry="70" fill="url(#panelCyan)" opacity="0.5"/>
  <!-- Panel label -->
  <rect x="22" y="298" width="48" height="4" rx="2" fill="#00e5ff" opacity="0.15"/>

  <!-- ===== FLOOR (concrete) ===== -->
  <rect x="0" y="395" width="405" height="105" fill="url(#floorGrad)"/>
  <!-- Subtle concrete texture lines -->
  <line x1="0" y1="430" x2="405" y2="430" stroke="#c8c4be" stroke-width="0.8" opacity="0.4"/>
  <line x1="0" y1="462" x2="405" y2="462" stroke="#c8c4be" stroke-width="0.8" opacity="0.4"/>
  <line x1="80" y1="395" x2="80" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.3"/>
  <line x1="200" y1="395" x2="200" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.3"/>
  <line x1="320" y1="395" x2="320" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.3"/>

  <!-- ===== CONFERENCE TABLE ===== -->
  <!-- Table top (perspective angle, slightly overhead) -->
  <polygon points="80,340 685,295 730,400 65,450" fill="url(#tableGrad)"/>
  <!-- Table glossy reflection strip -->
  <polygon points="90,342 660,299 680,330 100,370" fill="url(#tableReflGrad)"/>
  <!-- Table edge front -->
  <polygon points="65,450 730,400 730,418 65,468" fill="#2a1c12"/>
  <!-- Table legs -->
  <rect x="95" y="448" width="14" height="42" rx="3" fill="#1e1408"/>
  <rect x="360" y="430" width="14" height="60" rx="3" fill="#1e1408"/>
  <rect x="695" y="410" width="14" height="80" rx="3" fill="#1e1408"/>

  <!-- ===== CHAIRS (perspective around table) ===== -->
  <!-- Near side chairs (front row, large) -->
  <ellipse cx="130" cy="468" rx="28" ry="12" fill="#4a5060" opacity="0.8"/>
  <rect x="102" y="455" width="56" height="32" rx="8" fill="#3d4252" opacity="0.7"/>
  <ellipse cx="260" cy="462" rx="28" ry="12" fill="#4a5060" opacity="0.8"/>
  <rect x="232" y="449" width="56" height="32" rx="8" fill="#3d4252" opacity="0.7"/>
  <ellipse cx="395" cy="455" rx="28" ry="12" fill="#4a5060" opacity="0.8"/>
  <rect x="367" y="442" width="56" height="32" rx="8" fill="#3d4252" opacity="0.7"/>
  <ellipse cx="530" cy="448" rx="28" ry="12" fill="#4a5060" opacity="0.8"/>
  <rect x="502" y="436" width="56" height="30" rx="8" fill="#3d4252" opacity="0.7"/>
  <!-- Far side chairs (smaller in perspective) -->
  <ellipse cx="160" cy="310" rx="20" ry="8" fill="#3d4252" opacity="0.6"/>
  <rect x="140" y="296" width="40" height="22" rx="6" fill="#323848" opacity="0.6"/>
  <ellipse cx="280" cy="302" rx="20" ry="8" fill="#3d4252" opacity="0.6"/>
  <rect x="260" y="288" width="40" height="22" rx="6" fill="#323848" opacity="0.6"/>
  <ellipse cx="400" cy="296" rx="20" ry="8" fill="#3d4252" opacity="0.6"/>
  <rect x="380" y="282" width="40" height="22" rx="6" fill="#323848" opacity="0.6"/>
  <ellipse cx="530" cy="290" rx="20" ry="8" fill="#3d4252" opacity="0.6"/>
  <rect x="510" y="276" width="40" height="22" rx="6" fill="#323848" opacity="0.6"/>

  <!-- ===== TABLE ITEMS ===== -->
  <!-- Laptops -->
  <rect x="175" y="325" width="50" height="32" rx="3" fill="#2a2a2a" opacity="0.85"/>
  <rect x="177" y="327" width="46" height="27" rx="2" fill="#1a1a1a"/>
  <rect x="178" y="328" width="44" height="25" rx="1" fill="#0d1520"/>
  <!-- Laptop screen glow lines -->
  <rect x="181" y="332" width="30" height="2" rx="1" fill="#1a3560" opacity="0.7"/>
  <rect x="181" y="337" width="22" height="2" rx="1" fill="#1a3560" opacity="0.5"/>
  <!-- Notebooks -->
  <rect x="360" y="320" width="40" height="55" rx="2" fill="#f5f2ec" opacity="0.9"/>
  <line x1="365" y1="330" x2="395" y2="330" stroke="#b0a898" stroke-width="0.8" opacity="0.6"/>
  <line x1="365" y1="338" x2="395" y2="338" stroke="#b0a898" stroke-width="0.8" opacity="0.6"/>
  <line x1="365" y1="346" x2="395" y2="346" stroke="#b0a898" stroke-width="0.8" opacity="0.6"/>
  <!-- Small plant -->
  <ellipse cx="560" cy="308" rx="12" ry="18" fill="#2d6040" opacity="0.8"/>
  <ellipse cx="555" cy="310" rx="8" ry="12" fill="#3a7a50" opacity="0.7"/>
  <rect x="556" y="322" width="8" height="8" rx="2" fill="#8a6840" opacity="0.7"/>

  <!-- ===== PENDANT LIGHTS OVER TABLE ===== -->
  <!-- Pendant 1 -->
  <line x1="155" y1="105" x2="155" y2="175" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="155" cy="178" rx="16" ry="6" fill="#222"/>
  <ellipse cx="155" cy="175" rx="75" ry="65" fill="url(#pendantGlow)" opacity="0.7"/>
  <!-- Pendant 2 -->
  <line x1="265" y1="105" x2="265" y2="175" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="265" cy="178" rx="16" ry="6" fill="#222"/>
  <ellipse cx="265" cy="175" rx="75" ry="65" fill="url(#pendantGlow)" opacity="0.7"/>
  <!-- Pendant 3 -->
  <line x1="370" y1="105" x2="370" y2="175" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="370" cy="178" rx="16" ry="6" fill="#222"/>
  <ellipse cx="370" cy="175" rx="75" ry="65" fill="url(#pendantGlow)" opacity="0.65"/>
  <!-- Pendant 4 -->
  <line x1="475" y1="105" x2="475" y2="175" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="475" cy="178" rx="16" ry="6" fill="#222"/>
  <ellipse cx="475" cy="175" rx="68" ry="60" fill="url(#pendantGlow)" opacity="0.6"/>
  <!-- Pendant 5 -->
  <line x1="570" y1="105" x2="570" y2="175" stroke="#444" stroke-width="2.5"/>
  <ellipse cx="570" cy="178" rx="16" ry="6" fill="#222"/>
  <ellipse cx="570" cy="175" rx="62" ry="55" fill="url(#pendantGlow)" opacity="0.55"/>

  <!-- ===== SUBTLE TEXT OVERLAY ===== -->
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="9" fill="#9090a0" text-anchor="middle" letter-spacing="5" opacity="0.55">ZAKEY ENTERPRISE SOLUTIONS</text>
  <!-- Bottom accent line -->
  <rect x="0" y="498" width="800" height="2" fill="#00e5ff" opacity="0.25"/>
</svg>
