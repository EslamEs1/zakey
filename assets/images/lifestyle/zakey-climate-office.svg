<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <title>Zakey Smart Office — Climate Hub Display</title>
  <defs>
    <linearGradient id="cBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0c18"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <radialGradient id="cDownlight1" cx="280" cy="0" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cDownlight2" cx="900" cy="0" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cHubGlow" cx="940" cy="270" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cCityGlow" cx="1100" cy="400" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e4060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e4060" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cWinClip">
      <rect x="860" y="80" width="400" height="420"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#cBg)"/>

  <!-- Back wall -->
  <rect x="0" y="80" width="1280" height="420" fill="#0a0c18"/>

  <!-- Ceiling -->
  <rect x="0" y="0" width="1280" height="80" fill="#080a14"/>

  <!-- Floor -->
  <rect x="0" y="500" width="1280" height="220" fill="#0b0d18"/>
  <rect x="0" y="500" width="1280" height="14" fill="#0e1020"/>
  <rect x="0" y="528" width="1280" height="14" fill="#0e1020"/>
  <rect x="0" y="556" width="1280" height="14" fill="#0e1020"/>
  <rect x="0" y="584" width="1280" height="14" fill="#0e1020"/>

  <!-- Ceiling recessed light 1 -->
  <ellipse cx="280" cy="82" rx="20" ry="5" fill="#1e2030"/>
  <ellipse cx="280" cy="84" rx="10" ry="3" fill="#f5c842" fill-opacity="0.6"/>
  <ellipse cx="280" cy="400" rx="200" ry="300" fill="url(#cDownlight1)"/>
  <!-- Ceiling recessed light 2 -->
  <ellipse cx="900" cy="82" rx="20" ry="5" fill="#1e2030"/>
  <ellipse cx="900" cy="84" rx="10" ry="3" fill="#f5c842" fill-opacity="0.6"/>
  <ellipse cx="900" cy="400" rx="200" ry="300" fill="url(#cDownlight2)"/>

  <!-- Large windows right side - city silhouette -->
  <rect x="860" y="80" width="420" height="420" fill="#080c18"/>
  <!-- Window frame -->
  <rect x="860" y="80" width="6" height="420" fill="#111626"/>
  <rect x="1274" y="80" width="6" height="420" fill="#111626"/>
  <rect x="860" y="80" width="420" height="6" fill="#111626"/>
  <rect x="1062" y="80" width="6" height="420" fill="#111626"/>
  <!-- City glow -->
  <ellipse cx="1100" cy="320" rx="300" ry="280" fill="url(#cCityGlow)"/>
  <!-- City skyline -->
  <rect x="870" y="380" width="18" height="120" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="892" y="360" width="24" height="140" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="920" y="340" width="20" height="160" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="944" y="370" width="16" height="130" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="964" y="350" width="28" height="150" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="996" y="365" width="20" height="135" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="1020" y="345" width="18" height="155" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="1075" y="355" width="26" height="145" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="1110" y="340" width="18" height="160" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="1140" y="362" width="24" height="138" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="1190" y="370" width="16" height="130" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <rect x="1225" y="345" width="28" height="155" fill="#0c1420" clip-path="url(#cWinClip)"/>
  <!-- City window lights -->
  <rect x="928" y="348" width="2" height="2" fill="#9ca3af" fill-opacity="0.35"/>
  <rect x="970" y="358" width="2" height="2" fill="#9ca3af" fill-opacity="0.3"/>
  <rect x="1115" y="347" width="2" height="2" fill="#9ca3af" fill-opacity="0.35"/>
  <rect x="1196" y="358" width="2" height="2" fill="#9ca3af" fill-opacity="0.3"/>

  <!-- Workstation left side: desk -->
  <rect x="40" y="420" width="400" height="14" rx="2" fill="#141726"/>
  <rect x="60" y="434" width="6" height="70" fill="#101322"/>
  <rect x="414" y="434" width="6" height="70" fill="#101322"/>
  <!-- Monitor on desk -->
  <rect x="100" y="260" width="280" height="162" rx="4" fill="#0f1220"/>
  <rect x="104" y="264" width="272" height="154" rx="2" fill="#0d1018"/>
  <!-- Monitor stand -->
  <rect x="232" y="422" width="16" height="8" fill="#141726"/>
  <rect x="216" y="428" width="48" height="4" fill="#141726"/>
  <!-- Monitor screen content (abstract data viz) -->
  <rect x="108" y="268" width="264" height="146" fill="#080c16"/>
  <line x1="108" y1="340" x2="372" y2="340" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.12"/>
  <!-- Data bars on monitor -->
  <rect x="124" y="358" width="18" height="52" fill="#22d3ee" fill-opacity="0.25"/>
  <rect x="150" y="340" width="18" height="70" fill="#22d3ee" fill-opacity="0.3"/>
  <rect x="176" y="350" width="18" height="60" fill="#22d3ee" fill-opacity="0.2"/>
  <rect x="202" y="330" width="18" height="80" fill="#22d3ee" fill-opacity="0.35"/>
  <rect x="228" y="344" width="18" height="66" fill="#22d3ee" fill-opacity="0.25"/>
  <rect x="254" y="360" width="18" height="50" fill="#22d3ee" fill-opacity="0.2"/>
  <rect x="280" y="334" width="18" height="76" fill="#22d3ee" fill-opacity="0.3"/>
  <rect x="336" y="322" width="18" height="88" fill="#6366f1" fill-opacity="0.35"/>
  <!-- Monitor accent line -->
  <rect x="104" y="410" width="272" height="2" fill="#22d3ee" fill-opacity="0.3"/>
  <!-- Keyboard on desk -->
  <rect x="120" y="408" width="180" height="16" rx="3" fill="#111428"/>

  <!-- Climate Hub panel on right wall -->
  <!-- Glow behind it -->
  <ellipse cx="940" cy="270" rx="140" ry="130" fill="url(#cHubGlow)"/>
  <!-- Thermostat circular device body -->
  <circle cx="940" cy="270" r="70" fill="#1e2030"/>
  <circle cx="940" cy="270" r="64" fill="#141828"/>
  <!-- Tick ring marks -->
  <circle cx="940" cy="270" r="56" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="3 4"/>
  <!-- Temperature display -->
  <text x="940" y="258" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#22d3ee" fill-opacity="0.9" text-anchor="middle">22°C</text>
  <text x="940" y="278" font-family="system-ui,sans-serif" font-size="10" fill="#8b92a9" text-anchor="middle">Target</text>
  <!-- Status LED -->
  <circle cx="940" cy="300" r="5" fill="#22d3ee" fill-opacity="0.9"/>
  <!-- Outer ring detail -->
  <circle cx="940" cy="270" r="68" fill="none" stroke="#2a2d3e" stroke-width="2"/>
  <!-- Tick marks around ring -->
  <line x1="940" y1="200" x2="940" y2="208" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="940" y1="330" x2="940" y2="338" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="870" y1="270" x2="878" y2="270" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="1002" y1="270" x2="1010" y2="270" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Small ceiling sensor icon left -->
  <circle cx="520" cy="86" r="8" fill="#1a1c2c"/>
  <circle cx="520" cy="86" r="4" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="520" cy="86" r="2" fill="#22d3ee" fill-opacity="0.6"/>

  <!-- Small wall sensor -->
  <rect x="48" y="340" width="18" height="24" rx="3" fill="#1a1c2c"/>
  <circle cx="57" cy="350" r="4" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="57" cy="350" r="2" fill="#22d3ee" fill-opacity="0.5"/>
</svg>
