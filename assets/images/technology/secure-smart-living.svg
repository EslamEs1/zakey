<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Secure Smart Living">
  <defs>
    <radialGradient id="ssl-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0b1828"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <pattern id="ssl-hex" x="0" y="0" width="50" height="57.7" patternUnits="userSpaceOnUse">
      <polygon points="25,2 48,15 48,42 25,55 2,42 2,15" fill="none" stroke="rgba(34,211,238,0.04)" stroke-width="0.8"/>
    </pattern>
    <filter id="ssl-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#ssl-bg)"/>
  <rect width="800" height="600" fill="url(#ssl-hex)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.5)" letter-spacing="3">SECURITY</text>
  <text x="400" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.88)">Secure Smart Living</text>

  <!-- Shield shape centered -->
  <path d="M400,105 L490,145 L490,270 Q490,350 400,390 Q310,350 310,270 L310,145 Z"
        fill="rgba(34,211,238,0.04)" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.7" filter="url(#ssl-glow)"/>
  <path d="M400,118 L478,153 L478,270 Q478,338 400,374 Q322,338 322,270 L322,153 Z"
        fill="rgba(34,211,238,0.02)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>

  <!-- Padlock inside shield -->
  <!-- Lock body -->
  <rect x="374" y="255" width="52" height="44" rx="5" fill="#091828" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.8"/>
  <!-- Lock shackle -->
  <path d="M382,255 L382,237 Q382,218 400,218 Q418,218 418,237 L418,255"
        fill="none" stroke="#22d3ee" stroke-width="1.4" stroke-opacity="0.8"/>
  <!-- Keyhole -->
  <circle cx="400" cy="274" r="6" fill="#22d3ee" opacity="0.5"/>
  <rect x="397" y="274" width="6" height="10" rx="1" fill="#22d3ee" opacity="0.5"/>

  <!-- Floating badge: Encrypted -->
  <g transform="translate(560,180)">
    <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0c1e32" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="-46" cy="0" r="8" fill="#091420" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
    <text x="-46" y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#22d3ee">&#10003;</text>
    <text x="4" y="-5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.85)">Encrypted</text>
    <text x="4" y="9" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(34,211,238,0.5)">End-to-End</text>
    <!-- connector line to shield -->
    <line x1="-68" y1="0" x2="-100" y2="55" stroke="rgba(34,211,238,0.2)" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Floating badge: Role-Based -->
  <g transform="translate(560,300)">
    <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0c1e32" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="-46" cy="0" r="8" fill="#091420" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
    <text x="-46" y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#22d3ee">&#10003;</text>
    <text x="4" y="-5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.85)">Role-Based</text>
    <text x="4" y="9" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(34,211,238,0.5)">Access Control</text>
    <line x1="-68" y1="0" x2="-102" y2="-10" stroke="rgba(34,211,238,0.2)" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Floating badge: Secure Pairing -->
  <g transform="translate(560,420)">
    <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0c1e32" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="-46" cy="0" r="8" fill="#091420" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
    <text x="-46" y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#22d3ee">&#10003;</text>
    <text x="4" y="-5" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.85)">Secure Pairing</text>
    <text x="4" y="9" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(34,211,238,0.5)">WPA3 · TLS 1.3</text>
    <line x1="-68" y1="0" x2="-98" y2="-80" stroke="rgba(34,211,238,0.2)" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <text x="400" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)" letter-spacing="2">PRIVACY-FIRST ARCHITECTURE</text>
  <text x="400" y="556" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.3)" letter-spacing="2">ZAKEY SECURITY PLATFORM</text>
</svg>
