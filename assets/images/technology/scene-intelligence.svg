<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Scene Intelligence AI">
  <defs>
    <linearGradient id="si-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="si-circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0,30 L15,30 M45,30 L60,30 M30,0 L30,15 M30,45 L30,60" fill="none" stroke="rgba(34,211,238,0.04)" stroke-width="0.8"/>
      <circle cx="15" cy="30" r="1.5" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="0.6"/>
      <circle cx="45" cy="30" r="1.5" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="0.6"/>
      <circle cx="30" cy="15" r="1.5" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="0.6"/>
      <circle cx="30" cy="45" r="1.5" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#si-bg)"/>
  <rect width="800" height="600" fill="url(#si-circuit)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Header -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.5)" letter-spacing="3">SCENE INTELLIGENCE</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.88)">AI-Powered Scene Automation</text>

  <!-- Central AI brain node -->
  <circle cx="400" cy="310" r="36" fill="#091220" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="400" cy="310" r="28" fill="#05090f" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="400" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22d3ee" letter-spacing="1">AI</text>
  <text x="400" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="rgba(34,211,238,0.55)">ENGINE</text>
  <!-- Pulse -->
  <circle cx="400" cy="310" r="46" fill="none" stroke="#22d3ee" stroke-width="0.6" stroke-opacity="0.15"/>
  <circle cx="400" cy="310" r="58" fill="none" stroke="#22d3ee" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Scene chip positions: top, bottom-left, bottom-right, left, right -->
  <!-- chip 1: Wake Up - top center -->
  <g transform="translate(400,148)">
    <rect x="-70" y="-28" width="140" height="56" rx="8" fill="#0c1e30" stroke="#22d3ee" stroke-width="1.2"/>
    <rect x="-66" y="-24" width="132" height="48" rx="6" fill="#081628" stroke="rgba(34,211,238,0.15)" stroke-width="0.8"/>
    <!-- sun icon -->
    <circle cx="0" cy="-8" r="6" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.85"/>
    <line x1="0" y1="-17" x2="0" y2="-15" stroke="#22d3ee" stroke-width="1"/>
    <line x1="0" y1="-1" x2="0" y2="1" stroke="#22d3ee" stroke-width="1"/>
    <line x1="-9" y1="-8" x2="-7" y2="-8" stroke="#22d3ee" stroke-width="1"/>
    <line x1="7" y1="-8" x2="9" y2="-8" stroke="#22d3ee" stroke-width="1"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.9)">Wake Up</text>
    <line x1="0" y1="28" x2="0" y2="162" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,2"/>
  </g>

  <!-- chip 2: Away - top left -->
  <g transform="translate(192,220)">
    <rect x="-70" y="-28" width="140" height="56" rx="8" fill="#0c1e30" stroke="rgba(34,211,238,0.5)" stroke-width="1.2"/>
    <rect x="-66" y="-24" width="132" height="48" rx="6" fill="#081628" stroke="rgba(34,211,238,0.12)" stroke-width="0.8"/>
    <!-- lock icon -->
    <rect x="-8" y="-4" width="16" height="12" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
    <path d="M-5,-4 Q-5,-14 0,-14 Q5,-14 5,-4" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
    <circle cx="0" cy="2" r="2" fill="#22d3ee" opacity="0.7"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.9)">Away</text>
    <line x1="70" y1="0" x2="164" y2="82" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,2"/>
  </g>

  <!-- chip 3: Good Night - bottom left -->
  <g transform="translate(192,400)">
    <rect x="-70" y="-28" width="140" height="56" rx="8" fill="#0c1e30" stroke="rgba(34,211,238,0.5)" stroke-width="1.2"/>
    <rect x="-66" y="-24" width="132" height="48" rx="6" fill="#081628" stroke="rgba(34,211,238,0.12)" stroke-width="0.8"/>
    <!-- moon icon -->
    <path d="M0,-10 Q-10,-10 -10,0 Q-10,10 0,10 Q-5,5 -5,0 Q-5,-5 0,-10z" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.9)">Good Night</text>
    <line x1="70" y1="0" x2="164" y2="-82" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,2"/>
  </g>

  <!-- chip 4: Guest - top right -->
  <g transform="translate(608,220)">
    <rect x="-70" y="-28" width="140" height="56" rx="8" fill="#0c1e30" stroke="rgba(34,211,238,0.5)" stroke-width="1.2"/>
    <rect x="-66" y="-24" width="132" height="48" rx="6" fill="#081628" stroke="rgba(34,211,238,0.12)" stroke-width="0.8"/>
    <!-- home icon -->
    <polyline points="-8,-4 0,-12 8,-4" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
    <rect x="-6" y="-4" width="12" height="10" rx="1" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.9)">Guest</text>
    <line x1="-70" y1="0" x2="-164" y2="82" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,2"/>
  </g>

  <!-- chip 5: Meeting - bottom right -->
  <g transform="translate(608,400)">
    <rect x="-70" y="-28" width="140" height="56" rx="8" fill="#0c1e30" stroke="rgba(34,211,238,0.5)" stroke-width="1.2"/>
    <rect x="-66" y="-24" width="132" height="48" rx="6" fill="#081628" stroke="rgba(34,211,238,0.12)" stroke-width="0.8"/>
    <!-- briefcase icon -->
    <rect x="-8" y="-5" width="16" height="11" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
    <path d="M-4,-5 L-4,-8 Q-4,-10 -2,-10 L2,-10 Q4,-10 4,-8 L4,-5" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.9)">Meeting</text>
    <line x1="-70" y1="0" x2="-164" y2="-82" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,2"/>
  </g>

  <!-- footer -->
  <text x="400" y="554" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.35)" letter-spacing="2">ADAPTIVE · PREDICTIVE · CONTEXT-AWARE</text>
</svg>
