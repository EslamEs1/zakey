<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Energy Intelligence Dashboard">
  <defs>
    <linearGradient id="ei-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>
    <linearGradient id="ei-bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ei-bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#ei-bg)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.5)" letter-spacing="3">ENERGY INTELLIGENCE</text>
  <text x="400" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="19" font-weight="700" fill="rgba(255,255,255,0.88)">Real-Time Energy Monitoring</text>

  <!-- 2x2 dashboard cards -->
  <!-- Card 1: Lighting - top left -->
  <rect x="60" y="100" width="300" height="180" rx="10" fill="#0a1828" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="66" y="106" width="288" height="168" rx="8" fill="#071220" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <!-- Lightbulb icon -->
  <circle cx="96" cy="130" r="10" fill="none" stroke="#22d3ee" stroke-width="1.3" opacity="0.8"/>
  <line x1="96" y1="140" x2="96" y2="146" stroke="#22d3ee" stroke-width="1.3"/>
  <line x1="92" y1="143" x2="100" y2="143" stroke="#22d3ee" stroke-width="1"/>
  <line x1="92" y1="146" x2="100" y2="146" stroke="#22d3ee" stroke-width="1"/>
  <text x="116" y="127" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Lighting</text>
  <text x="116" y="142" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Today's usage</text>
  <!-- Usage bar -->
  <rect x="80" y="162" width="240" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="80" y="162" width="108" height="8" rx="4" fill="url(#ei-bar1)"/>
  <text x="80" y="184" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.7)">45%</text>
  <text x="296" y="184" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">3.6 kWh</text>
  <text x="210" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#22d3ee">45%</text>
  <text x="210" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">of Lighting Budget</text>

  <!-- Card 2: Climate - top right -->
  <rect x="440" y="100" width="300" height="180" rx="10" fill="#0a1828" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="446" y="106" width="288" height="168" rx="8" fill="#071220" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <!-- AC icon -->
  <rect x="456" y="122" width="22" height="14" rx="3" fill="none" stroke="#22d3ee" stroke-width="1.3" opacity="0.8"/>
  <line x1="459" y1="136" x2="457" y2="144" stroke="#22d3ee" stroke-width="1"/>
  <line x1="467" y1="136" x2="467" y2="144" stroke="#22d3ee" stroke-width="1"/>
  <line x1="475" y1="136" x2="477" y2="144" stroke="#22d3ee" stroke-width="1"/>
  <text x="486" y="131" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Climate</text>
  <text x="486" y="146" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Current reading</text>
  <text x="590" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#22d3ee">23°C</text>
  <text x="590" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Set to 22°C · Active</text>
  <!-- Small temp bar -->
  <rect x="460" y="162" width="240" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="162" width="168" height="8" rx="4" fill="url(#ei-bar2)"/>
  <text x="460" y="184" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.6)">70%</text>
  <text x="676" y="184" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">3.4 kWh</text>

  <!-- Card 3: Plugs - bottom left -->
  <rect x="60" y="300" width="300" height="180" rx="10" fill="#0a1828" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="66" y="306" width="288" height="168" rx="8" fill="#071220" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <!-- Plug icon -->
  <rect x="83" y="320" width="16" height="14" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.3" opacity="0.8"/>
  <line x1="87" y1="320" x2="87" y2="315" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="95" y1="320" x2="95" y2="315" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="91" y1="334" x2="91" y2="340" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="110" y="327" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.8)">Plugs</text>
  <text x="110" y="342" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Smart outlets</text>
  <text x="210" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#22d3ee">2.4</text>
  <text x="210" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(34,211,238,0.6)">kWh</text>
  <text x="210" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Today · 6 active outlets</text>
  <!-- Small bar -->
  <rect x="80" y="362" width="240" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="80" y="362" width="72" height="8" rx="4" fill="url(#ei-bar2)"/>
  <text x="80" y="384" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.5)">30%</text>

  <!-- Card 4: Total - bottom right -->
  <rect x="440" y="300" width="300" height="180" rx="10" fill="#0c2040" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="446" y="306" width="288" height="168" rx="8" fill="#091830" stroke="rgba(34,211,238,0.15)" stroke-width="0.8"/>
  <!-- Chart bars icon -->
  <rect x="456" y="330" width="5" height="10" rx="1" fill="#22d3ee" opacity="0.7"/>
  <rect x="464" y="324" width="5" height="16" rx="1" fill="#22d3ee" opacity="0.8"/>
  <rect x="472" y="318" width="5" height="22" rx="1" fill="#22d3ee"/>
  <text x="486" y="327" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.9)">Total</text>
  <text x="486" y="342" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">All systems today</text>
  <text x="590" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#22d3ee">8.1</text>
  <text x="590" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(34,211,238,0.7)">kWh today</text>
  <text x="590" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.4)">-12% vs yesterday</text>
  <!-- Small bar -->
  <rect x="460" y="362" width="240" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="362" width="192" height="8" rx="4" fill="url(#ei-bar1)"/>
  <text x="460" y="384" font-family="system-ui, sans-serif" font-size="9" fill="#22d3ee">80%</text>

  <!-- Line chart at bottom: usage trend -->
  <rect x="60" y="498" width="680" height="62" rx="6" fill="#060e1c"/>
  <text x="80" y="516" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Usage Trend · Today</text>
  <!-- X-axis labels -->
  <g font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle">
    <text x="110" y="556">6am</text><text x="190" y="556">9am</text><text x="270" y="556">12pm</text>
    <text x="350" y="556">3pm</text><text x="430" y="556">6pm</text><text x="510" y="556">9pm</text><text x="590" y="556">12am</text>
  </g>
  <!-- Chart line -->
  <polyline points="110,545 190,535 270,528 350,532 430,522 510,530 590,525 680,520"
            fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
  <polyline points="110,560 190,560 270,560 350,560 430,560 510,560 590,560 680,560 680,545 590,525 510,530 430,522 350,532 270,528 190,535 110,545z"
            fill="rgba(34,211,238,0.06)" stroke="none"/>
</svg>
