<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Link Architecture - Hybrid Wired and Wireless">
  <defs>
    <linearGradient id="la-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#091828"/>
    </linearGradient>
    <pattern id="la-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0 L0,0 0,40" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#la-bg)"/>
  <rect width="800" height="600" fill="url(#la-grid)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(34,211,238,0.5)" letter-spacing="3">ZAKEY LINK</text>
  <text x="400" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.85)">Hybrid Wired + Wireless Architecture</text>

  <!-- Central Hub -->
  <rect x="310" y="210" width="180" height="80" rx="8" fill="#0c1e38" stroke="#22d3ee" stroke-width="1.8"/>
  <rect x="316" y="216" width="168" height="68" rx="6" fill="#091628" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="400" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="1">ZAKEY HUB</text>
  <text x="400" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Central Controller</text>
  <text x="400" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.4)">v3.0 · Multi-Protocol</text>

  <!-- Left label: Wired Backbone -->
  <text x="155" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22d3ee" letter-spacing="1" opacity="0.85">WIRED BACKBONE</text>
  <line x1="60" y1="135" x2="250" y2="135" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>

  <!-- Wired device boxes left side -->
  <!-- Device W1 -->
  <rect x="60" y="148" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Lighting Panel</text>
  <text x="120" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">RS-485</text>
  <!-- connector to hub -->
  <line x1="180" y1="173" x2="310" y2="238" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.3"/>

  <!-- Device W2 -->
  <rect x="60" y="220" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="120" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Climate Gateway</text>
  <text x="120" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">KNX / Modbus</text>
  <line x1="180" y1="245" x2="310" y2="250" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.3"/>

  <!-- Device W3 -->
  <rect x="60" y="292" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="120" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Access Control</text>
  <text x="120" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Wiegand</text>
  <line x1="180" y1="317" x2="310" y2="262" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.3"/>

  <!-- Device W4 -->
  <rect x="60" y="364" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="120" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Energy Meter</text>
  <text x="120" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Wired · Modbus</text>
  <line x1="180" y1="389" x2="310" y2="270" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.3"/>

  <!-- Right label: Wireless Extension -->
  <text x="645" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22d3ee" letter-spacing="1" opacity="0.85">WIRELESS EXTENSION</text>
  <line x1="550" y1="135" x2="740" y2="135" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>

  <!-- Wireless device boxes right side -->
  <!-- Device W1 -->
  <rect x="620" y="148" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="680" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Smart Sensors</text>
  <text x="680" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Zigbee 3.0</text>
  <line x1="620" y1="173" x2="490" y2="238" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="5,3"/>

  <!-- Device W2 -->
  <rect x="620" y="220" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="680" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Smart Switches</text>
  <text x="680" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Wi-Fi / BLE</text>
  <line x1="620" y1="245" x2="490" y2="250" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="5,3"/>

  <!-- Device W3 -->
  <rect x="620" y="292" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="680" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">IR Controllers</text>
  <text x="680" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Infrared · BLE</text>
  <line x1="620" y1="317" x2="490" y2="262" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="5,3"/>

  <!-- Device W4 -->
  <rect x="620" y="364" width="120" height="50" rx="5" fill="#0a1828" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="680" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Voice / Voice</text>
  <text x="680" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Matter-ready</text>
  <line x1="620" y1="389" x2="490" y2="270" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="5,3"/>

  <!-- Wired solid legend / Wireless dashed legend -->
  <line x1="318" y1="316" x2="342" y2="316" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.4"/>
  <text x="346" y="320" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Wired</text>
  <line x1="380" y1="316" x2="404" y2="316" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4,2"/>
  <text x="408" y="320" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Wireless</text>

  <!-- Bottom project type labels -->
  <g font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">
    <text x="120" y="470">Villa</text>
    <text x="240" y="470">Apartment</text>
    <text x="360" y="470">Hotel</text>
    <text x="480" y="470">Office</text>
    <text x="600" y="470">Compound</text>
  </g>
  <line x1="60" y1="456" x2="740" y2="456" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <g stroke="rgba(34,211,238,0.15)" stroke-width="0.8">
    <line x1="120" y1="456" x2="120" y2="448"/>
    <line x1="240" y1="456" x2="240" y2="448"/>
    <line x1="360" y1="456" x2="360" y2="448"/>
    <line x1="480" y1="456" x2="480" y2="448"/>
    <line x1="600" y1="456" x2="600" y2="448"/>
  </g>

  <text x="400" y="555" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.3)" letter-spacing="2">ZAKEY LINK — HYBRID CONNECTIVITY PLATFORM</text>
</svg>
