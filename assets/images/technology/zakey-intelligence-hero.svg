<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Smart Home Intelligence Network">
  <defs>
    <radialGradient id="ih-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <radialGradient id="ih-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="ih-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="ih-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.7" fill="rgba(34,211,238,0.1)"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#ih-bg)"/>
  <rect width="800" height="600" fill="url(#ih-dots)"/>

  <!-- City skyline -->
  <g fill="#0e2040" opacity="0.6">
    <rect x="0" y="520" width="55" height="80"/>
    <rect x="50" y="492" width="38" height="108"/>
    <rect x="83" y="512" width="28" height="88"/>
    <rect x="106" y="478" width="48" height="122"/>
    <rect x="149" y="532" width="32" height="68"/>
    <rect x="620" y="532" width="32" height="68"/>
    <rect x="647" y="478" width="48" height="122"/>
    <rect x="690" y="512" width="28" height="88"/>
    <rect x="713" y="492" width="38" height="108"/>
    <rect x="746" y="520" width="54" height="80"/>
  </g>
  <line x1="0" y1="542" x2="800" y2="542" stroke="rgba(34,211,238,0.07)" stroke-width="1"/>

  <!-- House outline -->
  <g fill="none" stroke-linejoin="round">
    <polyline points="245,215 400,105 555,215" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="258" y="215" width="284" height="215" rx="2" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="372" y="348" width="56" height="82" rx="2" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="280" y="242" width="58" height="46" rx="2" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="462" y="242" width="58" height="46" rx="2" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="280" y="318" width="58" height="46" rx="2" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="462" y="318" width="58" height="46" rx="2" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>

  <!-- Hub glow halo -->
  <circle cx="400" cy="308" r="65" fill="url(#ih-hub-glow)"/>

  <!-- Signal arcs: hub to nodes (dashed cyan) -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1.2" stroke-dasharray="5,3">
    <path d="M400,308 Q350,272 308,260"/>
    <path d="M400,308 Q450,272 492,260"/>
    <path d="M400,308 Q452,338 492,358"/>
    <path d="M400,308 Q348,338 308,358"/>
    <path d="M400,308 Q400,228 400,172"/>
  </g>

  <!-- Central Hub circle -->
  <circle cx="400" cy="308" r="46" fill="#091220" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.9" filter="url(#ih-glow)"/>
  <circle cx="400" cy="308" r="38" fill="#060e1a" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="400" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#22d3ee" filter="url(#ih-glow)">Z</text>

  <!-- Pulse rings -->
  <circle cx="400" cy="308" r="58" fill="none" stroke="#22d3ee" stroke-width="0.7" stroke-opacity="0.18"/>
  <circle cx="400" cy="308" r="74" fill="none" stroke="#22d3ee" stroke-width="0.4" stroke-opacity="0.1"/>
  <circle cx="400" cy="308" r="90" fill="none" stroke="#22d3ee" stroke-width="0.3" stroke-opacity="0.06"/>

  <!-- Node: Lighting (top-left) -->
  <circle cx="308" cy="260" r="20" fill="#0a1628" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.75"/>
  <circle cx="308" cy="255" r="6.5" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="308" y1="261" x2="308" y2="267" stroke="#22d3ee" stroke-width="1.3"/>
  <line x1="305" y1="264" x2="311" y2="264" stroke="#22d3ee" stroke-width="1"/>
  <line x1="305.5" y1="267" x2="310.5" y2="267" stroke="#22d3ee" stroke-width="1"/>
  <text x="308" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Lighting</text>

  <!-- Node: Climate (top-right) -->
  <circle cx="492" cy="260" r="20" fill="#0a1628" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.75"/>
  <rect x="482" y="253" width="20" height="11" rx="2.5" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="485" y1="264" x2="483" y2="270" stroke="#22d3ee" stroke-width="1"/>
  <line x1="492" y1="264" x2="492" y2="270" stroke="#22d3ee" stroke-width="1"/>
  <line x1="499" y1="264" x2="501" y2="270" stroke="#22d3ee" stroke-width="1"/>
  <text x="492" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Climate</text>

  <!-- Node: Security (bottom-right) -->
  <circle cx="492" cy="358" r="20" fill="#0a1628" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.75"/>
  <rect x="483" y="351" width="15" height="11" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <polygon points="498,352 505,348 505,363 498,362" fill="none" stroke="#22d3ee" stroke-width="1"/>
  <text x="492" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Security</text>

  <!-- Node: Panel (bottom-left) -->
  <circle cx="308" cy="358" r="20" fill="#0a1628" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.75"/>
  <rect x="298" y="351" width="20" height="14" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <line x1="301" y1="355" x2="315" y2="355" stroke="#22d3ee" stroke-width="0.9"/>
  <line x1="301" y1="358" x2="315" y2="358" stroke="#22d3ee" stroke-width="0.9"/>
  <line x1="301" y1="361" x2="310" y2="361" stroke="#22d3ee" stroke-width="0.9"/>
  <text x="308" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Panel</text>

  <!-- Node: Sensor (top, in attic area) -->
  <circle cx="400" cy="172" r="20" fill="#0a1628" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.75"/>
  <path d="M392,170 Q400,161 408,170" fill="none" stroke="#22d3ee" stroke-width="1.3"/>
  <path d="M395,174 Q400,168 405,174" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <circle cx="400" cy="177" r="2.2" fill="#22d3ee"/>
  <text x="400" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.55)">Sensor</text>

  <!-- Footer labels -->
  <text x="400" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="3">ZAKEY INTELLIGENCE</text>
  <text x="400" y="516" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="rgba(34,211,238,0.45)" letter-spacing="2">CONNECTED SMART HOME NETWORK</text>
</svg>
