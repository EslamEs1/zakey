<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <title>Zakey Hybrid Fabric — Protocol Stack Connectivity</title>
  <defs>
    <!-- Background: dark tech -->
    <radialGradient id="hf-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <!-- Zigbee layer background: dark teal -->
    <linearGradient id="hf-zigbee-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d2a2a"/>
      <stop offset="100%" stop-color="#0a2222"/>
    </linearGradient>
    <!-- WiFi layer background: dark navy -->
    <linearGradient id="hf-wifi-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1a2a"/>
      <stop offset="100%" stop-color="#0a1622"/>
    </linearGradient>
    <!-- Matter layer background: dark purple -->
    <linearGradient id="hf-matter-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a0d2a"/>
      <stop offset="100%" stop-color="#150a22"/>
    </linearGradient>
    <!-- Zigbee layer border glow -->
    <linearGradient id="hf-zigbee-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <!-- WiFi layer border glow -->
    <linearGradient id="hf-wifi-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Matter layer border glow -->
    <linearGradient id="hf-matter-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Signal ripple gradient -->
    <radialGradient id="hf-ripple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="80%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Dashed device connection line -->
    <linearGradient id="hf-device-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Right bracket label gradient -->
    <linearGradient id="hf-bracket" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Matter hex icon fill -->
    <linearGradient id="hf-hex-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#hf-bg)"/>

  <!-- Star field: 15 tiny white dots -->
  <circle cx="18" cy="12" r="0.8" fill="#ffffff" opacity="0.18"/>
  <circle cx="55" cy="28" r="0.6" fill="#ffffff" opacity="0.15"/>
  <circle cx="8" cy="55" r="1" fill="#ffffff" opacity="0.12"/>
  <circle cx="38" cy="80" r="0.7" fill="#ffffff" opacity="0.18"/>
  <circle cx="22" cy="145" r="0.8" fill="#ffffff" opacity="0.15"/>
  <circle cx="12" cy="190" r="0.6" fill="#ffffff" opacity="0.12"/>
  <circle cx="370" cy="15" r="0.9" fill="#ffffff" opacity="0.18"/>
  <circle cx="390" cy="55" r="0.7" fill="#ffffff" opacity="0.15"/>
  <circle cx="382" cy="110" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="375" cy="175" r="0.6" fill="#ffffff" opacity="0.18"/>
  <circle cx="395" cy="200" r="0.9" fill="#ffffff" opacity="0.15"/>
  <circle cx="185" cy="10" r="0.7" fill="#ffffff" opacity="0.18"/>
  <circle cx="215" cy="218" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="100" cy="8" r="0.6" fill="#ffffff" opacity="0.2"/>
  <circle cx="298" cy="7" r="0.7" fill="#ffffff" opacity="0.18"/>

  <!-- ══ THREE STACKED PROTOCOL LAYER CARDS (slight 3D tilt perspective) ══ -->
  <!-- The cards are angled slightly — bottom card largest, top card smallest -->
  <!-- Using parallelogram-like rectangles (slight skew via polygon) for 3D feel -->

  <!-- ══ BOTTOM LAYER: Zigbee 3.0 ══ -->
  <!-- Card body (skewed rectangle) — bottom-left: 30,155 bottom-right: 250,155 top-right: 260,100 top-left: 40,100 -->
  <polygon points="40,100 260,100 250,155 30,155" fill="url(#hf-zigbee-bg)"/>
  <!-- Top edge (glow border) -->
  <line x1="40" y1="100" x2="260" y2="100" stroke="url(#hf-zigbee-border)" stroke-width="1.5"/>
  <!-- Left edge -->
  <line x1="40" y1="100" x2="30" y2="155" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
  <!-- Right edge -->
  <line x1="260" y1="100" x2="250" y2="155" stroke="#22d3ee" stroke-width="0.4" opacity="0.2"/>
  <!-- Bottom edge -->
  <line x1="30" y1="155" x2="250" y2="155" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <!-- Inner glow highlight at top -->
  <polygon points="40,100 260,100 255,108 45,108" fill="#22d3ee" opacity="0.04"/>

  <!-- Zigbee icon: zigzag lightning bolt in cyan, centered at ~110,127 -->
  <!-- Using path for lightning: points going down-right, across, down-right -->
  <path d="M100,108 L92,125 L102,125 L94,145 L118,122 L106,122 L114,108 Z" fill="#22d3ee" opacity="0.75"/>

  <!-- Zigbee label -->
  <text x="135" y="122" font-family="sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.85">Zigbee 3.0</text>
  <text x="135" y="136" font-family="sans-serif" font-size="8" fill="#22d3ee" opacity="0.55" letter-spacing="1">MESH PROTOCOL</text>

  <!-- ══ MIDDLE LAYER: Wi-Fi 6 ══ -->
  <!-- Cards stack 40px up from each other, slightly narrower -->
  <!-- bottom-left: 45,65 bottom-right: 255,65 top-right: 263,112 top-left: 37,112 -->
  <!-- Wait — layers stack from bottom to top. Let me lay them out: -->
  <!-- Zigbee: y=100 top edge, y=155 bottom edge (already done) -->
  <!-- Wi-Fi: y=55 top, y=105 bottom, offset right by ~8px for 3D -->
  <!-- Matter: y=15 top, y=60 bottom, offset right by ~16px more -->

  <!-- Wi-Fi card: polygon shifted 8px right, 45px up from Zigbee -->
  <!-- bottom: 38,108 to 258,108; top: 48,58 to 268,58 -->
  <polygon points="48,58 268,58 258,108 38,108" fill="url(#hf-wifi-bg)"/>
  <line x1="48" y1="58" x2="268" y2="58" stroke="url(#hf-wifi-border)" stroke-width="1.5"/>
  <line x1="48" y1="58" x2="38" y2="108" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
  <line x1="268" y1="58" x2="258" y2="108" stroke="#22d3ee" stroke-width="0.4" opacity="0.2"/>
  <line x1="38" y1="108" x2="258" y2="108" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <polygon points="48,58 268,58 264,66 52,66" fill="#22d3ee" opacity="0.04"/>

  <!-- Wi-Fi arc icon in cyan, at ~110,83 -->
  <!-- 3 arcs, largest at bottom -->
  <path d="M100,92 Q108,70 118,92" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  <path d="M96,92 Q108,64 122,92" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
  <path d="M92,92 Q108,57 126,92" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <circle cx="109" cy="93" r="2.5" fill="#22d3ee" opacity="0.9"/>

  <!-- Wi-Fi label -->
  <text x="142" y="78" font-family="sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.85">Wi-Fi 6</text>
  <text x="142" y="92" font-family="sans-serif" font-size="8" fill="#22d3ee" opacity="0.55" letter-spacing="1">802.11ax</text>

  <!-- ══ TOP LAYER: Matter ══ -->
  <!-- Slightly narrower: bottom: 46,62 to 266,62; top: 56,18 to 276,18 -->
  <polygon points="56,18 276,18 266,62 46,62" fill="url(#hf-matter-bg)"/>
  <line x1="56" y1="18" x2="276" y2="18" stroke="url(#hf-matter-border)" stroke-width="1.5"/>
  <line x1="56" y1="18" x2="46" y2="62" stroke="#a78bfa" stroke-width="0.8" opacity="0.4"/>
  <line x1="276" y1="18" x2="266" y2="62" stroke="#a78bfa" stroke-width="0.4" opacity="0.2"/>
  <line x1="46" y1="62" x2="266" y2="62" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <polygon points="56,18 276,18 272,26 60,26" fill="#a78bfa" opacity="0.05"/>

  <!-- Matter hexagon icon in soft purple-white at ~110,40 -->
  <polygon points="110,24 120,30 120,42 110,48 100,42 100,30" fill="url(#hf-hex-fill)" opacity="0.75"/>
  <polygon points="110,28 118,33 118,40 110,45 102,40 102,33" fill="none" stroke="#f0e8ff" stroke-width="0.8" opacity="0.5"/>
  <!-- Matter M inside hex -->
  <text x="110" y="41" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff" opacity="0.8">M</text>

  <!-- Matter label -->
  <text x="142" y="36" font-family="sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.85">Matter</text>
  <text x="142" y="50" font-family="sans-serif" font-size="8" fill="#c4b5fd" opacity="0.55" letter-spacing="1">IP STANDARD</text>

  <!-- ══ RIGHT SIDE: Vertical bracket + "ZAKEY HYBRID FABRIC" label ══ -->
  <!-- Bracket line from y=18 to y=155 at x=290 -->
  <line x1="290" y1="22" x2="290" y2="152" stroke="url(#hf-bracket)" stroke-width="1.5"/>
  <!-- Bracket top arm -->
  <line x1="282" y1="22" x2="290" y2="22" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <!-- Bracket bottom arm -->
  <line x1="278" y1="152" x2="290" y2="152" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <!-- Bracket mid marker (center of span) -->
  <circle cx="290" cy="87" r="3" fill="#22d3ee" opacity="0.6"/>
  <!-- Arrow right from center -->
  <line x1="290" y1="87" x2="302" y2="87" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>

  <!-- Label text: rotated 90° vertical, or just horizontal to the right -->
  <text x="298" y="75" font-family="sans-serif" font-size="7" font-variant="small-caps" fill="#22d3ee" opacity="0.65" letter-spacing="1.5">ZAKEY</text>
  <text x="298" y="86" font-family="sans-serif" font-size="7" font-variant="small-caps" fill="#22d3ee" opacity="0.65" letter-spacing="1.5">HYBRID</text>
  <text x="298" y="97" font-family="sans-serif" font-size="7" font-variant="small-caps" fill="#22d3ee" opacity="0.65" letter-spacing="1.5">FABRIC</text>

  <!-- ══ WIRELESS SIGNAL RIPPLES from top layer ══ -->
  <!-- Emanating from top-left of Matter card, going up-left -->
  <ellipse cx="166" cy="18" rx="30" ry="12" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="166" cy="18" rx="48" ry="20" fill="none" stroke="#a78bfa" stroke-width="0.6" opacity="0.15"/>
  <ellipse cx="166" cy="18" rx="68" ry="28" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.08"/>

  <!-- ══ FLOATING DEVICE ICONS ══ -->
  <!-- Phone icon (top-right area, connected with dashed line to Matter) -->
  <!-- Phone at 345,30 -->
  <rect x="338" y="15" width="18" height="30" rx="3" fill="#1a1e2c" stroke="#22d3ee" stroke-width="0.8" opacity="0.7"/>
  <rect x="341" y="18" width="12" height="20" rx="1" fill="#0a1018"/>
  <circle cx="347" cy="42" r="2" fill="#22d3ee" opacity="0.5"/>
  <!-- Dashed line from phone to Matter right edge (276,35) -->
  <line x1="338" y1="30" x2="290" y2="30" stroke="#22d3ee" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.25"/>
  <circle cx="338" cy="30" r="2" fill="#22d3ee" opacity="0.4"/>

  <!-- Panel icon (right side, connected to Wi-Fi layer) -->
  <!-- Panel at 350,82 -->
  <rect x="340" y="68" width="20" height="30" rx="2" fill="#1a1e2c" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <rect x="342" y="70" width="16" height="20" rx="1" fill="#0a1018"/>
  <!-- Panel lines suggesting screen -->
  <line x1="344" y1="75" x2="356" y2="75" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
  <line x1="344" y1="79" x2="356" y2="79" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <circle cx="350" cy="94" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <!-- Dashed line from panel to WiFi bracket area -->
  <line x1="340" y1="80" x2="293" y2="80" stroke="#22d3ee" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.22"/>
  <circle cx="340" cy="80" r="2" fill="#22d3ee" opacity="0.4"/>

  <!-- Sensor dot icon (below, connected to Zigbee) -->
  <!-- Sensor at 348,138 -->
  <circle cx="350" cy="138" r="10" fill="#1a1e2c" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <circle cx="350" cy="138" r="4" fill="#22d3ee" opacity="0.3"/>
  <circle cx="350" cy="138" r="2" fill="#22d3ee" opacity="0.7"/>
  <!-- Dashed line from sensor to Zigbee area -->
  <line x1="340" y1="138" x2="290" y2="130" stroke="#22d3ee" stroke-width="0.7" stroke-dasharray="3,4" opacity="0.22"/>
  <circle cx="340" cy="138" r="2" fill="#22d3ee" opacity="0.4"/>

  <!-- ══ BOTTOM LABEL ══ -->
  <text x="155" y="218" text-anchor="middle" font-family="sans-serif" font-size="8" font-variant="small-caps" fill="#ffffff" opacity="0.3" letter-spacing="2">MULTI-PROTOCOL INTEROPERABILITY</text>
</svg>
