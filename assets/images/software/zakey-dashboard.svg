<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Business Operator Dashboard">
  <defs>
    <linearGradient id="bd-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#07101e"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bd-bg)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="56" fill="#091628"/>
  <line x1="0" y1="56" x2="800" y2="56" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <text x="36" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#22d3ee" letter-spacing="1">Z</text>
  <text x="52" y="24" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.8)">Zakey Business Dashboard</text>
  <text x="52" y="40" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Operator Portal · v2.4</text>
  <!-- User avatar -->
  <circle cx="750" cy="28" r="18" fill="#0c2040" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="750" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#22d3ee">O</text>
  <text x="722" y="33" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Admin</text>

  <!-- 4 KPI tiles -->
  <!-- KPI 1: Properties -->
  <rect x="36" y="76" width="162" height="88" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="56" y="102" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Properties</text>
  <text x="56" y="132" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#22d3ee">12</text>
  <text x="56" y="152" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">+2 this month</text>

  <!-- KPI 2: Devices -->
  <rect x="216" y="76" width="162" height="88" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="236" y="102" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Devices Online</text>
  <text x="236" y="132" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#22d3ee">847</text>
  <text x="236" y="152" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">99.4% reachable</text>

  <!-- KPI 3: Uptime -->
  <rect x="396" y="76" width="162" height="88" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="416" y="102" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Uptime (30d)</text>
  <text x="416" y="132" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#22d3ee">99.2%</text>
  <text x="416" y="152" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">SLA exceeded</text>

  <!-- KPI 4: Energy -->
  <rect x="576" y="76" width="188" height="88" rx="8" fill="#0c2040" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="596" y="102" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Energy Saved</text>
  <text x="596" y="132" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#22d3ee">18%</text>
  <text x="596" y="152" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.6)">vs. baseline avg</text>

  <!-- Left: Building schematic (side view 4 floors) -->
  <text x="36" y="196" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.45)" letter-spacing="1">PROPERTY VIEW</text>
  <rect x="36" y="206" width="340" height="230" rx="8" fill="#071220" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <!-- Building outline -->
  <rect x="80" y="220" width="220" height="192" rx="3" fill="#091a30" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <!-- Floors -->
  <line x1="80" y1="268" x2="300" y2="268" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <line x1="80" y1="316" x2="300" y2="316" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <line x1="80" y1="364" x2="300" y2="364" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <!-- Floor labels -->
  <g font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)">
    <text x="56" y="248">F4</text>
    <text x="56" y="296">F3</text>
    <text x="56" y="344">F2</text>
    <text x="56" y="392">F1</text>
  </g>
  <!-- Room dots per floor -->
  <!-- F4 -->
  <circle cx="105" cy="244" r="5" fill="#22d3ee" opacity="0.8"/>
  <circle cx="125" cy="244" r="5" fill="#22d3ee" opacity="0.6"/>
  <circle cx="145" cy="244" r="5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="165" cy="244" r="5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="185" cy="244" r="5" fill="rgba(255,255,255,0.12)"/>
  <!-- F3 -->
  <circle cx="105" cy="292" r="5" fill="#22d3ee" opacity="0.9"/>
  <circle cx="125" cy="292" r="5" fill="#22d3ee" opacity="0.8"/>
  <circle cx="145" cy="292" r="5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="165" cy="292" r="5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="185" cy="292" r="5" fill="#22d3ee" opacity="0.3"/>
  <!-- F2 -->
  <circle cx="105" cy="340" r="5" fill="#22d3ee" opacity="0.9"/>
  <circle cx="125" cy="340" r="5" fill="#22d3ee" opacity="0.9"/>
  <circle cx="145" cy="340" r="5" fill="#22d3ee" opacity="0.8"/>
  <circle cx="165" cy="340" r="5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="185" cy="340" r="5" fill="#22d3ee" opacity="0.6"/>
  <!-- F1 -->
  <circle cx="105" cy="388" r="5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="125" cy="388" r="5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="145" cy="388" r="5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="165" cy="388" r="5" fill="#22d3ee" opacity="0.3"/>
  <circle cx="185" cy="388" r="5" fill="rgba(255,255,255,0.12)"/>
  <!-- legend -->
  <circle cx="224" cy="244" r="4" fill="#22d3ee" opacity="0.7"/>
  <text x="232" y="248" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Active</text>
  <circle cx="224" cy="258" r="4" fill="rgba(255,255,255,0.12)"/>
  <text x="232" y="262" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Standby</text>

  <!-- Right: Mini line chart -->
  <text x="400" y="196" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.45)" letter-spacing="1">DEVICE ACTIVITY</text>
  <rect x="400" y="206" width="364" height="230" rx="8" fill="#071220" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <!-- Chart area -->
  <rect x="420" y="220" width="324" height="174" rx="3" fill="#050c1a"/>
  <!-- Y-axis labels -->
  <g font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="end">
    <text x="418" y="228">100%</text>
    <text x="418" y="264">75%</text>
    <text x="418" y="300">50%</text>
    <text x="418" y="336">25%</text>
    <text x="418" y="390">0%</text>
  </g>
  <!-- Grid lines -->
  <g stroke="rgba(34,211,238,0.05)" stroke-width="0.5">
    <line x1="420" y1="228" x2="744" y2="228"/>
    <line x1="420" y1="264" x2="744" y2="264"/>
    <line x1="420" y1="300" x2="744" y2="300"/>
    <line x1="420" y1="336" x2="744" y2="336"/>
  </g>
  <!-- Area fill -->
  <polyline points="420,310 474,290 528,300 582,275 636,260 690,270 744,255"
            fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.7" stroke-linejoin="round"/>
  <polygon points="420,394 420,310 474,290 528,300 582,275 636,260 690,270 744,255 744,394"
           fill="rgba(34,211,238,0.06)" stroke="none"/>
  <!-- X labels -->
  <g font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="middle">
    <text x="420" y="404">Mon</text>
    <text x="474" y="404">Tue</text>
    <text x="528" y="404">Wed</text>
    <text x="582" y="404">Thu</text>
    <text x="636" y="404">Fri</text>
    <text x="690" y="404">Sat</text>
    <text x="744" y="404">Sun</text>
  </g>

  <!-- Alert/status strip at bottom -->
  <rect x="36" y="454" width="728" height="42" rx="6" fill="#091628" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <circle cx="60" cy="475" r="5" fill="#22d3ee" opacity="0.8"/>
  <text x="74" y="479" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">All systems operational</text>
  <text x="280" y="479" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">|</text>
  <text x="294" y="479" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Last sync: 2 min ago</text>
  <text x="750" y="479" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.5)">Export Report</text>

  <text x="400" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.3)" letter-spacing="2">ZAKEY BUSINESS PLATFORM · OPERATOR VIEW</text>
</svg>