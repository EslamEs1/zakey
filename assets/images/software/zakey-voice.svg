<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Voice Assistant Integration">
  <defs>
    <radialGradient id="va-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <radialGradient id="va-mic-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="va-glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#va-bg)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.5)" letter-spacing="3">VOICE INTEGRATION</text>
  <text x="400" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.88)">Universal Voice Control</text>

  <!-- Sound wave rings radiating from center -->
  <circle cx="400" cy="300" r="55" fill="url(#va-mic-glow)"/>
  <circle cx="400" cy="300" r="80" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.18"/>
  <circle cx="400" cy="300" r="110" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="400" cy="300" r="140" fill="none" stroke="#22d3ee" stroke-width="0.6" stroke-opacity="0.08"/>
  <circle cx="400" cy="300" r="170" fill="none" stroke="#22d3ee" stroke-width="0.4" stroke-opacity="0.05"/>
  <circle cx="400" cy="300" r="200" fill="none" stroke="#22d3ee" stroke-width="0.3" stroke-opacity="0.03"/>

  <!-- Central microphone icon -->
  <circle cx="400" cy="300" r="48" fill="#091828" stroke="#22d3ee" stroke-width="1.5" filter="url(#va-glow)"/>
  <!-- Mic body -->
  <rect x="386" y="272" width="28" height="40" rx="14" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.9"/>
  <!-- Mic stand arc -->
  <path d="M375,305 Q375,330 400,330 Q425,330 425,305" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.8"/>
  <!-- Stand line -->
  <line x1="400" y1="330" x2="400" y2="340" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.8"/>
  <line x1="390" y1="340" x2="410" y2="340" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Mic dots (active indicator) -->
  <circle cx="400" cy="287" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="400" cy="296" r="3" fill="#22d3ee" opacity="0.7"/>
  <circle cx="400" cy="305" r="3" fill="#22d3ee" opacity="0.5"/>

  <!-- Badge: Works with Alexa - left -->
  <g transform="translate(155,230)">
    <rect x="-95" y="-30" width="190" height="60" rx="10" fill="#0c1e38" stroke="rgba(34,211,238,0.35)" stroke-width="1.2"/>
    <rect x="-91" y="-26" width="182" height="52" rx="8" fill="#091628" stroke="rgba(34,211,238,0.1)" stroke-width="0.8"/>
    <!-- wave icon -->
    <path d="-75,-5 Q-68,-15 -61,-5 Q-54,5 -47,-5" transform="translate(0,0)" fill="none" stroke="rgba(255,255,255,0.0)" stroke-width="0"/>
    <text x="-60" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.15)">~</text>
    <text x="8" y="-7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.82)">Works with Alexa</text>
    <text x="8" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Voice Commands · Skills</text>
    <!-- connector to center -->
    <line x1="95" y1="0" x2="170" y2="68" stroke="rgba(34,211,238,0.2)" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Badge: Compatible with Google Assistant - right -->
  <g transform="translate(645,230)">
    <rect x="-95" y="-30" width="190" height="60" rx="10" fill="#0c1e38" stroke="rgba(34,211,238,0.35)" stroke-width="1.2"/>
    <rect x="-91" y="-26" width="182" height="52" rx="8" fill="#091628" stroke="rgba(34,211,238,0.1)" stroke-width="0.8"/>
    <text x="0" y="-7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.82)">Google Assistant</text>
    <text x="0" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Compatible · Actions</text>
    <!-- connector to center -->
    <line x1="-95" y1="0" x2="-170" y2="68" stroke="rgba(34,211,238,0.2)" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Badge: Siri Shortcuts - bottom -->
  <g transform="translate(400,450)">
    <rect x="-95" y="-30" width="190" height="60" rx="10" fill="#0c1e38" stroke="rgba(34,211,238,0.35)" stroke-width="1.2"/>
    <rect x="-91" y="-26" width="182" height="52" rx="8" fill="#091628" stroke="rgba(34,211,238,0.1)" stroke-width="0.8"/>
    <text x="0" y="-7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.82)">Siri Shortcuts</text>
    <text x="0" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">iOS · macOS</text>
    <!-- connector to center -->
    <line x1="0" y1="-30" x2="0" y2="-118" stroke="rgba(34,211,238,0.2)" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>

  <!-- Sound waves beside mic -->
  <path d="M354,280 Q344,300 354,320" fill="none" stroke="#22d3ee" stroke-width="1.3" stroke-opacity="0.4"/>
  <path d="M342,272 Q328,300 342,328" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25"/>
  <path d="M446,280 Q456,300 446,320" fill="none" stroke="#22d3ee" stroke-width="1.3" stroke-opacity="0.4"/>
  <path d="M458,272 Q472,300 458,328" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25"/>

  <text x="400" y="548" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.3)" letter-spacing="2">NO THIRD-PARTY CLOUD DEPENDENCY</text>
</svg>