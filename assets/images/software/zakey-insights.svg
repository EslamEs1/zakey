<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Energy Insights Charts">
  <defs>
    <linearGradient id="ei2-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#091628"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ei2-bg)"/>
  <rect x="1" y="1" width="798" height="598" fill="none" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.5)" letter-spacing="3">ENERGY INSIGHTS</text>
  <text x="400" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.88)">Usage Breakdown &amp; Trends</text>

  <!-- TOP: Donut chart -->
  <text x="260" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.45)" letter-spacing="2">CATEGORY SPLIT</text>

  <!-- Donut: center at 260, 220, r=90 inner=55 -->
  <!-- Total arc 360deg. Lighting 35%=126deg, Climate 42%=151.2deg, Other 23%=82.8deg -->
  <!-- Lighting: #22d3ee from -90 to +36 (126deg) -->
  <path d="M260,130 A90,90 0 0,1 335.6,274 L306.7,233.4 A55,55 0 0,0 260,165z" fill="#22d3ee" opacity="0.85"/>
  <!-- Climate: gray/white from 36 to 187.2 (151.2deg) -->
  <path d="M335.6,274 A90,90 0 1,1 174,269.6 L207,249.8 A55,55 0 1,0 306.7,233.4z" fill="rgba(255,255,255,0.35)"/>
  <!-- Other: muted from 187.2 to 270 (82.8deg) -->
  <path d="M174,269.6 A90,90 0 0,1 260,130 L260,165 A55,55 0 0,0 207,249.8z" fill="rgba(34,211,238,0.25)"/>

  <!-- Donut hole center label -->
  <circle cx="260" cy="220" r="48" fill="#07101e"/>
  <text x="260" y="213" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Total</text>
  <text x="260" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22d3ee">8.1</text>
  <text x="260" y="241" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">kWh/day</text>

  <!-- Legend -->
  <rect x="368" y="140" width="12" height="12" rx="2" fill="#22d3ee" opacity="0.85"/>
  <text x="386" y="151" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Lighting</text>
  <text x="460" y="151" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#22d3ee">35%</text>

  <rect x="368" y="166" width="12" height="12" rx="2" fill="rgba(255,255,255,0.35)"/>
  <text x="386" y="177" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Climate</text>
  <text x="460" y="177" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.7)">42%</text>

  <rect x="368" y="192" width="12" height="12" rx="2" fill="rgba(34,211,238,0.25)"/>
  <text x="386" y="203" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">Other</text>
  <text x="460" y="203" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="rgba(34,211,238,0.6)">23%</text>

  <!-- Average indicator -->
  <rect x="368" y="225" width="120" height="30" rx="6" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="378" y="237" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Monthly avg</text>
  <text x="378" y="249" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#22d3ee">7.8 kWh</text>

  <!-- Divider -->
  <line x1="40" y1="320" x2="760" y2="320" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>

  <!-- BOTTOM: Bar chart "This Week vs Last Week" -->
  <text x="400" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.45)" letter-spacing="2">THIS WEEK vs LAST WEEK</text>

  <!-- Chart area -->
  <rect x="40" y="360" width="720" height="160" rx="6" fill="#050c1a"/>

  <!-- 7 day bars (Mon-Sun), each has this-week (cyan) and last-week (gray) -->
  <!-- Bar dimensions: group width ~90px, bar width 22px, gap 6px, chart height 140 (360-500) -->
  <!-- Y-axis lines -->
  <line x1="60" y1="370" x2="60" y2="500" stroke="rgba(34,211,238,0.08)" stroke-width="0.8"/>
  <line x1="60" y1="370" x2="750" y2="370" stroke="rgba(34,211,238,0.06)" stroke-width="0.5"/>
  <line x1="60" y1="400" x2="750" y2="400" stroke="rgba(34,211,238,0.04)" stroke-width="0.5"/>
  <line x1="60" y1="430" x2="750" y2="430" stroke="rgba(34,211,238,0.04)" stroke-width="0.5"/>
  <line x1="60" y1="460" x2="750" y2="460" stroke="rgba(34,211,238,0.04)" stroke-width="0.5"/>
  <line x1="60" y1="490" x2="750" y2="490" stroke="rgba(34,211,238,0.06)" stroke-width="0.8"/>

  <!-- Day groups: Mon(110), Tue(210), Wed(310), Thu(410), Fri(510), Sat(600), Sun(690) -->
  <!-- Mon -->
  <rect x="78" y="420" width="22" height="70" rx="3" fill="#22d3ee" opacity="0.7"/>
  <rect x="104" y="435" width="22" height="55" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="107" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Mon</text>
  <!-- Tue -->
  <rect x="182" y="405" width="22" height="85" rx="3" fill="#22d3ee" opacity="0.7"/>
  <rect x="208" y="425" width="22" height="65" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="211" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Tue</text>
  <!-- Wed -->
  <rect x="286" y="415" width="22" height="75" rx="3" fill="#22d3ee" opacity="0.8"/>
  <rect x="312" y="430" width="22" height="60" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="315" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Wed</text>
  <!-- Thu -->
  <rect x="390" y="390" width="22" height="100" rx="3" fill="#22d3ee" opacity="0.85"/>
  <rect x="416" y="410" width="22" height="80" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="419" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Thu</text>
  <!-- Fri -->
  <rect x="494" y="400" width="22" height="90" rx="3" fill="#22d3ee" opacity="0.8"/>
  <rect x="520" y="415" width="22" height="75" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="523" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Fri</text>
  <!-- Sat -->
  <rect x="590" y="440" width="22" height="50" rx="3" fill="#22d3ee" opacity="0.55"/>
  <rect x="616" y="450" width="22" height="40" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="619" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Sat</text>
  <!-- Sun -->
  <rect x="690" y="445" width="22" height="45" rx="3" fill="#22d3ee" opacity="0.5"/>
  <rect x="716" y="452" width="22" height="38" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="719" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Sun</text>

  <!-- Legend for bar chart -->
  <rect x="40" y="524" width="12" height="8" rx="2" fill="#22d3ee" opacity="0.7"/>
  <text x="58" y="532" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">This Week</text>
  <rect x="150" y="524" width="12" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
  <text x="168" y="532" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Last Week</text>
  <text x="760" y="532" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.5)">-12% avg improvement</text>

  <text x="400" y="572" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.3)" letter-spacing="2">ZAKEY ENERGY INTELLIGENCE</text>
</svg>