<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Hotel Guest Experience Panel">
  <defs>
    <linearGradient id="ge-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0c1a28"/>
    </linearGradient>
    <filter id="ge-glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#ge-bg)"/>
  <!-- Wood panel texture suggestion - very subtle -->
  <rect width="800" height="600" fill="rgba(40,20,5,0.08)"/>

  <!-- Panel outer frame -->
  <rect x="210" y="60" width="380" height="480" rx="16" fill="#06101c" stroke="#22d3ee" stroke-width="1.5" filter="url(#ge-glow)"/>
  <!-- Panel bezel -->
  <rect x="218" y="68" width="364" height="464" rx="12" fill="#050d18" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
  <!-- Screen -->
  <rect x="224" y="74" width="352" height="452" rx="10" fill="#071628"/>

  <!-- Zakey brand mark top corner -->
  <text x="248" y="100" font-family="system-ui, sans-serif" font-size="10" font-weight="800" fill="rgba(34,211,238,0.4)" letter-spacing="1">Z A K E Y</text>
  <line x1="244" y1="108" x2="560" y2="108" stroke="rgba(34,211,238,0.1)" stroke-width="0.8"/>

  <!-- Welcome heading -->
  <text x="400" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">Welcome to Your Room</text>
  <text x="400" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="rgba(255,255,255,0.92)">Mr. Hassan</text>

  <!-- Check-in info -->
  <rect x="244" y="178" width="312" height="38" rx="6" fill="#091a2e"/>
  <text x="260" y="195" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Check-In</text>
  <text x="260" y="208" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.75)">May 14, 2026 · 14:00</text>
  <text x="440" y="195" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Check-Out</text>
  <text x="440" y="208" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.75)">May 17, 2026</text>

  <!-- Scene tiles 2x2 -->
  <text x="260" y="238" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.45)" letter-spacing="1">SCENES</text>

  <!-- Relax - active -->
  <rect x="244" y="248" width="140" height="72" rx="8" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="1.4"/>
  <circle cx="270" cy="274" r="10" fill="#091a2e" stroke="#22d3ee" stroke-width="1"/>
  <!-- moon icon -->
  <path d="M265,270 Q263,274 265,278 Q271,281 275,276 Q271,275 270,270z" fill="#22d3ee" opacity="0.7"/>
  <text x="290" y="270" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#22d3ee">Relax</text>
  <text x="290" y="284" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">Active</text>
  <text x="290" y="308" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Lights 40% · 24°C</text>

  <!-- Sleep -->
  <rect x="396" y="248" width="140" height="72" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <circle cx="422" cy="274" r="10" fill="#091a2e" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <line x1="418" y1="272" x2="426" y2="272" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="420" y1="276" x2="424" y2="276" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="444" y="278" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">Sleep</text>
  <text x="444" y="308" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">Off all · Dark</text>

  <!-- Morning -->
  <rect x="244" y="330" width="140" height="72" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <circle cx="270" cy="356" r="10" fill="#091a2e" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <circle cx="270" cy="356" r="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="290" y="360" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">Morning</text>
  <text x="290" y="390" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">Bright · 22°C</text>

  <!-- Work -->
  <rect x="396" y="330" width="140" height="72" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <circle cx="422" cy="356" r="10" fill="#091a2e" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="416" y="351" width="12" height="9" rx="1" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="444" y="360" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.65)">Work</text>
  <text x="444" y="390" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">Focus · 70%</text>

  <!-- DND toggle -->
  <line x1="244" y1="418" x2="556" y2="418" stroke="rgba(34,211,238,0.1)" stroke-width="0.8"/>
  <text x="260" y="440" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">Do Not Disturb</text>
  <!-- Toggle off -->
  <rect x="468" y="428" width="44" height="22" rx="11" fill="#0c1e38" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <circle cx="480" cy="439" r="8" fill="rgba(255,255,255,0.3)"/>
  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.25)">Off</text>

  <!-- Check Out button -->
  <rect x="244" y="476" width="312" height="38" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="400" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Check Out</text>

  <!-- Bottom label -->
  <text x="400" y="566" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.3)" letter-spacing="2">ZAKEY HOTEL GUEST PANEL</text>
</svg>