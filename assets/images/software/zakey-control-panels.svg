<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Zakey Wall Control Panel">
  <defs>
    <linearGradient id="cp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>
    <radialGradient id="cp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="cp-ef">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#cp-bg)"/>
  <!-- Wall texture suggestion - subtle grain -->
  <rect width="800" height="600" fill="rgba(255,255,255,0.01)"/>
  <!-- Ambient glow behind panel -->
  <ellipse cx="400" cy="300" rx="220" ry="200" fill="url(#cp-glow)"/>
  <!-- Wall panel outer bezel frame -->
  <rect x="190" y="80" width="420" height="440" rx="18" fill="#07101e" stroke="#22d3ee" stroke-width="1.8" filter="url(#cp-ef)"/>
  <!-- Inner bezel -->
  <rect x="198" y="88" width="404" height="424" rx="14" fill="#060d1a" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <!-- Ambient light bar on left edge of panel -->
  <rect x="192" y="120" width="6" height="340" rx="3" fill="none" stroke="rgba(34,211,238,0.0)" stroke-width="0"/>
  <rect x="193" y="124" width="4" height="180" rx="2" fill="#22d3ee" opacity="0.18"/>
  <rect x="193" y="124" width="4" height="60" rx="2" fill="#22d3ee" opacity="0.3"/>
  <!-- Screen area -->
  <rect x="204" y="94" width="392" height="412" rx="12" fill="#071628"/>
  <!-- Screen top bar -->
  <rect x="204" y="94" width="392" height="44" rx="12" fill="#091e38"/>
  <rect x="204" y="118" width="392" height="20" rx="0" fill="#091e38"/>
  <text x="400" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="1">ZAKEY PANEL</text>
  <text x="400" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Smart Home Control · Living Room</text>
  <!-- 2x3 Scene tiles grid -->
  <!-- Row 1 -->
  <!-- Tile 1: Morning - active -->
  <rect x="220" y="152" width="108" height="74" rx="8" fill="#22d3ee" fill-opacity="0.18" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Sun icon -->
  <circle cx="274" cy="176" r="8" fill="none" stroke="#22d3ee" stroke-width="1.3"/>
  <line x1="274" y1="165" x2="274" y2="163" stroke="#22d3ee" stroke-width="1"/>
  <line x1="274" y1="189" x2="274" y2="191" stroke="#22d3ee" stroke-width="1"/>
  <line x1="263" y1="176" x2="261" y2="176" stroke="#22d3ee" stroke-width="1"/>
  <line x1="285" y1="176" x2="287" y2="176" stroke="#22d3ee" stroke-width="1"/>
  <text x="274" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#22d3ee">Morning</text>
  <text x="274" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="rgba(34,211,238,0.6)">Active</text>

  <!-- Tile 2: Movie -->
  <rect x="346" y="152" width="108" height="74" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="370" y="172" width="24" height="18" rx="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <polygon points="394,172 402,176 402,190 394,190 " fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="400" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)">Movie</text>

  <!-- Tile 3: Work -->
  <rect x="472" y="152" width="108" height="74" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="506" y="170" width="40" height="28" rx="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="496" y1="198" x2="556" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <text x="526" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)">Work</text>

  <!-- Row 2 -->
  <!-- Tile 4: Away -->
  <rect x="220" y="242" width="108" height="74" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="257" y="260" width="16" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <path d="M259,260 L259,252 Q259,247 265,247 Q271,247 271,252 L271,260" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <text x="274" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)">Away</text>

  <!-- Tile 5: Guest -->
  <rect x="346" y="242" width="108" height="74" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <polyline points="392,276 400,268 408,276" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <rect x="394" y="276" width="12" height="10" rx="1" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <text x="400" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)">Guest</text>

  <!-- Tile 6: Sleep -->
  <rect x="472" y="242" width="108" height="74" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <path d="M518,268 Q508,268 508,278 Q508,288 518,288 Q513,285 513,278 Q513,271 518,268z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <text x="526" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.65)">Sleep</text>

  <!-- Status line -->
  <line x1="220" y1="336" x2="580" y2="336" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <text x="220" y="356" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">All Lights</text>
  <rect x="320" y="344" width="100" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="320" y="344" width="70" height="8" rx="4" fill="#22d3ee" opacity="0.5"/>
  <text x="432" y="354" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.6)">70%</text>

  <text x="220" y="380" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">Climate</text>
  <text x="340" y="380" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">22°C  ·  Cooling</text>
  <circle cx="560" cy="376" r="6" fill="#0c1e38" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Zakey logo at bottom -->
  <text x="400" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.35)" letter-spacing="3">ZAKEY</text>

  <!-- Bottom labels outside panel -->
  <text x="400" y="556" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.4)" letter-spacing="2">ZAKEY CONTROL PANEL</text>
  <text x="400" y="574" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">In-Wall Touch Display · 7" · Android-based</text>
</svg>