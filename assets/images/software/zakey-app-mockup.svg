  <text x="252" y="241" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">22°C</text>
  <rect x="96" y="268" width="96" height="58" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="144" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Kitchen</text>
  <text x="144" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">2 devices</text>
  <rect x="204" y="268" width="96" height="58" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <text x="252" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)">Garage</text>
  <text x="252" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Closed</text>
  <!-- Active Scenes -->
  <text x="112" y="348" font-family="system-ui, sans-serif" font-size="9" fill="rgba(34,211,238,0.5)" letter-spacing="1">ACTIVE SCENES</text>
  <rect x="96" y="356" width="208" height="52" rx="8" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="1.2"/>
  <circle cx="120" cy="383" r="12" fill="#091a2e" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="120" cy="383" r="4" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="140" y="379" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#22d3ee">Morning</text>
  <text x="140" y="393" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.6)">Active · 6 automations</text>
