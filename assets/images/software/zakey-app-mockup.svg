  <text x="112" y="458" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">Today</text>
  <text x="112" y="474" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22d3ee">2.1 kWh</text>
  <rect x="224" y="444" width="6" height="30" rx="2" fill="rgba(34,211,238,0.2)"/>
  <rect x="224" y="454" width="6" height="20" rx="2" fill="#22d3ee" opacity="0.5"/>
  <rect x="234" y="444" width="6" height="30" rx="2" fill="rgba(34,211,238,0.2)"/>
  <rect x="234" y="448" width="6" height="26" rx="2" fill="#22d3ee" opacity="0.6"/>
  <rect x="244" y="444" width="6" height="30" rx="2" fill="rgba(34,211,238,0.2)"/>
  <rect x="244" y="450" width="6" height="24" rx="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="254" y="444" width="6" height="30" rx="2" fill="rgba(34,211,238,0.2)"/>
  <rect x="254" y="456" width="6" height="18" rx="2" fill="#22d3ee" opacity="0.7"/>
  <rect x="264" y="444" width="6" height="30" rx="2" fill="rgba(34,211,238,0.2)"/>
  <rect x="264" y="454" width="6" height="20" rx="2" fill="#22d3ee" opacity="0.85"/>
  <!-- Bottom nav -->
  <rect x="88" y="490" width="224" height="36" rx="0" fill="#060e1a"/>
  <rect x="88" y="490" width="224" height="1" fill="rgba(34,211,238,0.1)"/>
  <text x="138" y="513" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Home</text>
  <text x="200" y="513" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#22d3ee">Rooms</text>
  <text x="262" y="513" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">Settings</text>
  <rect x="172" y="524" width="56" height="3" rx="2" fill="rgba(255,255,255,0.25)"/>
  <!-- Label -->
  <text x="200" y="582" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(34,211,238,0.4)" letter-spacing="2">ZAKEY APP</text>
  <text x="200" y="598" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">iOS · Android · HarmonyOS</text>
</svg>