  <text x="144" y="241" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">4 devices</text>
  <rect x="204" y="200" width="96" height="58" rx="8" fill="#0c1e38" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
