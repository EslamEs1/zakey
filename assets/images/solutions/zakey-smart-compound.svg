  <line x1="580" y1="510" x2="400" y2="480" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="620" y1="510" x2="800" y2="480" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="490" x2="510" y2="420" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="490" x2="690" y2="420" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Ground -->
  <rect x="0" y="668" width="1200" height="2" fill="#22d3ee" fill-opacity="0.05"/>
  <path d="M0 800 Q400 770 700 785 Q950 800 1200 770 L1200 900 L0 900Z" fill="#05070d" fill-opacity="0.75"/>
