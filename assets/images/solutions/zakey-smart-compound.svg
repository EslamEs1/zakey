  <rect x="510" y="300" width="40" height="35" fill="#22d3ee" fill-opacity="0.08" rx="1"/>
  <rect x="455" y="355" width="40" height="35" fill="#22d3ee" fill-opacity="0.10" rx="1"/>
  <rect x="510" y="355" width="40" height="35" fill="#22d3ee" fill-opacity="0.15" rx="1"/>
  <rect x="455" y="410" width="40" height="35" fill="#22d3ee" fill-opacity="0.08" rx="1"/>
  <rect x="510" y="410" width="40" height="35" fill="#22d3ee" fill-opacity="0.12" rx="1"/>
  <rect x="455" y="465" width="40" height="35" fill="#22d3ee" fill-opacity="0.11" rx="1"/>
  <rect x="510" y="465" width="40" height="35" fill="#22d3ee" fill-opacity="0.09" rx="1"/>
  <rect x="455" y="520" width="40" height="35" fill="#22d3ee" fill-opacity="0.14" rx="1"/>
  <rect x="510" y="520" width="40" height="35" fill="#22d3ee" fill-opacity="0.07" rx="1"/>
  <rect x="475" y="590" width="60" height="50" fill="#091318" rx="1"/>

