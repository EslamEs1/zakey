  <rect x="340" y="490" width="45" height="45" fill="#22d3ee" fill-opacity="0.07" rx="2"/>
  <rect x="240" y="560" width="80" height="80" fill="#091318" rx="2"/>

  <!-- Building B — tower centre-left -->
  <rect x="440" y="280" width="140" height="360" fill="#0d1520" rx="3"/>
