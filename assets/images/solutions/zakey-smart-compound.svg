  <rect x="980" y="500" width="45" height="45" fill="#22d3ee" fill-opacity="0.07" rx="2"/>
  <rect x="875" y="558" width="80" height="82" fill="#091318" rx="2"/>

  <!-- Mesh bridge node — centre hub icon -->
  <circle cx="600" cy="510" r="20" fill="none" stroke="#22d3ee" stroke-opacity="0.30" stroke-width="1.5"/>
  <circle cx="600" cy="510" r="6" fill="#22d3ee" fill-opacity="0.35"/>
