<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0c0f17"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <!-- Ground line -->
  <rect x="0" y="650" width="1200" height="4" fill="#22d3ee" fill-opacity="0.06"/>
  <!-- Villa silhouette — main body -->
  <rect x="280" y="420" width="640" height="230" fill="#0c1a20" rx="4"/>
  <!-- Villa roofline — main -->
  <polygon points="240,420 600,200 960,420" fill="#091318"/>
  <!-- Wing left -->
  <rect x="160" y="500" width="160" height="150" fill="#0a1820"/>
  <polygon points="140,500 240,390 340,500" fill="#080f15"/>
  <!-- Wing right -->
  <rect x="880" y="500" width="160" height="150" fill="#0a1820"/>
  <polygon points="860,500 960,390 1060,500" fill="#080f15"/>
  <!-- Windows — main facade -->
  <rect x="340" y="490" width="80" height="70" fill="#22d3ee" fill-opacity="0.12" rx="2"/>
  <rect x="460" y="490" width="80" height="70" fill="#22d3ee" fill-opacity="0.10" rx="2"/>
  <rect x="660" y="490" width="80" height="70" fill="#22d3ee" fill-opacity="0.10" rx="2"/>
  <rect x="780" y="490" width="80" height="70" fill="#22d3ee" fill-opacity="0.12" rx="2"/>
  <!-- Central door -->
  <rect x="535" y="540" width="130" height="110" fill="#22d3ee" fill-opacity="0.08" rx="3"/>
  <!-- Aura panel cue -->
  <rect x="415" y="580" width="36" height="36" fill="#22d3ee" fill-opacity="0.18" rx="6"/>
  <circle cx="433" cy="598" r="8" fill="#22d3ee" fill-opacity="0.35"/>
  <!-- Upper window -->
  <rect x="530" y="290" width="140" height="90" fill="#22d3ee" fill-opacity="0.09" rx="2"/>
  <!-- Ambient strip -->
  <rect x="280" y="648" width="640" height="2" fill="#22d3ee" fill-opacity="0.20"/>
  <!-- Foreground path -->
  <path d="M0 800 Q300 760 600 780 Q900 800 1200 770 L1200 900 L0 900Z" fill="#05070d" fill-opacity="0.7"/>
  <!-- Accent dots -->
  <circle cx="200" cy="600" r="2" fill="#22d3ee" fill-opacity="0.3"/>
  <circle cx="1000" cy="600" r="2" fill="#22d3ee" fill-opacity="0.3"/>
  <!-- Wordmark -->
  <text x="600" y="840" font-family="Manrope,Inter,system-ui,sans-serif" font-size="22" font-weight="700"
        fill="#22d3ee" fill-opacity="0.45" text-anchor="middle" letter-spacing="8">ZAKEY</text>
  <text x="600" y="866" font-family="Manrope,Inter,system-ui,sans-serif" font-size="13" font-weight="400"
        fill="#9aa3b2" fill-opacity="0.40" text-anchor="middle" letter-spacing="3">SMART VILLA</text>
</svg>
