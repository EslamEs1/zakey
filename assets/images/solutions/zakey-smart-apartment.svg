  <rect x="760" y="420" width="30" height="45" fill="#22d3ee" fill-opacity="0.08" rx="2"/>

  <!-- Smart panel on facade -->
  <rect x="572" y="506" width="56" height="80" fill="#22d3ee" fill-opacity="0.08" rx="4"/>
