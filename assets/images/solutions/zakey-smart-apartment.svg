  <rect x="760" y="280" width="30" height="45" fill="#22d3ee" fill-opacity="0.13" rx="2"/>

  <rect x="410" y="350" width="55" height="45" fill="#22d3ee" fill-opacity="0.13" rx="2"/>
  <rect x="480" y="350" width="55" height="45" fill="#22d3ee" fill-opacity="0.08" rx="2"/>
  <rect x="550" y="350" width="55" height="45" fill="#22d3ee" fill-opacity="0.15" rx="2"/>
  <rect x="620" y="350" width="55" height="45" fill="#22d3ee" fill-opacity="0.09" rx="2"/>
  <rect x="690" y="350" width="55" height="45" fill="#22d3ee" fill-opacity="0.07" rx="2"/>
  <rect x="760" y="350" width="30" height="45" fill="#22d3ee" fill-opacity="0.11" rx="2"/>

