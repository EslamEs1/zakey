<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>Zakey Smart Apartment — Modern Studio Living</title>
  <defs>
    <linearGradient id="apt-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8d4f5"/>
      <stop offset="100%" stop-color="#d0eaff"/>
    </linearGradient>
    <linearGradient id="apt-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4aa74"/>
      <stop offset="100%" stop-color="#b8934a"/>
    </linearGradient>
    <linearGradient id="apt-sofa" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d4157"/>
      <stop offset="100%" stop-color="#232637"/>
    </linearGradient>
    <linearGradient id="apt-winspill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ddeeff" stop-opacity="0.45"/>
      <stop offset="65%" stop-color="#ddeeff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ddeeff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apt-cabinet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffd080" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="apt-cove" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="0"/>
      <stop offset="25%" stop-color="#fffde0" stop-opacity="0.65"/>
      <stop offset="75%" stop-color="#fffde0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="apt-ceilglow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="apt-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="apt-blur">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="apt-glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACK WALL warm white -->
  <rect x="0" y="0" width="800" height="500" fill="#f5f2ed"/>

  <!-- CEILING -->
  <rect x="0" y="0" width="800" height="72" fill="#fafaf8"/>
  <rect x="0" y="0" width="800" height="80" fill="url(#apt-ceilglow)"/>
  <!-- Ceiling shadow at junction -->
  <rect x="0" y="70" width="800" height="5" fill="#e5e2dd" opacity="0.7"/>

  <!-- Recessed LED panel -->
  <rect x="295" y="14" width="225" height="32" rx="2" fill="#f0f0ec"/>
  <rect x="303" y="17" width="209" height="26" rx="1" fill="#fffef5"/>
  <!-- Diffuser grille lines -->
  <line x1="320" y1="17" x2="320" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="347" y1="17" x2="347" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="374" y1="17" x2="374" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="401" y1="17" x2="401" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="428" y1="17" x2="428" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="455" y1="17" x2="455" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="482" y1="17" x2="482" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="503" y1="17" x2="503" y2="43" stroke="#e0e0dc" stroke-width="0.7"/>
  <!-- Horizontal grille lines -->
  <line x1="303" y1="26" x2="512" y2="26" stroke="#e0e0dc" stroke-width="0.7"/>
  <line x1="303" y1="35" x2="512" y2="35" stroke="#e0e0dc" stroke-width="0.7"/>
  <!-- Panel light glow -->
  <ellipse cx="408" cy="50" rx="125" ry="45" fill="#fffde0" opacity="0.28" filter="url(#apt-blur)"/>

  <!-- Ceiling cove LED strip -->
  <rect x="0" y="70" width="800" height="4" fill="url(#apt-cove)"/>
  <rect x="0" y="62" width="800" height="18" fill="url(#apt-cove)" opacity="0.3" filter="url(#apt-blur)"/>

  <!-- WINDOW: floor-to-ceiling, left 45% -->
  <!-- Window reveal surround -->
  <rect x="0" y="74" width="378" height="356" fill="#e2dfda"/>
  <!-- Glass: sky gradient -->
  <rect x="8" y="82" width="362" height="342" fill="url(#apt-sky)"/>

  <!-- City building silhouettes -->
  <rect x="15" y="190" width="55" height="234" fill="#c0d2e5" opacity="0.6"/>
  <rect x="22" y="160" width="35" height="264" fill="#b5c8de" opacity="0.55"/>
  <rect x="75" y="215" width="75" height="209" fill="#bdd0e3" opacity="0.58"/>
  <rect x="95" y="178" width="32" height="246" fill="#b0c5da" opacity="0.52"/>
  <rect x="165" y="205" width="52" height="219" fill="#c2d4e6" opacity="0.55"/>
  <rect x="185" y="238" width="22" height="186" fill="#ccdff0" opacity="0.45"/>
  <rect x="232" y="222" width="68" height="202" fill="#bccfe2" opacity="0.52"/>
  <rect x="308" y="218" width="48" height="206" fill="#c5d8ec" opacity="0.48"/>
  <!-- Building windows -->
  <rect x="28" y="188" width="5" height="7" fill="#fffff0" opacity="0.75"/>
  <rect x="39" y="188" width="5" height="7" fill="#fffff0" opacity="0.7"/>
  <rect x="28" y="204" width="5" height="7" fill="#fffff0" opacity="0.65"/>
  <rect x="39" y="204" width="5" height="7" fill="#fffff0" opacity="0.65"/>
  <rect x="28" y="220" width="5" height="7" fill="#fffff0" opacity="0.55"/>
  <rect x="84" y="230" width="6" height="8" fill="#fffff0" opacity="0.68"/>
  <rect x="97" y="230" width="6" height="8" fill="#fffff0" opacity="0.65"/>
  <rect x="84" y="246" width="6" height="8" fill="#fffff0" opacity="0.6"/>
  <rect x="97" y="246" width="6" height="8" fill="#fffff0" opacity="0.6"/>
  <rect x="175" y="218" width="5" height="7" fill="#fffff0" opacity="0.65"/>
  <rect x="187" y="218" width="5" height="7" fill="#fffff0" opacity="0.62"/>
  <rect x="175" y="234" width="5" height="7" fill="#fffff0" opacity="0.58"/>
  <rect x="243" y="240" width="6" height="7" fill="#fffff0" opacity="0.62"/>
  <rect x="256" y="240" width="6" height="7" fill="#fffff0" opacity="0.58"/>
  <rect x="315" y="235" width="5" height="7" fill="#fffff0" opacity="0.6"/>
  <rect x="327" y="235" width="5" height="7" fill="#fffff0" opacity="0.55"/>
  <!-- Tree canopies at city horizon -->
  <ellipse cx="55" cy="398" rx="38" ry="27" fill="#7aaa7a" opacity="0.62"/>
  <ellipse cx="130" cy="412" rx="42" ry="24" fill="#6a9a6a" opacity="0.58"/>
  <ellipse cx="215" cy="406" rx="32" ry="22" fill="#80b080" opacity="0.6"/>
  <ellipse cx="295" cy="410" rx="28" ry="19" fill="#78a878" opacity="0.55"/>
  <!-- Distant sky haze at horizon -->
  <rect x="8" y="360" width="362" height="64" fill="#e0f0ff" opacity="0.25"/>

  <!-- Window frame: dark charcoal -->
  <rect x="0" y="74" width="7" height="356" fill="#2c2c2c"/>
  <rect x="371" y="74" width="7" height="356" fill="#2c2c2c"/>
  <rect x="0" y="74" width="378" height="7" fill="#2c2c2c"/>
  <rect x="0" y="426" width="378" height="4" fill="#2c2c2c"/>
  <!-- Vertical mullion -->
  <rect x="182" y="80" width="5" height="346" fill="#2c2c2c"/>
  <!-- Horizontal mullion -->
  <rect x="7" y="238" width="364" height="5" fill="#2c2c2c"/>

  <!-- Window light spill into room -->
  <rect x="378" y="74" width="220" height="356" fill="url(#apt-winspill)"/>

  <!-- RIGHT WALL: living area -->
  <rect x="378" y="74" width="422" height="352" fill="#f5f2ed"/>

  <!-- KITCHEN AREA (back left, behind window edge) -->
  <rect x="378" y="195" width="130" height="235" fill="#ebe8e2"/>
  <!-- Upper cabinets -->
  <rect x="380" y="205" width="120" height="82" rx="1" fill="#f0eeea"/>
  <rect x="380" y="205" width="120" height="3" fill="#d8d5d0"/>
  <rect x="380" y="286" width="120" height="3" fill="#d8d5d0"/>
  <!-- Cabinet door left -->
  <rect x="383" y="209" width="52" height="73" fill="#f5f3ef" stroke="#dddad5" stroke-width="0.8" rx="0.5"/>
  <!-- Cabinet door right -->
  <rect x="439" y="209" width="57" height="73" fill="#f5f3ef" stroke="#dddad5" stroke-width="0.8" rx="0.5"/>
  <!-- Handles -->
  <rect x="405" y="244" width="9" height="2" rx="1" fill="#bab2aa"/>
  <rect x="462" y="244" width="9" height="2" rx="1" fill="#bab2aa"/>
  <!-- Marble counter -->
  <rect x="380" y="289" width="125" height="14" rx="1" fill="#e8e6e2"/>
  <!-- Marble veining -->
  <line x1="395" y1="293" x2="460" y2="298" stroke="#ccc" stroke-width="0.6" opacity="0.5"/>
  <line x1="408" y1="291" x2="490" y2="300" stroke="#ccc" stroke-width="0.5" opacity="0.38"/>
  <!-- Under-cabinet LED warm glow -->
  <rect x="380" y="289" width="125" height="6" fill="url(#apt-cabinet)" opacity="0.85"/>
  <rect x="380" y="282" width="125" height="22" fill="#ffe090" opacity="0.12" filter="url(#apt-blur)"/>
  <!-- Small items on counter -->
  <rect x="460" y="281" width="20" height="8" rx="1" fill="#e8e0d8"/>
  <rect x="485" y="283" width="12" height="6" rx="1" fill="#d8d0c8"/>

  <!-- RIGHT WALL LIVING AREA background detail -->
  <rect x="620" y="85" width="175" height="280" fill="#f0ede8"/>

  <!-- Wall-mounted TV -->
  <rect x="630" y="122" width="150" height="92" rx="3" fill="#111"/>
  <rect x="634" y="126" width="142" height="84" rx="2" fill="#0e1825"/>
  <!-- TV screen subtle content -->
  <rect x="634" y="126" width="142" height="84" rx="2" fill="#122030" opacity="0.9"/>
  <rect x="634" y="126" width="142" height="22" fill="#0a1520" opacity="0.7"/>
  <!-- Screen faint glow -->
  <ellipse cx="705" cy="210" rx="75" ry="18" fill="#204060" opacity="0.15" filter="url(#apt-blur)"/>
  <!-- TV mount -->
  <rect x="700" y="218" width="5" height="22" fill="#2a2a2a"/>
  <rect x="682" y="238" width="40" height="5" rx="2" fill="#333"/>

  <!-- Zakey Slim Panel next to TV -->
  <rect x="592" y="142" width="30" height="100" rx="4" fill="#f4f4f4"/>
  <rect x="595" y="145" width="24" height="94" rx="3" fill="#ececec" stroke="#ddd" stroke-width="0.7"/>
  <!-- Panel screen -->
  <rect x="598" y="154" width="18" height="42" rx="2" fill="#0f1620"/>
  <!-- Interface lines -->
  <line x1="600" y1="163" x2="614" y2="163" stroke="#00e5ff" stroke-width="1.2" opacity="0.85"/>
  <line x1="600" y1="170" x2="612" y2="170" stroke="#00e5ff" stroke-width="0.8" opacity="0.65"/>
  <line x1="600" y1="177" x2="610" y2="177" stroke="#00e5ff" stroke-width="0.8" opacity="0.52"/>
  <line x1="600" y1="184" x2="613" y2="184" stroke="#00e5ff" stroke-width="0.7" opacity="0.45"/>
  <!-- Status icons: small dots -->
  <circle cx="602" cy="191" r="1.5" fill="#00e5ff" opacity="0.7"/>
  <circle cx="607" cy="191" r="1.5" fill="#00ff88" opacity="0.7"/>
  <!-- Cyan LED ring -->
  <circle cx="607" cy="228" r="8" fill="#0f1620" stroke="#00e5ff" stroke-width="1.8"/>
  <circle cx="607" cy="228" r="4.5" fill="#00e5ff" opacity="0.55"/>
  <!-- Panel glow aura -->
  <ellipse cx="607" cy="200" rx="22" ry="55" fill="#00e5ff" opacity="0.04" filter="url(#apt-blur)"/>

  <!-- SOFA: 2-seater charcoal -->
  <!-- Shadow under sofa -->
  <ellipse cx="540" cy="432" rx="115" ry="13" fill="#8a7a60" opacity="0.22" filter="url(#apt-blur)"/>
  <!-- Sofa back -->
  <rect x="438" y="302" width="208" height="48" rx="5" fill="#2d3142"/>
  <!-- Sofa back cushion seam -->
  <line x1="542" y1="305" x2="542" y2="346" stroke="#1e2032" stroke-width="2.5"/>
  <!-- Back cushion top rounded feel -->
  <rect x="440" y="299" width="204" height="12" rx="5" fill="#333648"/>
  <!-- Sofa body/seat -->
  <rect x="438" y="345" width="208" height="82" rx="4" fill="url(#apt-sofa)"/>
  <!-- Seat cushion seam -->
  <line x1="542" y1="348" x2="542" y2="423" stroke="#1e2032" stroke-width="2"/>
  <!-- Sofa arms -->
  <rect x="432" y="312" width="20" height="100" rx="4" fill="#242737"/>
  <rect x="632" y="312" width="20" height="100" rx="4" fill="#242737"/>
  <!-- Sofa legs -->
  <rect x="445" y="420" width="9" height="14" rx="2" fill="#7a6848"/>
  <rect x="626" y="420" width="9" height="14" rx="2" fill="#7a6848"/>
  <!-- Scatter cushions orange/tan -->
  <rect x="450" y="314" width="52" height="37" rx="7" fill="#d07830"/>
  <rect x="455" y="317" width="42" height="31" rx="6" fill="#e08840"/>
  <!-- Cushion detail crease -->
  <line x1="462" y1="318" x2="490" y2="344" stroke="#c07028" stroke-width="0.8" opacity="0.5"/>
  <!-- Center button -->
  <circle cx="476" cy="333" r="3.5" fill="#b86820" opacity="0.55"/>
  <!-- Second cushion -->
  <rect x="555" y="312" width="55" height="38" rx="7" fill="#e09048"/>
  <rect x="559" y="315" width="47" height="32" rx="6" fill="#f0a058"/>
  <circle cx="582" cy="331" r="3.5" fill="#c87830" opacity="0.55"/>
  <!-- Small accent cushion (tan, leaning) -->
  <rect x="510" y="320" width="30" height="35" rx="5" fill="#c4a870" transform="rotate(-10 525 337)"/>

  <!-- Coffee table: round light oak -->
  <ellipse cx="540" cy="420" rx="58" ry="16" fill="#b89050" opacity="0.35"/>
  <ellipse cx="540" cy="413" rx="53" ry="13" fill="#d4aa74"/>
  <ellipse cx="540" cy="411" rx="50" ry="11" fill="#dbb882" stroke="#c09050" stroke-width="1.2"/>
  <!-- Table surface items: small succulent -->
  <ellipse cx="548" cy="408" rx="9" ry="7" fill="#4a7a4a" opacity="0.85"/>
  <ellipse cx="552" cy="405" rx="6" ry="5" fill="#5a8a5a" opacity="0.9"/>
  <!-- Magazine / book on table -->
  <rect x="518" y="408" width="22" height="14" rx="1" fill="#d0c8b8" transform="rotate(-5 529 415)"/>
  <rect x="519" y="408" width="22" height="3" rx="1" fill="#b09880" transform="rotate(-5 529 415)"/>

  <!-- FLOOR: light oak planks -->
  <!-- Floor base color -->
  <rect x="0" y="430" width="800" height="70" fill="#d4aa74"/>
  <!-- Plank strip shadow lines -->
  <rect x="0" y="430" width="800" height="3.5" fill="#b89050" opacity="0.5"/>
  <rect x="0" y="449" width="800" height="3" fill="#b89050" opacity="0.42"/>
  <rect x="0" y="466" width="800" height="3" fill="#b89050" opacity="0.4"/>
  <rect x="0" y="482" width="800" height="3" fill="#b89050" opacity="0.38"/>
  <rect x="0" y="497" width="800" height="3" fill="#b89050" opacity="0.32"/>
  <!-- Plank vertical joints (perspective) -->
  <line x1="80" y1="430" x2="60" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.25"/>
  <line x1="160" y1="430" x2="145" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.25"/>
  <line x1="240" y1="430" x2="228" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.25"/>
  <line x1="320" y1="430" x2="312" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.22"/>
  <line x1="400" y1="430" x2="396" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.22"/>
  <line x1="480" y1="430" x2="480" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.2"/>
  <line x1="560" y1="430" x2="562" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.2"/>
  <line x1="640" y1="430" x2="645" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.18"/>
  <line x1="720" y1="430" x2="728" y2="500" stroke="#c09050" stroke-width="0.8" opacity="0.18"/>
  <!-- Window light patch on floor -->
  <polygon points="8,430 370,430 330,500 0,500" fill="#ddeeff" opacity="0.22"/>

  <!-- SMART DEVICES -->
  <!-- Dome camera: top right corner -->
  <ellipse cx="788" cy="80" rx="13" ry="9" fill="#252525"/>
  <ellipse cx="788" cy="80" rx="10" ry="7" fill="#161616"/>
  <circle cx="788" cy="80" r="4.5" fill="#080818"/>
  <circle cx="787" cy="79" r="2" fill="#00e5ff" opacity="0.55"/>
  <!-- Status dot -->
  <circle cx="795" cy="76" r="2.2" fill="#ff4040" opacity="0.85"/>
  <!-- Camera glow -->
  <ellipse cx="788" cy="85" rx="20" ry="12" fill="#00e5ff" opacity="0.05" filter="url(#apt-blur)"/>

  <!-- Motion sensor: ceiling center -->
  <ellipse cx="550" cy="74" rx="15" ry="6" fill="#eeeeea"/>
  <ellipse cx="550" cy="74" rx="12" ry="4.5" fill="#e0e0dc"/>
  <ellipse cx="550" cy="73" rx="7" ry="3" fill="#d4d4d0"/>
  <circle cx="559" cy="71" r="2.2" fill="#00e5ff" opacity="0.9"/>
  <!-- Sensor glow -->
  <ellipse cx="550" cy="78" rx="18" ry="10" fill="#00e5ff" opacity="0.06" filter="url(#apt-blur)"/>

  <!-- Left corner camera (small) -->
  <ellipse cx="16" cy="80" rx="10" ry="7" fill="#252525"/>
  <circle cx="16" cy="80" r="4" fill="#111"/>
  <circle cx="16" cy="79" r="2" fill="#00e5ff" opacity="0.4"/>

  <!-- Baseboard trim -->
  <rect x="378" y="424" width="422" height="9" fill="#e5e2dd"/>
  <rect x="0" y="427" width="378" height="6" fill="#d8d5d0"/>

  <!-- Wall/window corner divider line -->
  <line x1="378" y1="74" x2="378" y2="434" stroke="#c8c4be" stroke-width="2.5"/>

  <!-- Floor lamp background right -->
  <rect x="764" y="155" width="5" height="275" fill="#b0a898"/>
  <ellipse cx="766" cy="160" rx="24" ry="12" fill="#e8e4dc"/>
  <ellipse cx="766" cy="159" rx="21" ry="10" fill="#f5f0e8"/>
  <!-- Shade detail -->
  <ellipse cx="766" cy="168" rx="18" ry="5" fill="#e0dbd2" opacity="0.5"/>
  <!-- Lamp warm glow -->
  <ellipse cx="766" cy="190" rx="45" ry="45" fill="#ffe8a0" opacity="0.12" filter="url(#apt-blur)"/>

</svg>
