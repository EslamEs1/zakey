  <rect x="314" y="390" width="24" height="2" fill="#22d3ee" fill-opacity="0.30"/>
  <rect x="314" y="396" width="18" height="2" fill="#22d3ee" fill-opacity="0.20"/>
  <!-- Ambient strip -->
  <rect x="300" y="668" width="600" height="2" fill="#22d3ee" fill-opacity="0.20"/>
