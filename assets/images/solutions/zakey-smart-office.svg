  <rect x="523" y="315" width="12" height="130" rx="2" fill="#261810"/>
  <!-- Desk feet/base -->
  <rect x="68" y="438" width="20" height="12" rx="2" fill="#1e1208"/>
  <rect x="510" y="438" width="20" height="12" rx="2" fill="#1e1208"/>

  <!-- Laptop on desk (silver) -->
  <rect x="260" y="300" width="120" height="80" rx="3" fill="#c8c8c8"/>
  <rect x="264" y="303" width="112" height="73" rx="2" fill="#9a9a9a" opacity="0.4"/>
  <!-- Laptop screen -->
  <rect x="264" y="303" width="112" height="73" rx="2" fill="#1a2040"/>
  <!-- Screen content lines -->
  <rect x="268" y="308" width="70" height="5" rx="1" fill="#4060a0" opacity="0.7"/>
  <line x1="268" y1="317" x2="372" y2="317" stroke="#5070b0" stroke-width="1" opacity="0.5"/>
  <line x1="268" y1="323" x2="360" y2="323" stroke="#5070b0" stroke-width="1" opacity="0.45"/>
  <line x1="268" y1="329" x2="355" y2="329" stroke="#5070b0" stroke-width="0.8" opacity="0.4"/>
  <rect x="268" y="334" width="45" height="4" rx="1" fill="#3050a0" opacity="0.5"/>
  <!-- Laptop base keyboard -->
