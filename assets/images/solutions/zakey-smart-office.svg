  <rect x="604" y="164" width="142" height="74" fill="#22d3ee" fill-opacity="0.08" rx="1"/>
  <rect x="754" y="164" width="142" height="74" fill="#22d3ee" fill-opacity="0.15" rx="1"/>

  <rect x="304" y="244" width="142" height="74" fill="#22d3ee" fill-opacity="0.13" rx="1"/>
  <rect x="454" y="244" width="142" height="74" fill="#22d3ee" fill-opacity="0.07" rx="1"/>
  <rect x="604" y="244" width="142" height="74" fill="#22d3ee" fill-opacity="0.16" rx="1"/>
  <rect x="754" y="244" width="142" height="74" fill="#22d3ee" fill-opacity="0.09" rx="1"/>

  <rect x="304" y="324" width="142" height="74" fill="#22d3ee" fill-opacity="0.08" rx="1"/>
  <rect x="454" y="324" width="142" height="74" fill="#22d3ee" fill-opacity="0.14" rx="1"/>
  <rect x="604" y="324" width="142" height="74" fill="#22d3ee" fill-opacity="0.10" rx="1"/>
  <rect x="754" y="324" width="142" height="74" fill="#22d3ee" fill-opacity="0.12" rx="1"/>

  <rect x="304" y="404" width="142" height="74" fill="#22d3ee" fill-opacity="0.12" rx="1"/>
  <rect x="454" y="404" width="142" height="74" fill="#22d3ee" fill-opacity="0.09" rx="1"/>
  <rect x="604" y="404" width="142" height="74" fill="#22d3ee" fill-opacity="0.13" rx="1"/>
  <rect x="754" y="404" width="142" height="74" fill="#22d3ee" fill-opacity="0.08" rx="1"/>

  <rect x="304" y="484" width="142" height="74" fill="#22d3ee" fill-opacity="0.09" rx="1"/>
  <rect x="454" y="484" width="142" height="74" fill="#22d3ee" fill-opacity="0.15" rx="1"/>
  <rect x="604" y="484" width="142" height="74" fill="#22d3ee" fill-opacity="0.07" rx="1"/>
