<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>Zakey Smart Office — Premium Executive Space</title>
  <defs>
    <linearGradient id="off-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b9fd4"/>
      <stop offset="60%" stop-color="#82b8e8"/>
      <stop offset="100%" stop-color="#a8d0f0"/>
    </linearGradient>
    <linearGradient id="off-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eae6e0"/>
      <stop offset="100%" stop-color="#d8d4ce"/>
    </linearGradient>
    <linearGradient id="off-desk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1f12"/>
      <stop offset="50%" stop-color="#3a2818"/>
      <stop offset="100%" stop-color="#2d1f12"/>
    </linearGradient>
    <linearGradient id="off-navywall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2040"/>
      <stop offset="100%" stop-color="#141830"/>
    </linearGradient>
    <linearGradient id="off-ceiling" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f8f6"/>
      <stop offset="100%" stop-color="#f2f0ee"/>
    </linearGradient>
    <linearGradient id="off-cove" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe8b0" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ffe8b0" stop-opacity="0.6"/>
      <stop offset="75%" stop-color="#ffe8b0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffe8b0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="off-downlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe090" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe090" stop-opacity="0"/>
    </radialGradient>
    <filter id="off-blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="off-soft">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="off-glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- CEILING: white coffered -->
  <rect x="0" y="0" width="800" height="75" fill="url(#off-ceiling)"/>
  <!-- Coffered ceiling detail: recessed panel lines -->
  <rect x="20" y="10" width="340" height="55" rx="3" fill="none" stroke="#e0ddd8" stroke-width="1.5"/>
  <rect x="28" y="16" width="324" height="43" rx="2" fill="none" stroke="#d8d5d0" stroke-width="0.8"/>
  <rect x="440" y="10" width="340" height="55" rx="3" fill="none" stroke="#e0ddd8" stroke-width="1.5"/>
  <rect x="448" y="16" width="324" height="43" rx="2" fill="none" stroke="#d8d5d0" stroke-width="0.8"/>
  <!-- LED strip in cove -->
  <rect x="0" y="73" width="800" height="4" fill="url(#off-cove)"/>
  <rect x="0" y="65" width="800" height="20" fill="url(#off-cove)" opacity="0.28" filter="url(#off-soft)"/>
  <!-- Ceiling shadow at wall junction -->
  <rect x="0" y="72" width="800" height="6" fill="#d8d5d0" opacity="0.55"/>

  <!-- Warm downlights in ceiling -->
  <circle cx="200" cy="30" r="7" fill="#ffe8a0" opacity="0.65"/>
  <circle cx="400" cy="30" r="7" fill="#ffe8a0" opacity="0.6"/>
  <circle cx="600" cy="30" r="7" fill="#ffe8a0" opacity="0.65"/>
  <ellipse cx="200" cy="38" rx="30" ry="20" fill="url(#off-downlight)" filter="url(#off-soft)"/>
  <ellipse cx="400" cy="38" rx="30" ry="20" fill="url(#off-downlight)" filter="url(#off-soft)"/>
  <ellipse cx="600" cy="38" rx="30" ry="20" fill="url(#off-downlight)" filter="url(#off-soft)"/>

  <!-- LEFT WALL: dark navy accent -->
  <rect x="0" y="78" width="360" height="352" fill="url(#off-navywall)"/>

  <!-- Framed abstract artwork on navy wall -->
  <rect x="22" y="95" width="155" height="120" rx="2" fill="#0f1530" stroke="#8a8a6a" stroke-width="2"/>
  <rect x="26" y="99" width="147" height="112" fill="#141a3a"/>
  <!-- Abstract shapes in artwork -->
  <ellipse cx="80" cy="148" rx="35" ry="40" fill="#2a4080" opacity="0.8"/>
  <ellipse cx="115" cy="130" rx="22" ry="32" fill="#b06030" opacity="0.6"/>
  <ellipse cx="130" cy="158" rx="18" ry="22" fill="#d4a038" opacity="0.55"/>
  <rect x="55" y="100" width="25" height="80" fill="#8090a8" opacity="0.3"/>
  <ellipse cx="95" cy="175" rx="20" ry="8" fill="#f0e0c0" opacity="0.35"/>
  <!-- Frame inner shadow -->
  <rect x="26" y="99" width="147" height="112" fill="none" stroke="#0f1530" stroke-width="3" opacity="0.4"/>

  <!-- Floating shelf on navy wall -->
  <rect x="16" y="228" width="198" height="9" rx="1" fill="#1e2848"/>
  <!-- Shelf items: books -->
  <rect x="22" y="207" width="12" height="22" fill="#8a2018"/>
  <rect x="36" y="210" width="9" height="19" fill="#c8a028" opacity="0.8"/>
  <rect x="47" y="212" width="11" height="17" fill="#305870"/>
  <rect x="60" y="214" width="8" height="15" fill="#5a2808"/>
  <!-- Small plant -->
  <ellipse cx="110" cy="214" rx="14" ry="10" fill="#1a4a1a" opacity="0.85"/>
  <ellipse cx="115" cy="210" rx="9" ry="7" fill="#265a26" opacity="0.9"/>
  <rect x="106" y="223" width="8" height="6" rx="1" fill="#3a2010"/>
  <!-- Decorative sculpture piece -->
  <rect x="158" y="216" width="12" height="13" rx="2" fill="#8a8858" opacity="0.7"/>
  <ellipse cx="164" cy="216" rx="8" ry="5" fill="#a0a070" opacity="0.65"/>

  <!-- Zakey smart control panel on navy wall -->
  <rect x="215" y="130" width="35" height="140" rx="4" fill="#0a0e20"/>
  <rect x="218" y="133" width="29" height="134" rx="3" fill="#06080f" stroke="#2a3060" stroke-width="0.8"/>
  <!-- Panel screen dark, showing calendar/schedule -->
  <rect x="221" y="140" width="23" height="55" rx="2" fill="#020510"/>
  <!-- Calendar graphic lines (simulated schedule view) -->
  <rect x="223" y="143" width="19" height="5" rx="1" fill="#00e5ff" opacity="0.7"/>
  <line x1="223" y1="152" x2="240" y2="152" stroke="#00e5ff" stroke-width="0.8" opacity="0.55"/>
  <line x1="223" y1="156" x2="237" y2="156" stroke="#8090ff" stroke-width="0.8" opacity="0.5"/>
  <rect x="223" y="159" width="10" height="3" rx="1" fill="#00e5ff" opacity="0.4"/>
  <line x1="223" y1="165" x2="240" y2="165" stroke="#00e5ff" stroke-width="0.8" opacity="0.48"/>
  <line x1="223" y1="169" x2="236" y2="169" stroke="#8090ff" stroke-width="0.8" opacity="0.42"/>
  <rect x="223" y="172" width="13" height="3" rx="1" fill="#00e5ff" opacity="0.38"/>
  <line x1="223" y1="177" x2="240" y2="177" stroke="#00e5ff" stroke-width="0.8" opacity="0.42"/>
  <line x1="223" y1="181" x2="238" y2="181" stroke="#8090ff" stroke-width="0.8" opacity="0.38"/>
  <line x1="223" y1="185" x2="240" y2="185" stroke="#00e5ff" stroke-width="0.8" opacity="0.38"/>
  <line x1="223" y1="189" x2="235" y2="189" stroke="#8090ff" stroke-width="0.8" opacity="0.35"/>
  <!-- Panel buttons below screen -->
  <circle cx="224" cy="204" r="2.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="231" cy="204" r="2.5" fill="#3060ff" opacity="0.55"/>
  <circle cx="238" cy="204" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="231" cy="212" r="3" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
  <circle cx="231" cy="212" r="1.5" fill="#00e5ff" opacity="0.5"/>
  <!-- Cyan glow -->
  <ellipse cx="231" cy="185" rx="25" ry="72" fill="#00e5ff" opacity="0.04" filter="url(#off-blur)"/>
  <!-- Sensor dot on panel -->
  <circle cx="238" cy="220" r="2" fill="#00ff88" opacity="0.7"/>

  <!-- RIGHT HALF: Floor-to-ceiling windows -->
  <!-- Window surround/wall -->
  <rect x="360" y="78" width="440" height="352" fill="#e8e5e0"/>
  <!-- Window glass sections (3 panels separated by slim mullions) -->
  <!-- Left window pane -->
  <rect x="368" y="85" width="132" height="338" fill="url(#off-sky)"/>
  <!-- Center window pane -->
  <rect x="506" y="85" width="132" height="338" fill="url(#off-sky)"/>
  <!-- Right window pane -->
  <rect x="644" y="85" width="146" height="338" fill="url(#off-sky)"/>
  <!-- Slim black aluminum mullions -->
  <rect x="360" y="78" width="6" height="352" fill="#1a1a1a"/>
  <rect x="497" y="78" width="9" height="352" fill="#1a1a1a"/>
  <rect x="635" y="78" width="9" height="352" fill="#1a1a1a"/>
  <rect x="794" y="78" width="6" height="352" fill="#1a1a1a"/>
  <rect x="360" y="78" width="440" height="6" fill="#1a1a1a"/>
  <rect x="360" y="424" width="440" height="6" fill="#1a1a1a"/>

  <!-- City buildings through window -->
  <rect x="380" y="230" width="80" height="193" fill="#b0c8dc" opacity="0.55"/>
  <rect x="392" y="195" width="45" height="228" fill="#a5bcda" opacity="0.5"/>
  <!-- Building windows -->
  <rect x="398" y="210" width="6" height="8" fill="#fffff0" opacity="0.6"/>
  <rect x="410" y="210" width="6" height="8" fill="#fffff0" opacity="0.6"/>
  <rect x="398" y="228" width="6" height="8" fill="#fffff0" opacity="0.55"/>
  <rect x="410" y="228" width="6" height="8" fill="#fffff0" opacity="0.55"/>
  <rect x="520" y="245" width="85" height="178" fill="#b5c8dc" opacity="0.52"/>
  <rect x="535" y="215" width="40" height="208" fill="#a8bed8" opacity="0.48"/>
  <rect x="538" y="230" width="6" height="7" fill="#fffff0" opacity="0.55"/>
  <rect x="550" y="230" width="6" height="7" fill="#fffff0" opacity="0.55"/>
  <rect x="538" y="248" width="6" height="7" fill="#fffff0" opacity="0.5"/>
  <rect x="660" y="250" width="100" height="173" fill="#b8cae0" opacity="0.5"/>
  <rect x="675" y="220" width="55" height="203" fill="#b0c2da" opacity="0.48"/>
  <rect x="680" y="235" width="6" height="7" fill="#fffff0" opacity="0.55"/>
  <rect x="695" y="235" width="6" height="7" fill="#fffff0" opacity="0.55"/>
  <!-- Tree tops at base of windows -->
  <ellipse cx="410" cy="398" rx="42" ry="28" fill="#2a6a2a" opacity="0.55"/>
  <ellipse cx="470" cy="408" rx="35" ry="22" fill="#206020" opacity="0.5"/>
  <ellipse cx="570" cy="402" rx="38" ry="26" fill="#287828" opacity="0.52"/>
  <ellipse cx="650" cy="412" rx="40" ry="24" fill="#206020" opacity="0.48"/>
  <ellipse cx="720" cy="406" rx="35" ry="22" fill="#2a6a2a" opacity="0.5"/>
  <!-- Sky haze at horizon -->
  <rect x="365" y="360" width="428" height="65" fill="#d8ecff" opacity="0.22"/>

  <!-- FLOOR: marble-look tiles -->
  <rect x="0" y="430" width="800" height="70" fill="url(#off-floor)"/>
  <!-- Tile grid lines (marble grout) -->
  <line x1="0" y1="430" x2="800" y2="430" stroke="#c8c4be" stroke-width="1.5"/>
  <!-- Horizontal grout lines -->
  <line x1="0" y1="462" x2="800" y2="462" stroke="#c8c4be" stroke-width="0.8" opacity="0.65"/>
  <line x1="0" y1="491" x2="800" y2="491" stroke="#c8c4be" stroke-width="0.8" opacity="0.55"/>
  <!-- Vertical grout lines -->
  <line x1="100" y1="430" x2="100" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.55"/>
  <line x1="200" y1="430" x2="200" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.5"/>
  <line x1="300" y1="430" x2="300" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.5"/>
  <line x1="400" y1="430" x2="400" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.5"/>
  <line x1="500" y1="430" x2="500" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.5"/>
  <line x1="600" y1="430" x2="600" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.5"/>
  <line x1="700" y1="430" x2="700" y2="500" stroke="#c8c4be" stroke-width="0.8" opacity="0.5"/>
  <!-- Gray veining on floor tiles -->
  <line x1="50" y1="432" x2="120" y2="460" stroke="#b8b4ae" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="435" x2="280" y2="458" stroke="#b8b4ae" stroke-width="0.5" opacity="0.35"/>
  <line x1="450" y1="432" x2="520" y2="462" stroke="#b8b4ae" stroke-width="0.5" opacity="0.38"/>
  <line x1="620" y1="435" x2="690" y2="460" stroke="#b8b4ae" stroke-width="0.5" opacity="0.35"/>

  <!-- EXECUTIVE DESK: large dark walnut -->
  <!-- Desk shadow on floor -->
  <ellipse cx="300" cy="435" rx="240" ry="18" fill="#808070" opacity="0.2" filter="url(#off-soft)"/>
  <!-- Desk top surface -->
  <rect x="60" y="310" width="475" height="130" rx="5" fill="url(#off-desk)"/>
  <!-- Wood grain lines on desk -->
  <line x1="65" y1="330" x2="530" y2="330" stroke="#261810" stroke-width="0.8" opacity="0.45"/>
  <line x1="65" y1="350" x2="530" y2="350" stroke="#261810" stroke-width="0.7" opacity="0.35"/>
  <line x1="65" y1="370" x2="530" y2="370" stroke="#261810" stroke-width="0.7" opacity="0.32"/>
  <line x1="65" y1="390" x2="530" y2="390" stroke="#261810" stroke-width="0.7" opacity="0.3"/>
  <line x1="65" y1="410" x2="530" y2="410" stroke="#261810" stroke-width="0.6" opacity="0.28"/>
  <!-- Desk front edge highlight -->
