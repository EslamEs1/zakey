  <ellipse cx="130" cy="387" rx="15" ry="6" fill="#5a3820" opacity="0.7"/>
  <rect x="124" y="377" width="12" height="12" rx="2" fill="#4a2810" opacity="0.75"/>

  <!-- MEETING CORNER (left background near navy wall) -->
  <!-- Armchair 1: dark green velvet -->
  <rect x="15" y="310" width="75" height="110" rx="6" fill="#1a3828"/>
  <rect x="20" y="315" width="65" height="70" rx="4" fill="#1e4030"/>
  <!-- Chair back seam -->
  <line x1="52" y1="318" x2="52" y2="380" stroke="#162e22" stroke-width="1.5" opacity="0.6"/>
  <!-- Armrests -->
  <rect x="12" y="345" width="14" height="45" rx="3" fill="#162e22"/>
  <rect x="79" y="345" width="14" height="45" rx="3" fill="#162e22"/>
  <!-- Seat -->
  <rect x="17" y="382" width="71" height="28" rx="5" fill="#182e20"/>
  <!-- Chair legs -->
  <rect x="20" y="408" width="7" height="14" rx="2" fill="#1a1208"/>
  <rect x="79" y="408" width="7" height="14" rx="2" fill="#1a1208"/>

  <!-- Small round meeting table -->
  <ellipse cx="185" cy="380" rx="42" ry="12" fill="#2a1810" opacity="0.4"/>
  <ellipse cx="185" cy="373" rx="38" ry="10" fill="#3a2818"/>
  <ellipse cx="185" cy="371" rx="36" ry="9" fill="#4a3828" stroke="#3a2818" stroke-width="1"/>
  <!-- Table shadow leg -->
  <rect x="182" y="381" width="6" height="12" rx="2" fill="#2a1810"/>
