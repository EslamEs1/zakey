  <rect x="450" y="160" width="4" height="510" fill="#22d3ee" fill-opacity="0.05"/>
  <rect x="600" y="160" width="4" height="510" fill="#22d3ee" fill-opacity="0.05"/>
  <rect x="750" y="160" width="4" height="510" fill="#22d3ee" fill-opacity="0.05"/>
  <!-- Horizontal floor lines -->
  <rect x="300" y="240" width="600" height="2" fill="#22d3ee" fill-opacity="0.06"/>
  <rect x="300" y="320" width="600" height="2" fill="#22d3ee" fill-opacity="0.06"/>
  <rect x="300" y="400" width="600" height="2" fill="#22d3ee" fill-opacity="0.06"/>
  <rect x="300" y="480" width="600" height="2" fill="#22d3ee" fill-opacity="0.06"/>
  <rect x="300" y="560" width="600" height="2" fill="#22d3ee" fill-opacity="0.06"/>
