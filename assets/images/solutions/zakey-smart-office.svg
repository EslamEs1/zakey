<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0c0f17"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <!-- Office tower — glass curtain wall style -->
  <rect x="300" y="160" width="600" height="510" fill="#0d1820" rx="4"/>
