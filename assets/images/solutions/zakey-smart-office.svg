  <rect x="0" y="670" width="1200" height="2" fill="#22d3ee" fill-opacity="0.05"/>
  <path d="M0 790 Q300 760 600 775 Q900 790 1200 760 L1200 900 L0 900Z" fill="#05070d" fill-opacity="0.75"/>
