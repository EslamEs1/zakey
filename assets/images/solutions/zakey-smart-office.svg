  <rect x="262" y="376" width="116" height="5" rx="1" fill="#a8a8a8"/>
  <!-- Keyboard lines -->
  <line x1="265" y1="377" x2="375" y2="377" stroke="#909090" stroke-width="0.5" opacity="0.4"/>
  <line x1="265" y1="379" x2="375" y2="379" stroke="#909090" stroke-width="0.5" opacity="0.4"/>
  <!-- Laptop hinge -->
  <rect x="260" y="372" width="120" height="5" rx="1" fill="#d0d0d0"/>

  <!-- Notepad on desk -->
  <rect x="175" y="335" width="62" height="80" rx="2" fill="#f5f0e8" transform="rotate(-3 206 375)"/>
  <rect x="177" y="337" width="58" height="76" rx="1" fill="#faf6f0" transform="rotate(-3 206 375)"/>
  <!-- Note lines -->
  <line x1="180" y1="348" x2="232" y2="347" stroke="#d0ccc0" stroke-width="0.8" opacity="0.6" transform="rotate(-3 206 375)"/>
  <line x1="180" y1="358" x2="232" y2="357" stroke="#d0ccc0" stroke-width="0.8" opacity="0.55" transform="rotate(-3 206 375)"/>
  <line x1="180" y1="368" x2="228" y2="367" stroke="#d0ccc0" stroke-width="0.8" opacity="0.5" transform="rotate(-3 206 375)"/>
  <!-- Pen on notepad -->
  <rect x="238" y="340" width="4" height="70" rx="2" fill="#2a2a2a" transform="rotate(-5 240 375)"/>
  <rect x="238" y="340" width="4" height="8" rx="2" fill="#c8a028" transform="rotate(-5 240 375)"/>

  <!-- Small succulent on desk -->
  <ellipse cx="490" cy="323" rx="16" ry="12" fill="#1a4a1a" opacity="0.85"/>
  <ellipse cx="496" cy="318" rx="10" ry="8" fill="#206020" opacity="0.9"/>
  <ellipse cx="487" cy="316" rx="7" ry="6" fill="#286028" opacity="0.85"/>
  <rect x="483" y="330" width="14" height="8" rx="2" fill="#5a3818"/>

  <!-- EXECUTIVE CHAIR: dark leather, high-back -->
  <rect x="235" y="230" width="115" height="220" rx="8" fill="#1a1a1a"/>
  <!-- Chair back (tall) -->
  <rect x="240" y="235" width="105" height="155" rx="6" fill="#1e1e1e"/>
  <!-- Chair back seam lines (leather) -->
  <line x1="292" y1="238" x2="292" y2="385" stroke="#141414" stroke-width="2" opacity="0.7"/>
  <line x1="260" y1="275" x2="325" y2="275" stroke="#141414" stroke-width="1" opacity="0.5"/>
  <line x1="255" y1="310" x2="330" y2="310" stroke="#141414" stroke-width="1" opacity="0.45"/>
  <line x1="252" y1="345" x2="332" y2="345" stroke="#141414" stroke-width="1" opacity="0.4"/>
  <!-- Headrest visible top -->
  <rect x="255" y="232" width="75" height="28" rx="5" fill="#222222"/>
  <rect x="259" y="234" width="67" height="24" rx="4" fill="#1a1a1a"/>
  <!-- Chair armrests -->
  <rect x="230" y="310" width="18" height="55" rx="4" fill="#252525"/>
  <rect x="339" y="310" width="18" height="55" rx="4" fill="#252525"/>
  <!-- Armrest pads -->
  <rect x="231" y="308" width="16" height="12" rx="3" fill="#1a1a1a"/>
  <rect x="340" y="308" width="16" height="12" rx="3" fill="#1a1a1a"/>
  <!-- Chair seat -->
  <rect x="237" y="383" width="113" height="32" rx="6" fill="#1e1e1e"/>
  <rect x="240" y="385" width="107" height="28" rx="5" fill="#161616"/>
  <!-- Chair base/pedestal -->
  <rect x="278" y="412" width="32" height="25" rx="3" fill="#202020"/>
  <!-- Chair wheels -->
  <ellipse cx="235" cy="440" rx="12" ry="6" fill="#1a1a1a"/>
  <ellipse cx="351" cy="440" rx="12" ry="6" fill="#1a1a1a"/>
  <ellipse cx="293" cy="445" rx="12" ry="6" fill="#1a1a1a"/>

  <!-- SIDE CREDENZA: dark walnut -->
  <rect x="60" y="390" width="205" height="55" rx="3" fill="#2a1810"/>
  <rect x="60" y="390" width="205" height="8" rx="2" fill="#3a2818"/>
  <!-- Credenza doors -->
  <rect x="65" y="400" width="92" height="40" rx="1" fill="#311e10" stroke="#261508" stroke-width="0.8"/>
  <rect x="162" y="400" width="98" height="40" rx="1" fill="#311e10" stroke="#261508" stroke-width="0.8"/>
  <!-- Door handles -->
  <rect x="105" y="419" width="12" height="2" rx="1" fill="#8a6030"/>
  <rect x="200" y="419" width="12" height="2" rx="1" fill="#8a6030"/>
  <!-- Decorative objects on credenza top -->
