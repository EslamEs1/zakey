<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Avatar glow radials per quadrant -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Subtle background grid -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- Connection lines between all avatars (center crosses) -->
  <!-- Horizontal top row -->
  <line x1="200" y1="175" x2="600" y2="175" stroke="#00d4ff" stroke-width="0.75" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- Horizontal bottom row -->
  <line x1="200" y1="425" x2="600" y2="425" stroke="#00d4ff" stroke-width="0.75" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- Vertical left col -->
  <line x1="200" y1="175" x2="200" y2="425" stroke="#00d4ff" stroke-width="0.75" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- Vertical right col -->
  <line x1="600" y1="175" x2="600" y2="425" stroke="#00d4ff" stroke-width="0.75" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- Cross diagonals -->
  <line x1="200" y1="175" x2="600" y2="425" stroke="#00d4ff" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 8"/>
  <line x1="600" y1="175" x2="200" y2="425" stroke="#00d4ff" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 8"/>
  <!-- Center cross point -->
  <circle cx="400" cy="300" r="4" fill="none" stroke="#00d4ff" stroke-width="0.75" opacity="0.2"/>
  <circle cx="400" cy="300" r="1.5" fill="#00d4ff" opacity="0.2"/>

  <!-- ==========================================
       AVATAR 1 — Top Left — Engineering
       ========================================== -->
  <g>
    <!-- Glow zone -->
    <ellipse cx="200" cy="175" rx="130" ry="130" fill="url(#glow1)"/>
    <!-- Avatar circle (head) -->
    <circle cx="200" cy="155" r="38" fill="#0d1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <!-- Head highlight -->
    <circle cx="200" cy="155" r="36" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <!-- Face shape (minimal) -->
    <circle cx="200" cy="152" r="18" fill="#1a2a40"/>
    <!-- Eye dots -->
    <circle cx="193" cy="149" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="207" cy="149" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <!-- Mouth line -->
    <path d="M 194 158 Q 200 163 206 158" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <!-- Body silhouette -->
    <path d="M 162 205 Q 162 195 172 192 L 228 192 Q 238 195 238 205 L 238 230 Q 238 235 232 235 L 168 235 Q 162 235 162 230 Z"
      fill="#0d1a2e" stroke="#1a2a40" stroke-width="1"/>
    <!-- Shoulder/torso detail -->
    <line x1="200" y1="192" x2="200" y2="235" stroke="#1a3050" stroke-width="1" opacity="0.5"/>

    <!-- Engineering icon (circuit board) above avatar -->
    <g transform="translate(180, 88)" filter="url(#iconGlow)">
      <!-- Circuit board outline -->
      <rect x="0" y="0" width="40" height="30" rx="3" fill="#060e1a" stroke="#00d4ff" stroke-width="1.2"/>
      <!-- IC chip in center -->
      <rect x="14" y="9" width="12" height="12" rx="1" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="0.75"/>
      <!-- Chip pins left -->
      <line x1="0" y1="12" x2="14" y2="12" stroke="#00d4ff" stroke-width="0.75"/>
      <line x1="0" y1="18" x2="14" y2="18" stroke="#00d4ff" stroke-width="0.75"/>
      <!-- Chip pins right -->
      <line x1="26" y1="12" x2="40" y2="12" stroke="#00d4ff" stroke-width="0.75"/>
      <line x1="26" y1="18" x2="40" y2="18" stroke="#00d4ff" stroke-width="0.75"/>
      <!-- Traces top/bottom -->
      <line x1="10" y1="0" x2="10" y2="9" stroke="#00d4ff" stroke-width="0.75"/>
      <line x1="30" y1="0" x2="30" y2="9" stroke="#00d4ff" stroke-width="0.75"/>
      <line x1="10" y1="21" x2="10" y2="30" stroke="#00d4ff" stroke-width="0.75"/>
      <line x1="30" y1="21" x2="30" y2="30" stroke="#00d4ff" stroke-width="0.75"/>
      <!-- Via dots -->
      <circle cx="10" cy="4" r="2" fill="#00d4ff" opacity="0.5"/>
      <circle cx="30" cy="4" r="2" fill="#00d4ff" opacity="0.5"/>
      <circle cx="20" cy="15" r="1.5" fill="#00d4ff" opacity="0.8"/>
    </g>
    <!-- Label -->
    <text x="200" y="258" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1" opacity="0.9">ENGINEERING</text>
  </g>

  <!-- ==========================================
       AVATAR 2 — Top Right — Hospitality
       ========================================== -->
  <g>
    <ellipse cx="600" cy="175" rx="130" ry="130" fill="url(#glow2)"/>
    <!-- Avatar circle -->
    <circle cx="600" cy="155" r="38" fill="#0d1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="600" cy="155" r="36" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="600" cy="152" r="18" fill="#1a2a40"/>
    <circle cx="593" cy="149" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="607" cy="149" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <path d="M 594 158 Q 600 163 606 158" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <!-- Body -->
    <path d="M 562 205 Q 562 195 572 192 L 628 192 Q 638 195 638 205 L 638 230 Q 638 235 632 235 L 568 235 Q 562 235 562 230 Z"
      fill="#0d1a2e" stroke="#1a2a40" stroke-width="1"/>
    <line x1="600" y1="192" x2="600" y2="235" stroke="#1a3050" stroke-width="1" opacity="0.5"/>

    <!-- Hospitality icon (hotel/building) above avatar -->
    <g transform="translate(580, 88)" filter="url(#iconGlow)">
      <!-- Building outline -->
      <rect x="4" y="0" width="32" height="30" fill="#060e1a" stroke="#00d4ff" stroke-width="1.2"/>
      <!-- Roof accent -->
      <rect x="4" y="0" width="32" height="5" fill="#00d4ff" opacity="0.15"/>
      <!-- Windows grid 2x3 -->
      <rect x="9" y="8" width="6" height="6" rx="1" fill="#00d4ff" opacity="0.3"/>
      <rect x="25" y="8" width="6" height="6" rx="1" fill="#00d4ff" opacity="0.3"/>
      <rect x="9" y="17" width="6" height="6" rx="1" fill="#00d4ff" opacity="0.3"/>
      <rect x="25" y="17" width="6" height="6" rx="1" fill="#00d4ff" opacity="0.3"/>
      <!-- Door -->
      <rect x="16" y="20" width="8" height="10" rx="1" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="0.5"/>
      <!-- Flag / star on top -->
      <line x1="20" y1="0" x2="20" y2="-6" stroke="#00d4ff" stroke-width="1"/>
      <polygon points="20,-6 22,-3 20,-3" fill="#00d4ff" opacity="0.8"/>
    </g>
    <text x="600" y="258" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1" opacity="0.9">HOSPITALITY</text>
  </g>

  <!-- ==========================================
       AVATAR 3 — Bottom Left — Partners
       ========================================== -->
  <g>
    <ellipse cx="200" cy="425" rx="130" ry="130" fill="url(#glow3)"/>
    <circle cx="200" cy="405" r="38" fill="#0d1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="200" cy="405" r="36" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="200" cy="402" r="18" fill="#1a2a40"/>
    <circle cx="193" cy="399" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="207" cy="399" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <path d="M 194 408 Q 200 413 206 408" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <path d="M 162 455 Q 162 445 172 442 L 228 442 Q 238 445 238 455 L 238 480 Q 238 485 232 485 L 168 485 Q 162 485 162 480 Z"
      fill="#0d1a2e" stroke="#1a2a40" stroke-width="1"/>
    <line x1="200" y1="442" x2="200" y2="485" stroke="#1a3050" stroke-width="1" opacity="0.5"/>

    <!-- Partners icon (handshake) above avatar -->
    <g transform="translate(175, 340)" filter="url(#iconGlow)">
      <!-- Two hands meeting -->
      <!-- Left hand -->
      <path d="M 0 18 Q 2 14 6 13 L 18 12 Q 20 12 20 15 L 20 20" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 2 20 L 18 20" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Right hand -->
      <path d="M 50 18 Q 48 14 44 13 L 32 12 Q 30 12 30 15 L 30 20" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 48 20 L 32 20" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Handshake join -->
      <circle cx="25" cy="16" r="4" fill="#00d4ff" opacity="0.25" stroke="#00d4ff" stroke-width="1"/>
      <!-- Fingers top (left) -->
      <line x1="8" y1="12" x2="6" y2="6" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="12" y1="12" x2="11" y2="5" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="16" y1="12" x2="16" y2="6" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Fingers top (right) -->
      <line x1="42" y1="12" x2="44" y2="6" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="38" y1="12" x2="39" y2="5" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="34" y1="12" x2="34" y2="6" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="200" y="508" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1" opacity="0.9">PARTNERS</text>
  </g>

  <!-- ==========================================
       AVATAR 4 — Bottom Right — Customer Success
       ========================================== -->
  <g>
    <ellipse cx="600" cy="425" rx="130" ry="130" fill="url(#glow4)"/>
    <circle cx="600" cy="405" r="38" fill="#0d1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="600" cy="405" r="36" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="600" cy="402" r="18" fill="#1a2a40"/>
    <circle cx="593" cy="399" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="607" cy="399" r="2.5" fill="#00d4ff" opacity="0.6"/>
    <path d="M 594 408 Q 600 413 606 408" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <path d="M 562 455 Q 562 445 572 442 L 628 442 Q 638 445 638 455 L 638 480 Q 638 485 632 485 L 568 485 Q 562 485 562 480 Z"
      fill="#0d1a2e" stroke="#1a2a40" stroke-width="1"/>
    <line x1="600" y1="442" x2="600" y2="485" stroke="#1a3050" stroke-width="1" opacity="0.5"/>

    <!-- Customer Success icon (speech bubble + checkmark) above avatar -->
    <g transform="translate(573, 338)" filter="url(#iconGlow)">
      <!-- Speech bubble -->
      <path d="M 2 2 L 48 2 Q 52 2 52 6 L 52 28 Q 52 32 48 32 L 22 32 L 16 40 L 16 32 L 6 32 Q 2 32 2 28 L 2 6 Q 2 2 6 2 Z"
        fill="#060e1a" stroke="#00d4ff" stroke-width="1.2"/>
      <!-- Checkmark inside -->
      <polyline points="16,18 22,25 36,12"
        fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Small circle accent -->
      <circle cx="27" cy="18" r="10" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
    </g>
    <text x="600" y="508" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1" opacity="0.9">CUSTOMER SUCCESS</text>
  </g>

  <!-- Corner decoration dots -->
  <circle cx="30" cy="30" r="2" fill="#00d4ff" opacity="0.15"/>
  <circle cx="770" cy="30" r="2" fill="#00d4ff" opacity="0.15"/>
  <circle cx="30" cy="570" r="2" fill="#00d4ff" opacity="0.15"/>
  <circle cx="770" cy="570" r="2" fill="#00d4ff" opacity="0.15"/>
  <!-- Corner lines -->
  <polyline points="20,42 20,20 42,20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <polyline points="758,20 780,20 780,42" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <polyline points="20,558 20,580 42,580" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <polyline points="758,580 780,580 780,558" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
</svg>
