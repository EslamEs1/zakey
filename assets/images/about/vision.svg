<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Eye outline (almond shape using paths) -->
  <path d="M 8 50 Q 50 10 92 50 Q 50 90 8 50 Z"
    fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>

  <!-- Iris circle -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>

  <!-- Pupil -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>

  <!-- Network/star pattern inside iris -->
  <!-- Center node -->
  <circle cx="50" cy="50" r="2.5" fill="#00d4ff" filter="url(#glowFilter)"/>

  <!-- 6 radial spokes inside iris -->
  <line x1="50" y1="50" x2="50" y2="32" stroke="#00d4ff" stroke-width="0.75" opacity="0.6"/>
  <line x1="50" y1="50" x2="65.6" y2="41" stroke="#00d4ff" stroke-width="0.75" opacity="0.6"/>
  <line x1="50" y1="50" x2="65.6" y2="59" stroke="#00d4ff" stroke-width="0.75" opacity="0.6"/>
  <line x1="50" y1="50" x2="50" y2="68" stroke="#00d4ff" stroke-width="0.75" opacity="0.6"/>
  <line x1="50" y1="50" x2="34.4" y2="59" stroke="#00d4ff" stroke-width="0.75" opacity="0.6"/>
  <line x1="50" y1="50" x2="34.4" y2="41" stroke="#00d4ff" stroke-width="0.75" opacity="0.6"/>

  <!-- Spoke endpoint nodes (on iris ring) -->
  <circle cx="50" cy="32" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="65.6" cy="41" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="65.6" cy="59" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="50" cy="68" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="34.4" cy="59" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="34.4" cy="41" r="1.5" fill="#00d4ff" opacity="0.8"/>

  <!-- Network connections between iris nodes (hexagonal) -->
  <polygon points="50,32 65.6,41 65.6,59 50,68 34.4,59 34.4,41"
    fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.35"/>

  <!-- Small outer network nodes at eye corners -->
  <circle cx="8" cy="50" r="2" fill="#00d4ff" opacity="0.5"/>
  <circle cx="92" cy="50" r="2" fill="#00d4ff" opacity="0.5"/>

  <!-- Eyelash/lash accent lines at top -->
  <line x1="30" y1="22" x2="33" y2="30" stroke="#00d4ff" stroke-width="0.75" opacity="0.3" stroke-linecap="round"/>
  <line x1="50" y1="15" x2="50" y2="23" stroke="#00d4ff" stroke-width="0.75" opacity="0.3" stroke-linecap="round"/>
  <line x1="70" y1="22" x2="67" y2="30" stroke="#00d4ff" stroke-width="0.75" opacity="0.3" stroke-linecap="round"/>

  <!-- Pupil highlight dot -->
  <circle cx="54" cy="46" r="1.5" fill="#ffffff" opacity="0.6"/>
</svg>
