<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer diamond (gem outline) -->
  <!-- Top crown facets -->
  <polygon points="50,6 28,30 50,38 72,30"
    fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Bottom pavilion facets -->
  <polygon points="28,30 50,38 72,30 50,94"
    fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Full gem outline -->
  <polygon points="50,6 72,30 50,94 28,30"
    fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>

  <!-- Crown side facets -->
  <line x1="28" y1="30" x2="14" y2="22" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="6" x2="14" y2="22" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="30" x2="14" y2="22" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="14" y1="22" x2="28" y2="46" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <line x1="72" y1="30" x2="86" y2="22" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="6" x2="86" y2="22" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="86" y1="22" x2="72" y2="46" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Full outer gem with side points -->
  <polygon points="50,6 86,22 72,30 50,38 28,30 14,22"
    fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Lower facet lines -->
  <line x1="14" y1="22" x2="50" y2="94" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="86" y1="22" x2="50" y2="94" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Inner facet lines from table to pavilion -->
  <line x1="28" y1="30" x2="50" y2="94" stroke="#00d4ff" stroke-width="0.75" opacity="0.2"/>
  <line x1="72" y1="30" x2="50" y2="94" stroke="#00d4ff" stroke-width="0.75" opacity="0.2"/>
  <line x1="50" y1="38" x2="50" y2="94" stroke="#00d4ff" stroke-width="0.75" opacity="0.2"/>

  <!-- Inner sparkle — 4-point star at center -->
  <polygon points="50,26 51.2,31.5 57,32 51.2,32.5 50,38 48.8,32.5 43,32 48.8,31.5"
    fill="#00d4ff" filter="url(#sparkleGlow)" opacity="0.95"/>

  <!-- Small sparkle dots (scattered) -->
  <!-- Top right -->
  <line x1="68" y1="16" x2="68" y2="20" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="66" y1="18" x2="70" y2="18" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Top left -->
  <line x1="32" y1="14" x2="32" y2="17" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="30.5" y1="15.5" x2="33.5" y2="15.5" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Right -->
  <line x1="82" y1="38" x2="82" y2="42" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="40" x2="84" y2="40" stroke="#00d4ff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Tiny dot sparkles -->
  <circle cx="60" cy="12" r="1" fill="#00d4ff" opacity="0.7"/>
  <circle cx="40" cy="20" r="0.75" fill="#00d4ff" opacity="0.5"/>
  <circle cx="78" cy="50" r="0.75" fill="#00d4ff" opacity="0.4"/>
</svg>
