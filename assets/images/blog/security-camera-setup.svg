<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="secBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#060c18"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#secBg)"/>
  <!-- Background grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#00d4ff" opacity="0.04"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>
  <!-- Security Camera (main element) -->
  <!-- Camera mount bracket -->
  <rect x="340" y="80" width="20" height="60" fill="#1a2840" rx="2"/>
  <rect x="310" y="70" width="80" height="20" fill="#1e3050" rx="3"/>
  <!-- Camera body -->
  <rect x="270" y="140" width="140" height="80" fill="#0f1e30" rx="8" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Camera lens -->
  <circle cx="360" cy="180" r="28" fill="#001015" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
  <circle cx="360" cy="180" r="20" fill="#001520" opacity="0.9"/>
  <circle cx="360" cy="180" r="14" fill="#00d4ff" opacity="0.15"/>
  <circle cx="360" cy="180" r="8" fill="#00d4ff" opacity="0.25" filter="url(#glow)"/>
  <circle cx="360" cy="180" r="4" fill="#00d4ff" opacity="0.5"/>
  <!-- IR LEDs on camera -->
  <circle cx="285" cy="160" r="5" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="285" cy="200" r="5" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="395" cy="155" r="4" fill="#00d4ff" opacity="0.5"/>
  <circle cx="395" cy="205" r="4" fill="#00d4ff" opacity="0.5"/>
  <!-- Camera detection cone -->
  <polygon points="390,180 700,80 700,280" fill="#00d4ff" opacity="0.04"/>
  <line x1="390" y1="180" x2="700" y2="80" stroke="#00d4ff" stroke-width="1" opacity="0.2" stroke-dasharray="6,4"/>
  <line x1="390" y1="180" x2="700" y2="280" stroke="#00d4ff" stroke-width="1" opacity="0.2" stroke-dasharray="6,4"/>
  <!-- Detection zone rings -->
  <ellipse cx="550" cy="180" rx="100" ry="60" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="620" cy="180" rx="60" ry="35" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Motion detection indicator -->
  <circle cx="580" cy="160" r="8" fill="#00ff88" opacity="0.7" filter="url(#glow)"/>
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="9" fill="#00ff88" opacity="0.9">MOTION</text>
  <!-- Monitoring screen -->
  <rect x="60" y="320" width="680" height="230" fill="#001015" rx="6" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="60" y="320" width="680" height="35" fill="#00d4ff" opacity="0.1" rx="6"/>
  <text x="400" y="344" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle" letter-spacing="2" opacity="0.9">SECURITY MONITORING PANEL</text>
  <!-- Camera feeds grid on screen -->
  <rect x="75" y="365" width="155" height="110" fill="#030810" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <text x="152" y="415" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">CAM 01 - Front</text>
  <text x="152" y="430" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" text-anchor="middle" opacity="0.8">LIVE</text>
  <circle cx="100" cy="400" r="3" fill="#00ff88" opacity="0.8"/>
  <rect x="243" y="365" width="155" height="110" fill="#030810" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <text x="320" y="415" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">CAM 02 - Garden</text>
  <text x="320" y="430" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" text-anchor="middle" opacity="0.8">LIVE</text>
  <circle cx="268" cy="400" r="3" fill="#00ff88" opacity="0.8"/>
  <rect x="411" y="365" width="155" height="110" fill="#030810" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <text x="488" y="415" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">CAM 03 - Garage</text>
  <text x="488" y="430" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0.8">MOTION</text>
  <circle cx="436" cy="400" r="3" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>
  <rect x="579" y="365" width="155" height="110" fill="#030810" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <text x="656" y="415" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">CAM 04 - Pool</text>
  <text x="656" y="430" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" text-anchor="middle" opacity="0.8">LIVE</text>
  <circle cx="604" cy="400" r="3" fill="#00ff88" opacity="0.8"/>
  <!-- Status bar -->
  <rect x="75" y="487" width="660" height="52" fill="#001520" rx="2"/>
  <text x="120" y="510" font-family="Arial, sans-serif" font-size="9" fill="#00ff88" opacity="0.8">System: ARMED</text>
  <text x="120" y="525" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.6">4 cameras online</text>
  <text x="400" y="510" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.8">CAM 03 - Motion at 14:32</text>
  <text x="680" y="510" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="end" opacity="0.7">Recording</text>
  <!-- Label -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">SECURITY CAMERA SETUP</text>
</svg>
