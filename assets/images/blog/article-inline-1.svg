<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="dashBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="100%" stop-color="#03060e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#dashBg)"/>
  <!-- Dashboard frame -->
  <rect x="20" y="20" width="760" height="560" fill="#001015" rx="6" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Header bar -->
  <rect x="20" y="20" width="760" height="40" fill="#00d4ff" opacity="0.1" rx="6"/>
  <text x="400" y="47" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" letter-spacing="3" opacity="0.9">SMART HOME CONTROL DASHBOARD</text>
  <circle cx="45" cy="40" r="6" fill="#00ff88" opacity="0.8"/>
  <!-- KPI cards row -->
  <rect x="35" y="75" width="170" height="65" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <text x="120" y="97" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">DEVICES ONLINE</text>
  <text x="120" y="128" font-family="Arial, sans-serif" font-size="24" fill="#00d4ff" text-anchor="middle" font-weight="bold">24</text>
  <rect x="215" y="75" width="170" height="65" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <text x="300" y="97" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">ENERGY TODAY</text>
  <text x="300" y="128" font-family="Arial, sans-serif" font-size="24" fill="#f59e0b" text-anchor="middle" font-weight="bold">18 kW</text>
  <rect x="395" y="75" width="170" height="65" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <text x="480" y="97" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">ACTIVE SCENE</text>
  <text x="480" y="120" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">Evening</text>
  <text x="480" y="136" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Warm Mode</text>
  <rect x="575" y="75" width="190" height="65" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
  <text x="670" y="97" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.8">TEMPERATURE</text>
  <text x="670" y="128" font-family="Arial, sans-serif" font-size="24" fill="#00d4ff" text-anchor="middle" font-weight="bold">22 C</text>
  <!-- Device status cards -->
  <text x="40" y="168" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" opacity="0.6">Device Status</text>
  <!-- Row 1 -->
  <rect x="35" y="177" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="55" cy="197" r="6" fill="#f59e0b" opacity="0.8"/>
  <text x="68" y="200" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Living Room Lights</text>
  <text x="55" y="219" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" opacity="0.8">ON - 70%</text>
  <rect x="220" y="177" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="240" cy="197" r="6" fill="#00d4ff" opacity="0.8"/>
  <text x="253" y="200" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Thermostat</text>
  <text x="240" y="219" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" opacity="0.8">22C Cooling</text>
  <rect x="405" y="177" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="425" cy="197" r="6" fill="#00ff88" opacity="0.8"/>
  <text x="438" y="200" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Front Door Lock</text>
  <text x="425" y="219" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">Locked</text>
  <rect x="590" y="177" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="610" cy="197" r="6" fill="#00ff88" opacity="0.8"/>
  <text x="623" y="200" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Security Camera</text>
  <text x="610" y="219" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">Active</text>
  <!-- Row 2 -->
  <rect x="35" y="239" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="55" cy="259" r="6" fill="#f59e0b" opacity="0.6"/>
  <text x="68" y="262" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Bedroom Lights</text>
  <text x="55" y="281" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" opacity="0.7">ON - 30%</text>
  <rect x="220" y="239" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="240" cy="259" r="6" fill="#1a2840" stroke="#1e3050" stroke-width="1"/>
  <text x="253" y="262" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.6">Kitchen Lights</text>
  <text x="240" y="281" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.4">OFF</text>
  <rect x="405" y="239" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="425" cy="259" r="6" fill="#00d4ff" opacity="0.7"/>
  <text x="438" y="262" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Smart Blinds</text>
  <text x="425" y="281" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" opacity="0.8">50% Open</text>
  <rect x="590" y="239" width="175" height="52" fill="#001520" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="610" cy="259" r="6" fill="#f59e0b" opacity="0.7"/>
  <text x="623" y="262" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" opacity="0.8">Smart Speaker</text>
  <text x="610" y="281" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" opacity="0.7">Playing Jazz</text>
  <!-- Energy chart -->
  <rect x="35" y="305" width="460" height="200" fill="#001015" rx="3" stroke="#1a2535" stroke-width="0.5"/>
  <text x="265" y="324" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.8">Today Energy Usage (kWh)</text>
  <!-- Bar chart -->
  <rect x="50" y="470" width="18" height="25" fill="#00d4ff" opacity="0.4" rx="1"/>
  <rect x="75" y="455" width="18" height="40" fill="#00d4ff" opacity="0.6" rx="1"/>
  <rect x="100" y="440" width="18" height="55" fill="#00d4ff" opacity="0.8" rx="1"/>
  <rect x="125" y="447" width="18" height="48" fill="#00d4ff" opacity="0.7" rx="1"/>
  <rect x="150" y="460" width="18" height="35" fill="#00d4ff" opacity="0.55" rx="1"/>
  <rect x="175" y="435" width="18" height="60" fill="#00d4ff" opacity="0.9" rx="1" filter="url(#glow)"/>
  <rect x="200" y="450" width="18" height="45" fill="#00d4ff" opacity="0.7" rx="1"/>
  <rect x="225" y="462" width="18" height="33" fill="#00d4ff" opacity="0.5" rx="1"/>
  <rect x="250" y="445" width="18" height="50" fill="#00d4ff" opacity="0.75" rx="1"/>
  <rect x="275" y="438" width="18" height="57" fill="#00d4ff" opacity="0.85" rx="1"/>
  <rect x="300" y="455" width="18" height="40" fill="#00d4ff" opacity="0.6" rx="1"/>
  <rect x="325" y="443" width="18" height="52" fill="#00d4ff" opacity="0.78" rx="1"/>
  <rect x="350" y="433" width="18" height="62" fill="#00d4ff" opacity="0.9" rx="1"/>
  <rect x="375" y="458" width="18" height="37" fill="#00d4ff" opacity="0.6" rx="1"/>
  <rect x="400" y="442" width="18" height="53" fill="#00d4ff" opacity="0.72" rx="1"/>
  <rect x="425" y="430" width="18" height="65" fill="#00d4ff" opacity="0.88" rx="1"/>
  <line x1="45" y1="495" x2="480" y2="495" stroke="#1a2535" stroke-width="1" opacity="0.5"/>
  <!-- Automation log -->
  <rect x="505" y="305" width="255" height="200" fill="#001015" rx="3" stroke="#1a2535" stroke-width="0.5"/>
  <text x="632" y="324" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.8">Automations</text>
  <text x="520" y="346" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">OK 18:00 Evening scene on</text>
  <text x="520" y="363" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.8">OK 17:30 Blinds closed</text>
  <text x="520" y="380" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.6">-- 17:00 Temp set 22C</text>
  <text x="520" y="397" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.6">-- 16:30 Arrival detected</text>
  <text x="520" y="414" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" opacity="0.7">OK 08:00 Wake scene</text>
  <text x="520" y="431" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" opacity="0.5">-- 00:00 Sleep scene</text>
  <!-- Label -->
  <text x="400" y="554" font-family="Arial, sans-serif" font-size="12" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">SMART HOME CONTROL DASHBOARD</text>
</svg>