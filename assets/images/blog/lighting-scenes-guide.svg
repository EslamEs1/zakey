<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="scBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#scBg)"/>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="18" font-weight="300" letter-spacing="4" fill="#c0c0c0" text-anchor="middle" opacity="0.9">LIGHTING SCENES GUIDE</text>
  <line x1="250" y1="62" x2="550" y2="62" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <!-- Room outline (same room in 3 scenes) -->
  <!-- Scene 1 - Bright/Morning -->
  <rect x="30" y="90" width="220" height="430" fill="#001015" rx="6" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <rect x="30" y="90" width="220" height="30" fill="#f59e0b" opacity="0.15" rx="6"/>
  <text x="140" y="112" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" letter-spacing="2">BRIGHT</text>
  <!-- Room silhouette - bright -->
  <rect x="45" y="130" width="190" height="260" fill="#0d1a28" rx="3"/>
  <!-- Warm ceiling flood -->
  <ellipse cx="140" cy="130" rx="100" ry="50" fill="#f59e0b" opacity="0.25" filter="url(#glow)"/>
  <ellipse cx="140" cy="130" rx="60" ry="30" fill="#f59e0b" opacity="0.2"/>
  <!-- Furniture silhouettes -->
  <rect x="65" y="290" width="150" height="60" fill="#0f1e30" rx="3"/>
  <rect x="80" y="270" width="110" height="28" fill="#121e30" rx="2"/>
  <!-- Recessed lights -->
  <circle cx="90" cy="140" r="6" fill="#f59e0b" opacity="0.7" filter="url(#glow)"/>
  <circle cx="140" cy="140" r="6" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>
  <circle cx="190" cy="140" r="6" fill="#f59e0b" opacity="0.7" filter="url(#glow)"/>
  <!-- Stats -->
  <text x="140" y="415" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.9">Brightness: 100%</text>
  <rect x="50" y="422" width="180" height="6" fill="#1a2840" rx="3"/>
  <rect x="50" y="422" width="180" height="6" fill="#f59e0b" opacity="0.7" rx="3"/>
  <text x="140" y="445" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle" opacity="0.7">Color Temp: Cool</text>
  <text x="140" y="462" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">6500K - Daylight</text>
  <text x="140" y="492" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.5">Use: Morning, Work</text>
  <!-- Scene 2 - Evening/Warm -->
  <rect x="290" y="90" width="220" height="430" fill="#001015" rx="6" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <rect x="290" y="90" width="220" height="30" fill="#f59e0b" opacity="0.1" rx="6"/>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" letter-spacing="2">EVENING</text>
  <rect x="305" y="130" width="190" height="260" fill="#080d16" rx="3"/>
  <ellipse cx="400" cy="130" rx="80" ry="40" fill="#f59e0b" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="400" cy="130" rx="45" ry="20" fill="#f59e0b" opacity="0.12"/>
  <rect x="325" y="290" width="150" height="60" fill="#0f1a25" rx="3"/>
  <rect x="340" y="270" width="110" height="28" fill="#101825" rx="2"/>
  <circle cx="350" cy="140" r="5" fill="#f59e0b" opacity="0.4" filter="url(#glow)"/>
  <circle cx="400" cy="140" r="5" fill="#f59e0b" opacity="0.5" filter="url(#glow)"/>
  <circle cx="450" cy="140" r="5" fill="#f59e0b" opacity="0.4" filter="url(#glow)"/>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.7">Brightness: 50%</text>
  <rect x="310" y="422" width="180" height="6" fill="#1a2840" rx="3"/>
  <rect x="310" y="422" width="90" height="6" fill="#f59e0b" opacity="0.5" rx="3"/>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle" opacity="0.7">Color Temp: Warm</text>
  <text x="400" y="462" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">2700K - Sunset</text>
  <text x="400" y="492" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.5">Use: Dinner, Relax</text>
  <!-- Scene 3 - Night/Sleep -->
  <rect x="550" y="90" width="220" height="430" fill="#001015" rx="6" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <rect x="550" y="90" width="220" height="30" fill="#00d4ff" opacity="0.1" rx="6"/>
  <text x="660" y="112" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" letter-spacing="2">NIGHT</text>
  <rect x="565" y="130" width="190" height="260" fill="#030608" rx="3"/>
  <!-- Tiny night light glow only -->
  <circle cx="575" cy="370" r="12" fill="#00d4ff" opacity="0.15"/>
  <circle cx="575" cy="370" r="6" fill="#00d4ff" opacity="0.3"/>
  <!-- Under-bed LED strip -->
  <line x1="585" y1="350" x2="745" y2="350" stroke="#00d4ff" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <rect x="585" y="290" width="150" height="60" fill="#0a1018" rx="3"/>
  <rect x="600" y="270" width="110" height="28" fill="#080e18" rx="2"/>
  <text x="660" y="415" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle" opacity="0.7">Brightness: 5%</text>
  <rect x="570" y="422" width="180" height="6" fill="#1a2840" rx="3"/>
  <rect x="570" y="422" width="9" height="6" fill="#00d4ff" opacity="0.4" rx="3"/>
  <text x="660" y="445" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle" opacity="0.7">Night light only</text>
  <text x="660" y="462" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Motion pathway</text>
  <text x="660" y="492" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.5">Use: Sleep, Safety</text>
  <!-- Bottom label -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="13" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.8">SMART LIGHTING SCENES GUIDE</text>
</svg>
