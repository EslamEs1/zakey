<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c12"/>
      <stop offset="100%" stop-color="#0c0e16"/>
    </linearGradient>
    <linearGradient id="houseWallGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2540"/>
      <stop offset="100%" stop-color="#252c4a"/>
    </linearGradient>
    <linearGradient id="houseRoofGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181e38"/>
      <stop offset="100%" stop-color="#1c2240"/>
    </linearGradient>
    <linearGradient id="windowAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffc060"/>
      <stop offset="100%" stop-color="#ff8820"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc66" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff9922" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2548"/>
      <stop offset="100%" stop-color="#0e1a38"/>
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="doorLockGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sensorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND (near black) ===== -->
  <rect x="0" y="0" width="600" height="338" fill="url(#bgGrad)"/>

  <!-- ===== BLUEPRINT GRID (very faint cyan) ===== -->
  <!-- Vertical lines every 40px -->
  <line x1="40" y1="0" x2="40" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="80" y1="0" x2="80" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="120" y1="0" x2="120" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="160" y1="0" x2="160" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="240" y1="0" x2="240" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="280" y1="0" x2="280" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="320" y1="0" x2="320" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="360" y1="0" x2="360" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="440" y1="0" x2="440" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="480" y1="0" x2="480" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="520" y1="0" x2="520" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="560" y1="0" x2="560" y2="338" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <!-- Horizontal lines every 40px -->
  <line x1="0" y1="40" x2="600" y2="40" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="80" x2="600" y2="80" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="160" x2="600" y2="160" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="240" x2="600" y2="240" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="280" x2="600" y2="280" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="0" y1="320" x2="600" y2="320" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>

  <!-- ===== HOUSE OUTLINE (isometric perspective) ===== -->
  <!-- House floor shadow -->
  <ellipse cx="240" cy="285" rx="130" ry="18" fill="#00e5ff" opacity="0.04" filter="url(#blur5)"/>

  <!-- House front wall -->
  <rect x="120" y="180" width="200" height="110" fill="url(#houseWallGrad)"/>
  <!-- House front wall border -->
  <rect x="120" y="180" width="200" height="110" fill="none" stroke="#2e3858" stroke-width="1.5"/>
  <!-- House right side wall (perspective) -->
  <polygon points="320,180 380,140 380,250 320,290" fill="#1a2038"/>
  <polygon points="320,180 380,140 380,250 320,290" fill="none" stroke="#262e48" stroke-width="1.5"/>
  <!-- House roof (front face) -->
  <polygon points="100,180 320,180 340,140 120,140" fill="url(#houseRoofGrad)"/>
  <polygon points="100,180 320,180 340,140 120,140" fill="none" stroke="#262e48" stroke-width="1.5"/>
  <!-- Roof right side -->
  <polygon points="320,180 380,140 340,140" fill="#141a30"/>
  <polygon points="320,180 380,140 340,140" fill="none" stroke="#1e2640" stroke-width="1.5"/>
  <!-- Ridge line -->
  <line x1="120" y1="140" x2="340" y2="140" stroke="#2e3858" stroke-width="1.5"/>
  <line x1="340" y1="140" x2="380" y2="140" stroke="#2e3858" stroke-width="1.5"/>
  <!-- Chimney -->
  <rect x="280" y="118" width="20" height="28" fill="#1a2038"/>
  <rect x="280" y="118" width="20" height="28" fill="none" stroke="#2e3858" stroke-width="1"/>

  <!-- House front windows (amber glow) -->
  <!-- Window 1 -->
  <rect x="140" y="195" width="50" height="40" rx="2" fill="url(#windowAmber)" opacity="0.82"/>
  <ellipse cx="165" cy="215" rx="38" ry="28" fill="url(#windowGlow)" opacity="0.5" filter="url(#blur3)"/>
  <rect x="140" y="195" width="50" height="40" rx="2" fill="none" stroke="#c8aa80" stroke-width="1.2"/>
  <line x1="165" y1="195" x2="165" y2="235" stroke="#c8aa80" stroke-width="1"/>
  <!-- Window 2 -->
  <rect x="240" y="195" width="50" height="40" rx="2" fill="url(#windowAmber)" opacity="0.78"/>
  <ellipse cx="265" cy="215" rx="38" ry="28" fill="url(#windowGlow)" opacity="0.5" filter="url(#blur3)"/>
  <rect x="240" y="195" width="50" height="40" rx="2" fill="none" stroke="#c8aa80" stroke-width="1.2"/>
  <line x1="265" y1="195" x2="265" y2="235" stroke="#c8aa80" stroke-width="1"/>

  <!-- Front door with smart lock -->
  <rect x="185" y="240" width="40" height="50" rx="2" fill="#101828"/>
  <rect x="185" y="240" width="40" height="50" rx="2" fill="none" stroke="#2a3250" stroke-width="1.5"/>
  <!-- Smart lock (cyan glowing) -->
  <rect x="195" y="255" width="20" height="22" rx="4" fill="#0a1a2a"/>
  <rect x="195" y="255" width="20" height="22" rx="4" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="205" cy="263" r="4" fill="#00e5ff" opacity="0.85"/>
  <rect x="203" y="267" width="4" height="6" rx="1" fill="#00e5ff" opacity="0.7"/>
  <ellipse cx="205" cy="265" rx="16" ry="16" fill="url(#doorLockGlow)" opacity="0.55" filter="url(#blur3)"/>

  <!-- Right side window -->
  <rect x="330" y="175" width="35" height="28" rx="2" fill="url(#windowAmber)" opacity="0.7"/>
  <rect x="330" y="175" width="35" height="28" rx="2" fill="none" stroke="#c8aa80" stroke-width="1"/>

  <!-- ===== SHIELD ICON (front of house) ===== -->
  <path d="M420,108 C420,108 470,100 490,112 L490,175 C490,200 455,218 420,228 C385,218 350,200 350,175 L350,112 C370,100 420,108 420,108 Z"
        fill="url(#shieldGrad)" stroke="#00e5ff" stroke-width="2.5"/>
  <!-- Shield glow halo -->
  <path d="M420,108 C420,108 470,100 490,112 L490,175 C490,200 455,218 420,228 C385,218 350,200 350,175 L350,112 C370,100 420,108 420,108 Z"
        fill="url(#shieldGlow)" opacity="0.55" filter="url(#blur5)"/>
  <!-- Shield inner content (lock icon) -->
  <!-- Lock body -->
  <rect x="403" y="165" width="34" height="28" rx="5" fill="#0a1a38"/>
  <rect x="403" y="165" width="34" height="28" rx="5" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <!-- Lock shackle -->
  <path d="M411,165 C411,155 429,155 429,165" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Checkmark / lock keyhole -->
  <circle cx="420" cy="177" r="5" fill="#00e5ff" opacity="0.85"/>
  <rect x="418" y="180" width="4" height="7" rx="1" fill="#00e5ff" opacity="0.75"/>

  <!-- ===== FLOATING SENSOR ICONS (5 circles) ===== -->
  <!-- Sensor 1: Motion (top left area) -->
  <circle cx="88" cy="115" r="20" fill="#0a1428" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <ellipse cx="88" cy="115" rx="24" ry="24" fill="url(#sensorGlow)" opacity="0.4"/>
  <!-- Motion icon - arc lines -->
  <path d="M78,110 C82,104 94,104 98,110" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M74,108 C80,98 96,98 102,108" fill="none" stroke="#00e5ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="88" cy="115" r="3.5" fill="#00e5ff" opacity="0.9"/>
  <text x="88" y="131" font-family="Arial,sans-serif" font-size="6.5" fill="#00e5ff" text-anchor="middle" opacity="0.65">MOTION</text>

  <!-- Sensor 2: Camera (top right) -->
  <circle cx="520" cy="85" r="20" fill="#0a1428" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <ellipse cx="520" cy="85" rx="24" ry="24" fill="url(#sensorGlow)" opacity="0.4"/>
  <!-- Camera icon -->
  <rect x="510" y="80" width="20" height="14" rx="2" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <circle cx="520" cy="87" r="4" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.8"/>
  <circle cx="520" cy="87" r="1.5" fill="#00e5ff" opacity="0.8"/>
  <polygon points="520,76 526,80 514,80" fill="#00e5ff" opacity="0.7"/>
  <text x="520" y="101" font-family="Arial,sans-serif" font-size="6.5" fill="#00e5ff" text-anchor="middle" opacity="0.65">CAMERA</text>

  <!-- Sensor 3: Door (bottom left) -->
  <circle cx="70" cy="280" r="20" fill="#0a1428" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <ellipse cx="70" cy="280" rx="24" ry="24" fill="url(#sensorGlow)" opacity="0.4"/>
  <!-- Door icon -->
  <rect x="61" y="272" width="18" height="16" rx="1" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <circle cx="75" cy="280" r="2" fill="#00e5ff" opacity="0.8"/>
  <text x="70" y="296" font-family="Arial,sans-serif" font-size="6.5" fill="#00e5ff" text-anchor="middle" opacity="0.65">DOOR</text>

  <!-- Sensor 4: Smoke (top center-right) -->
  <circle cx="530" cy="200" r="20" fill="#0a1428" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <ellipse cx="530" cy="200" rx="24" ry="24" fill="url(#sensorGlow)" opacity="0.4"/>
  <!-- Smoke/flame icon -->
  <path d="M530,192 C534,196 534,204 530,207 C526,204 526,196 530,192 Z" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <path d="M525,198 C527,202 528,207 525,210 C522,207 522,201 525,198 Z" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.55"/>
  <path d="M535,197 C537,201 537,207 534,210 C531,207 532,200 535,197 Z" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.55"/>
  <text x="530" y="216" font-family="Arial,sans-serif" font-size="6.5" fill="#00e5ff" text-anchor="middle" opacity="0.65">SMOKE</text>

  <!-- Sensor 5: Leak (bottom right) -->
  <circle cx="538" cy="290" r="20" fill="#0a1428" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
  <ellipse cx="538" cy="290" rx="24" ry="24" fill="url(#sensorGlow)" opacity="0.4"/>
  <!-- Water drop icon -->
  <path d="M538,280 L545,291 C545,295 542,298 538,298 C534,298 531,295 531,291 Z" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
  <text x="538" y="306" font-family="Arial,sans-serif" font-size="6.5" fill="#00e5ff" text-anchor="middle" opacity="0.65">LEAK</text>

  <!-- ===== DASHED CONNECTION LINES (sensors to shield) ===== -->
  <line x1="108" y1="115" x2="355" y2="168" stroke="#00e5ff" stroke-width="1" stroke-dasharray="5,7" opacity="0.22"/>
  <line x1="500" y1="90" x2="488" y2="128" stroke="#00e5ff" stroke-width="1" stroke-dasharray="5,7" opacity="0.22"/>
  <line x1="90" y1="270" x2="356" y2="195" stroke="#00e5ff" stroke-width="1" stroke-dasharray="5,7" opacity="0.2"/>
  <line x1="510" y1="205" x2="490" y2="195" stroke="#00e5ff" stroke-width="1" stroke-dasharray="5,7" opacity="0.22"/>
  <line x1="518" y1="285" x2="490" y2="215" stroke="#00e5ff" stroke-width="1" stroke-dasharray="5,7" opacity="0.2"/>

  <!-- ===== TOP BADGE ===== -->
  <rect x="165" y="16" width="200" height="26" rx="4" fill="#0a1428" opacity="0.85"/>
  <rect x="165" y="16" width="200" height="26" rx="4" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
  <text x="265" y="33" font-family="Arial,sans-serif" font-size="9" fill="#00e5ff" text-anchor="middle" letter-spacing="2.5" font-weight="bold">SMART SECURITY GUIDE</text>
</svg>
