<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="planBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="roomGlow"><feGaussianBlur stdDeviation="20" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#planBg)"/>
  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#00d4ff" opacity="0.04"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Title -->
  <text x="800" y="60" font-family="Arial, sans-serif" font-size="26" font-weight="300" letter-spacing="6" fill="#c0c0c0" text-anchor="middle" opacity="0.9">VILLA AUTOMATION FLOOR PLAN</text>
  <line x1="580" y1="75" x2="1020" y2="75" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- FLOOR PLAN OUTLINE -->
  <!-- Outer villa wall -->
  <rect x="150" y="110" width="1300" height="680" fill="none" stroke="#1e3050" stroke-width="3" rx="4"/>
  <!-- Villa outer fill -->
  <rect x="150" y="110" width="1300" height="680" fill="#060e1a" opacity="0.8" rx="4"/>

  <!-- ROOMS -->
  <!-- Living Room (center large) -->
  <rect x="400" y="200" width="500" height="350" fill="#001a22" opacity="0.5" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
  <text x="650" y="355" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" opacity="0.7" letter-spacing="1">LIVING ROOM</text>
  <!-- Living room glow -->
  <rect x="400" y="200" width="500" height="350" fill="#f59e0b" opacity="0.04" rx="2"/>

  <!-- Master Bedroom (top right) -->
  <rect x="920" y="200" width="380" height="280" fill="#001a22" opacity="0.4" stroke="#00d4ff" stroke-width="1" rx="2"/>
  <text x="1110" y="335" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle" opacity="0.7">MASTER BEDROOM</text>
  <rect x="920" y="200" width="380" height="280" fill="#00d4ff" opacity="0.03" rx="2"/>

  <!-- Kitchen (top left) -->
  <rect x="160" y="200" width="230" height="280" fill="#001a22" opacity="0.4" stroke="#00d4ff" stroke-width="1" rx="2"/>
  <text x="275" y="335" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.7">KITCHEN</text>

  <!-- Dining Room (left of living) -->
  <rect x="160" y="490" width="230" height="200" fill="#001a22" opacity="0.4" stroke="#1e3050" stroke-width="1" rx="2"/>
  <text x="275" y="582" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" opacity="0.6">DINING</text>

  <!-- Guest Bedroom (right bottom) -->
  <rect x="920" y="490" width="250" height="200" fill="#001a22" opacity="0.4" stroke="#1e3050" stroke-width="1" rx="2"/>
  <text x="1045" y="582" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" opacity="0.6">GUEST BED</text>

  <!-- Bathroom 1 -->
  <rect x="1180" y="490" width="120" height="200" fill="#001a22" opacity="0.4" stroke="#1e3050" stroke-width="1" rx="2"/>
  <text x="1240" y="582" font-family="Arial, sans-serif" font-size="9" fill="#c0c0c0" text-anchor="middle" opacity="0.5">BATH</text>

  <!-- Study -->
  <rect x="920" y="700" width="380" height="80" fill="#001a22" opacity="0.3" stroke="#1e3050" stroke-width="1" rx="2"/>
  <text x="1110" y="743" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" opacity="0.5">STUDY</text>

  <!-- Hall/Entrance -->
  <rect x="400" y="560" width="500" height="120" fill="#001015" opacity="0.5" stroke="#1e3050" stroke-width="1" rx="2"/>
  <text x="650" y="625" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" opacity="0.5">HALLWAY</text>

  <!-- Garden patio -->
  <rect x="160" y="700" width="230" height="80" fill="#001a0a" opacity="0.3" stroke="#1e3050" stroke-width="1" rx="2"/>
  <text x="275" y="743" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" opacity="0.5">PATIO</text>

  <!-- AUTOMATION ICONS overlaid on rooms -->
  <!-- Living Room icons -->
  <!-- Lighting icon -->
  <circle cx="470" cy="240" r="18" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <circle cx="470" cy="237" r="9" fill="#f59e0b" opacity="0.5"/>
  <text x="470" y="270" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0.8">LIGHT</text>
  <!-- Scene indicator -->
  <rect x="490" y="235" width="50" height="18" fill="#f59e0b" opacity="0.2" rx="2"/>
  <text x="515" y="247" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">Evening</text>

  <!-- AC icon in living room -->
  <circle cx="470" cy="330" r="18" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">AC</text>
  <text x="470" y="360" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.7">22°C</text>

  <!-- Curtain icon in living room -->
  <circle cx="840" cy="240" r="18" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <text x="840" y="236" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">BLD</text>
  <text x="840" y="270" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.7">AUTO</text>

  <!-- Master Bedroom icons -->
  <circle cx="990" cy="250" r="18" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="990" y="246" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">LIGHT</text>
  <text x="990" y="275" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0.6">Sleep</text>
  <rect x="1010" y="244" width="50" height="16" fill="#f59e0b" opacity="0.15" rx="2"/>
  <text x="1035" y="255" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">SLEEP</text>

  <circle cx="1260" cy="250" r="18" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <text x="1260" y="246" font-family="Arial, sans-serif" font-size="7" fill="#00d4ff" text-anchor="middle">PANEL</text>
  <text x="1260" y="275" font-family="Arial, sans-serif" font-size="7" fill="#00d4ff" text-anchor="middle" opacity="0.6">Smart</text>

  <!-- Kitchen icon -->
  <circle cx="240" cy="260" r="16" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <text x="240" y="256" font-family="Arial, sans-serif" font-size="7" fill="#00d4ff" text-anchor="middle">LIGHT</text>
  <text x="240" y="286" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.6">Bright</text>

  <!-- Scene indicator boxes -->
  <!-- Living Room scene box -->
  <rect x="530" y="490" width="240" height="65" fill="#001a22" rx="3" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <text x="650" y="513" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.9">● ACTIVE SCENE: Evening</text>
  <line x1="540" y1="520" x2="760" y2="520" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <text x="590" y="538" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0.8">Lights: 60%</text>
  <text x="665" y="538" font-family="Arial, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.7">AC: 22°C</text>
  <text x="740" y="538" font-family="Arial, sans-serif" font-size="8" fill="#c0c0c0" text-anchor="middle" opacity="0.6">Blinds: 50%</text>

  <!-- Security sensor dots (corners of rooms) -->
  <circle cx="400" cy="200" r="5" fill="#00ff88" opacity="0.8" filter="url(#glow)"/>
  <circle cx="900" cy="200" r="5" fill="#00ff88" opacity="0.8" filter="url(#glow)"/>
  <circle cx="400" cy="550" r="5" fill="#00ff88" opacity="0.8" filter="url(#glow)"/>
  <circle cx="900" cy="550" r="5" fill="#00ff88" opacity="0.8" filter="url(#glow)"/>
  <circle cx="920" cy="200" r="5" fill="#00ff88" opacity="0.7" filter="url(#glow)"/>
  <circle cx="1300" cy="200" r="5" fill="#00ff88" opacity="0.7" filter="url(#glow)"/>
  <circle cx="920" cy="480" r="5" fill="#00ff88" opacity="0.7" filter="url(#glow)"/>
  <circle cx="1300" cy="480" r="5" fill="#00ff88" opacity="0.7" filter="url(#glow)"/>

  <!-- Legend -->
  <rect x="165" y="810" width="1270" height="50" fill="#001015" rx="3" stroke="#1e3050" stroke-width="0.5"/>
  <circle cx="200" cy="835" r="8" fill="#f59e0b" opacity="0.6"/>
  <text x="215" y="839" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" opacity="0.7">Lighting Zone</text>
  <circle cx="350" cy="835" r="8" fill="#00d4ff" opacity="0.6"/>
  <text x="365" y="839" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" opacity="0.7">Smart Control</text>
  <circle cx="500" cy="835" r="8" fill="#00ff88" opacity="0.7"/>
  <text x="515" y="839" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" opacity="0.7">Motion Sensor</text>
  <rect x="650" y="828" width="14" height="14" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="1" rx="1"/>
  <text x="670" y="839" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" opacity="0.7">Active Scene</text>
  <rect x="800" y="828" width="14" height="14" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" rx="1"/>
  <text x="820" y="839" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" opacity="0.7">Warm Lighting</text>
</svg>