<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="600" height="338">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2b2b"/>
      <stop offset="100%" stop-color="#061818"/>
    </linearGradient>
    <radialGradient id="leafGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#16a34a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#14532d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leafInnerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafGradFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="blur6">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur10">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect x="0" y="0" width="600" height="338" fill="url(#bgGrad)"/>
  <!-- Subtle dot grid texture -->
  <circle cx="50" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="100" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="150" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="200" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="250" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="300" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="350" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="400" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="450" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="500" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="550" cy="50" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="50" cy="100" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="150" cy="100" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="250" cy="100" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="350" cy="100" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="450" cy="100" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="550" cy="100" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="100" cy="150" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="200" cy="150" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="300" cy="150" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="400" cy="150" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="500" cy="150" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="50" cy="200" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="150" cy="200" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="250" cy="200" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="350" cy="200" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="450" cy="200" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="550" cy="200" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="100" cy="250" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="200" cy="250" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="300" cy="250" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="400" cy="250" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="500" cy="250" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="50" cy="300" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="150" cy="300" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="250" cy="300" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="350" cy="300" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="450" cy="300" r="1.2" fill="#00e5ff" opacity="0.06"/>
  <circle cx="550" cy="300" r="1.2" fill="#00e5ff" opacity="0.06"/>

  <!-- ===== LEAF RADIAL GLOW (background) ===== -->
  <ellipse cx="310" cy="165" rx="160" ry="155" fill="url(#leafGlow)" filter="url(#blur10)" opacity="0.75"/>

  <!-- ===== CIRCULAR PROGRESS RING (85%) ===== -->
  <!-- Background full circle track -->
  <circle cx="310" cy="165" r="118" fill="none" stroke="#1a4a3a" stroke-width="6" opacity="0.5"/>
  <!-- Progress arc (85% = 306 degrees) -->
  <!-- Using stroke-dasharray trick: circumference = 2*pi*118 ≈ 741.4 -->
  <!-- 85% of 741.4 = 630.2, gap = 111.2 -->
  <circle cx="310" cy="165" r="118" fill="none" stroke="#00e5ff" stroke-width="5"
          stroke-dasharray="630 111"
          stroke-dashoffset="185"
          stroke-linecap="round"
          opacity="0.75"/>
  <!-- Progress ring glow -->
  <circle cx="310" cy="165" r="118" fill="none" stroke="#00e5ff" stroke-width="12"
          stroke-dasharray="630 111"
          stroke-dashoffset="185"
          stroke-linecap="round"
          opacity="0.08" filter="url(#blur3)"/>

  <!-- ===== LEAF SHAPE (geometric bezier) ===== -->
  <path d="M310,65 C360,90 400,130 400,175 C400,220 365,258 310,268 C255,258 220,220 220,175 C220,130 260,90 310,65 Z"
        fill="url(#leafGradFill)" opacity="0.92"/>
  <!-- Leaf inner vein lines -->
  <line x1="310" y1="75" x2="310" y2="260" stroke="#4ade80" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="120" x2="345" y2="155" stroke="#4ade80" stroke-width="1.2" opacity="0.3"/>
  <line x1="310" y1="120" x2="275" y2="155" stroke="#4ade80" stroke-width="1.2" opacity="0.3"/>
  <line x1="310" y1="155" x2="355" y2="185" stroke="#4ade80" stroke-width="1.2" opacity="0.3"/>
  <line x1="310" y1="155" x2="265" y2="185" stroke="#4ade80" stroke-width="1.2" opacity="0.3"/>
  <line x1="310" y1="190" x2="348" y2="215" stroke="#4ade80" stroke-width="1" opacity="0.25"/>
  <line x1="310" y1="190" x2="272" y2="215" stroke="#4ade80" stroke-width="1" opacity="0.25"/>
  <!-- Leaf inner glow -->
  <ellipse cx="310" cy="168" rx="62" ry="80" fill="url(#leafInnerGlow)" opacity="0.4"/>

  <!-- ===== LIGHTNING BOLT (energy symbol) ===== -->
  <polygon points="318,100 295,170 312,170 300,240 335,158 315,158 332,100"
           fill="url(#boltGrad)" opacity="0.92"/>
  <!-- Bolt glow -->
  <polygon points="318,100 295,170 312,170 300,240 335,158 315,158 332,100"
           fill="#facc15" opacity="0.15" filter="url(#blur3)"/>

  <!-- ===== DATA LABELS ===== -->
  <!-- "37% energy saved" -->
  <rect x="398" y="108" width="118" height="36" rx="5" fill="#0a2020" opacity="0.75"/>
  <rect x="398" y="108" width="118" height="36" rx="5" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <text x="457" y="124" font-family="Arial,sans-serif" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="bold">37%</text>
  <text x="457" y="137" font-family="Arial,sans-serif" font-size="8" fill="#88aaaa" text-anchor="middle">energy saved</text>
  <!-- CO₂ label -->
  <rect x="398" y="155" width="118" height="30" rx="5" fill="#0a2020" opacity="0.75"/>
  <rect x="398" y="155" width="118" height="30" rx="5" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <text x="457" y="168" font-family="Arial,sans-serif" font-size="9" fill="#22c55e" text-anchor="middle">CO&#x2082; reduced</text>
  <text x="457" y="178" font-family="Arial,sans-serif" font-size="8" fill="#88aaaa" text-anchor="middle">by 28%</text>
  <!-- Connector lines to center -->
  <line x1="398" y1="126" x2="398" y2="126" stroke="#00e5ff" stroke-width="1" opacity="0"/>
  <line x1="390" y1="130" x2="400" y2="126" stroke="#00e5ff" stroke-width="1" opacity="0.4" stroke-dasharray="3,4"/>
  <line x1="388" y1="170" x2="400" y2="170" stroke="#00e5ff" stroke-width="1" opacity="0.35" stroke-dasharray="3,4"/>

  <!-- ===== SOLAR PANEL GRID ICON (bottom left) ===== -->
  <rect x="30" y="255" width="66" height="60" rx="4" fill="#0a1a2a" opacity="0.85"/>
  <rect x="30" y="255" width="66" height="60" rx="4" fill="none" stroke="#2a6a8a" stroke-width="1.5"/>
  <!-- 3x3 panel grid -->
  <rect x="34" y="259" width="18" height="16" rx="1" fill="#1a3a5a" opacity="0.8"/>
  <rect x="55" y="259" width="18" height="16" rx="1" fill="#1a3a5a" opacity="0.8"/>
  <rect x="76" y="259" width="16" height="16" rx="1" fill="#1a3a5a" opacity="0.75"/>
  <rect x="34" y="279" width="18" height="16" rx="1" fill="#1a3a5a" opacity="0.8"/>
  <rect x="55" y="279" width="18" height="16" rx="1" fill="#1a3a5a" opacity="0.8"/>
  <rect x="76" y="279" width="16" height="16" rx="1" fill="#1a3a5a" opacity="0.75"/>
  <rect x="34" y="299" width="18" height="12" rx="1" fill="#1a3a5a" opacity="0.75"/>
  <rect x="55" y="299" width="18" height="12" rx="1" fill="#1a3a5a" opacity="0.75"/>
  <rect x="76" y="299" width="16" height="12" rx="1" fill="#1a3a5a" opacity="0.7"/>
  <!-- Solar panel internal lines -->
  <line x1="34" y1="267" x2="52" y2="267" stroke="#2a5a7a" stroke-width="0.8" opacity="0.5"/>
  <line x1="43" y1="259" x2="43" y2="275" stroke="#2a5a7a" stroke-width="0.8" opacity="0.5"/>
  <line x1="55" y1="267" x2="73" y2="267" stroke="#2a5a7a" stroke-width="0.8" opacity="0.5"/>
  <line x1="64" y1="259" x2="64" y2="275" stroke="#2a5a7a" stroke-width="0.8" opacity="0.5"/>
  <!-- Solar label -->
  <text x="63" y="325" font-family="Arial,sans-serif" font-size="7" fill="#2a9a7a" text-anchor="middle" opacity="0.75">SOLAR</text>

  <!-- ===== PERCENT CIRCLE INDICATOR (small, bottom right) ===== -->
  <circle cx="530" cy="285" r="35" fill="none" stroke="#1a4a3a" stroke-width="4" opacity="0.5"/>
  <circle cx="530" cy="285" r="35" fill="none" stroke="#22c55e" stroke-width="3.5"
          stroke-dasharray="187 33" stroke-dashoffset="47" stroke-linecap="round" opacity="0.8"/>
  <text x="530" y="282" font-family="Arial,sans-serif" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="bold">85%</text>
  <text x="530" y="293" font-family="Arial,sans-serif" font-size="7" fill="#88aa88" text-anchor="middle">efficient</text>
</svg>
