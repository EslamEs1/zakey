<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="blogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#141e30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1525;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tabletGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2535;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1828;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cardShadow"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#00d4ff" flood-opacity="0.12"/></filter>
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0e1428;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#05070d;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#blogBg)"/>
  <!-- Background glow radial -->
  <ellipse cx="800" cy="450" rx="700" ry="500" fill="url(#spaceBg)" opacity="0.8"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.05"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="250" cy="30" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="1350" cy="50" r="1.5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="1480" cy="30" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="200" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="1500" cy="200" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- Title -->
  <text x="800" y="80" font-family="Arial, sans-serif" font-size="30" font-weight="300" letter-spacing="8" fill="#c0c0c0" text-anchor="middle" opacity="0.9">ZAKEY SMART HOME BLOG</text>
  <line x1="550" y1="95" x2="1050" y2="95" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <text x="800" y="120" font-family="Arial, sans-serif" font-size="14" letter-spacing="3" fill="#00d4ff" text-anchor="middle" opacity="0.6">INSIGHTS · GUIDES · CASE STUDIES · INDUSTRY NEWS</text>

  <!-- FLOATING ARTICLE CARDS (stacked/floating) -->
  <!-- Card 1 (back left) -->
  <rect x="160" y="220" width="360" height="500" fill="url(#cardGrad)" rx="8" stroke="#1e3050" stroke-width="1" opacity="0.7" filter="url(#cardShadow)" transform="rotate(-8,340,470)"/>
  <!-- Card content lines -->
  <rect x="180" y="250" width="300" height="20" fill="#00d4ff" opacity="0.15" rx="2" transform="rotate(-8,340,470)"/>
  <rect x="180" y="285" width="280" height="10" fill="#c0c0c0" opacity="0.15" rx="1" transform="rotate(-8,340,470)"/>
  <rect x="180" y="302" width="260" height="10" fill="#c0c0c0" opacity="0.1" rx="1" transform="rotate(-8,340,470)"/>
  <rect x="180" y="319" width="270" height="10" fill="#c0c0c0" opacity="0.12" rx="1" transform="rotate(-8,340,470)"/>

  <!-- Card 2 (back right) -->
  <rect x="1080" y="240" width="360" height="480" fill="url(#cardGrad)" rx="8" stroke="#1e3050" stroke-width="1" opacity="0.7" transform="rotate(6,1260,480)"/>
  <rect x="1100" y="270" width="300" height="20" fill="#00d4ff" opacity="0.12" rx="2" transform="rotate(6,1260,480)"/>
  <rect x="1100" y="305" width="250" height="10" fill="#c0c0c0" opacity="0.12" rx="1" transform="rotate(6,1260,480)"/>
  <rect x="1100" y="322" width="270" height="10" fill="#c0c0c0" opacity="0.1" rx="1" transform="rotate(6,1260,480)"/>

  <!-- Card 3 (mid left) -->
  <rect x="300" y="200" width="380" height="520" fill="url(#cardGrad)" rx="8" stroke="#1e3050" stroke-width="1" opacity="0.85" transform="rotate(-3,490,460)"/>
  <rect x="320" y="230" width="320" height="180" fill="#0a1525" rx="4" transform="rotate(-3,490,460)"/>
  <text x="490" y="260" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.7" transform="rotate(-3,490,460)">SMART HOME GUIDE</text>
  <rect x="320" y="435" width="320" height="12" fill="#c0c0c0" opacity="0.15" rx="1" transform="rotate(-3,490,460)"/>
  <rect x="320" y="455" width="280" height="10" fill="#c0c0c0" opacity="0.12" rx="1" transform="rotate(-3,490,460)"/>
  <rect x="320" y="473" width="300" height="10" fill="#c0c0c0" opacity="0.1" rx="1" transform="rotate(-3,490,460)"/>
  <rect x="320" y="491" width="260" height="10" fill="#c0c0c0" opacity="0.12" rx="1" transform="rotate(-3,490,460)"/>

  <!-- Card 4 (mid right) -->
  <rect x="920" y="200" width="380" height="520" fill="url(#cardGrad)" rx="8" stroke="#1e3050" stroke-width="1" opacity="0.85" transform="rotate(3,1110,460)"/>
  <rect x="940" y="230" width="320" height="180" fill="#0a1525" rx="4" transform="rotate(3,1110,460)"/>
  <text x="1110" y="260" font-family="Arial, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.7" transform="rotate(3,1110,460)">HOTEL AUTOMATION</text>
  <rect x="940" y="435" width="320" height="12" fill="#c0c0c0" opacity="0.15" rx="1" transform="rotate(3,1110,460)"/>
  <rect x="940" y="455" width="270" height="10" fill="#c0c0c0" opacity="0.12" rx="1" transform="rotate(3,1110,460)"/>
  <rect x="940" y="473" width="290" height="10" fill="#c0c0c0" opacity="0.1" rx="1" transform="rotate(3,1110,460)"/>

  <!-- FRONT CENTER: TABLET with article open -->
  <rect x="580" y="160" width="440" height="620" fill="url(#tabletGrad)" rx="20" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <!-- Tablet screen -->
  <rect x="596" y="185" width="408" height="565" fill="#001015" rx="12"/>
  <!-- Article content on screen -->
  <rect x="612" y="200" width="376" height="200" fill="#0a1525" rx="6"/>
  <text x="800" y="235" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" opacity="0.9">Smart Home Automation</text>
  <text x="800" y="255" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" opacity="0.7">Complete Guide for 2025</text>
  <line x1="630" y1="270" x2="970" y2="270" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Illustration in article card -->
  <circle cx="800" cy="340" r="55" fill="#001a22" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="800" cy="340" r="15" fill="#00d4ff" opacity="0.6"/>
  <!-- Devices radiating from center -->
  <line x1="800" y1="325" x2="800" y2="285" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
  <circle cx="800" cy="278" r="7" fill="#00d4ff" opacity="0.7"/>
  <line x1="815" y1="325" x2="847" y2="300" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
  <circle cx="855" cy="295" r="7" fill="#00d4ff" opacity="0.6"/>
  <line x1="815" y1="355" x2="850" y2="378" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
  <circle cx="856" cy="385" r="7" fill="#00d4ff" opacity="0.7"/>
  <line x1="785" y1="355" x2="755" y2="378" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
  <circle cx="748" cy="385" r="7" fill="#00d4ff" opacity="0.6"/>
  <line x1="785" y1="325" x2="753" y2="300" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
  <circle cx="746" cy="295" r="7" fill="#00d4ff" opacity="0.7"/>
  <!-- Article text lines below illustration -->
  <rect x="620" y="420" width="360" height="10" fill="#c0c0c0" opacity="0.2" rx="1"/>
  <rect x="620" y="438" width="340" height="10" fill="#c0c0c0" opacity="0.15" rx="1"/>
  <rect x="620" y="456" width="350" height="10" fill="#c0c0c0" opacity="0.18" rx="1"/>
  <rect x="620" y="474" width="320" height="10" fill="#c0c0c0" opacity="0.12" rx="1"/>
  <rect x="620" y="492" width="345" height="10" fill="#c0c0c0" opacity="0.16" rx="1"/>
  <rect x="620" y="510" width="310" height="10" fill="#c0c0c0" opacity="0.12" rx="1"/>
  <!-- Tag/category -->
  <rect x="620" y="540" width="80" height="22" fill="#00d4ff" opacity="0.2" rx="3"/>
  <text x="660" y="555" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle">GUIDE</text>
  <rect x="712" y="540" width="100" height="22" fill="#f59e0b" opacity="0.15" rx="3"/>
  <text x="762" y="555" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">BEGINNERS</text>
  <!-- Tablet home button -->
  <circle cx="800" cy="738" r="15" fill="#1a2535" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>

  <!-- Floating cyan lines / particles connecting cards -->
  <line x1="510" y1="400" x2="580" y2="420" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="1020" y1="400" x2="1015" y2="420" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Bottom text -->
  <text x="800" y="840" font-family="Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#c0c0c0" text-anchor="middle" opacity="0.7">EXPERT ARTICLES · HOW-TO GUIDES · PROJECT SHOWCASES</text>
</svg>