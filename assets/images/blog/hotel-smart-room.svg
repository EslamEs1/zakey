  <rect x="80" y="110" width="460" height="40" fill="#00d4ff" opacity="0.15" rx="8"/>
  <text x="310" y="137" font-family="Arial, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" letter-spacing="2">WELCOME SCENE</text>
