<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <title>Zakey Scene Button — 4-Zone Wireless Smart Home Controller</title>
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.7" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <!-- Product glow: warm golden-white for scene controller -->
    <radialGradient id="productGlow" cx="50%" cy="50%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Body: premium matte dark surface -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222438"/>
      <stop offset="100%" stop-color="#14151f"/>
    </linearGradient>
    <!-- Zone TL (top-left) — sun/morning: warm -->
    <radialGradient id="zoneTL" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.04"/>
    </radialGradient>
    <!-- Zone TR — moon/night: cool blue -->
    <radialGradient id="zoneTR" cx="70%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.03"/>
    </radialGradient>
    <!-- Zone BL — party: purple/pink -->
    <radialGradient id="zoneBL" cx="30%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.03"/>
    </radialGradient>
    <!-- Zone BR — away/shield: green -->
    <radialGradient id="zoneBR" cx="70%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.03"/>
    </radialGradient>
    <!-- Convex surface highlight (top half lighter) -->
    <linearGradient id="convexHL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.055"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Drop shadow -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Floor reflection -->
    <linearGradient id="reflGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#222438" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#222438" stop-opacity="0"/>
    </linearGradient>
    <!-- Backlight glow (warm, from behind) -->
    <radialGradient id="backlightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Battery segments -->
    <linearGradient id="battFull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#bgRadial)"/>
  <rect width="480" height="360" fill="url(#dots)"/>

  <!-- Product glow -->
  <ellipse cx="240" cy="190" rx="110" ry="110" fill="url(#productGlow)"/>

  <!-- Drop shadow -->
  <ellipse cx="240" cy="315" rx="68" ry="10" fill="url(#shadowGrad)"/>

  <!-- Floor reflection -->
  <rect x="200" y="308" width="80" height="28" fill="url(#reflGrad)" rx="2"/>

  <!-- ─── Product body: 80×80px square centered at (240,190) ─── -->
  <!-- Backlight suggestion (warm glow from behind) -->
  <rect x="196" y="146" width="88" height="88" rx="13" fill="url(#backlightGlow)"/>

  <!-- Body shadow/depth -->
  <rect x="202" y="152" width="80" height="80" rx="11" fill="#0a0b14" fill-opacity="0.7"/>

  <!-- Main body -->
  <rect x="200" y="150" width="80" height="80" rx="10" fill="url(#bodyGrad)"/>

  <!-- ─── Zone backgrounds (4 quadrants) ─── -->
  <!-- Each zone is 40×40px, clipped to body corners -->
  <!-- TL zone -->
  <rect x="200" y="150" width="40" height="40" rx="10" fill="url(#zoneTL)"/>
  <rect x="220" y="150" width="20" height="40" fill="url(#zoneTL)"/>
  <rect x="200" y="170" width="40" height="20" fill="url(#zoneTL)"/>
  <!-- TR zone -->
  <rect x="240" y="150" width="40" height="40" rx="10" fill="url(#zoneTR)"/>
  <rect x="240" y="150" width="20" height="40" fill="url(#zoneTR)"/>
  <rect x="240" y="170" width="40" height="20" fill="url(#zoneTR)"/>
  <!-- BL zone -->
  <rect x="200" y="190" width="40" height="40" rx="10" fill="url(#zoneBL)"/>
  <rect x="200" y="190" width="40" height="20" fill="url(#zoneBL)"/>
  <rect x="220" y="190" width="20" height="40" fill="url(#zoneBL)"/>
  <!-- BR zone -->
  <rect x="240" y="190" width="40" height="40" rx="10" fill="url(#zoneBR)"/>
  <rect x="240" y="190" width="40" height="20" fill="url(#zoneBR)"/>
  <rect x="240" y="210" width="40" height="20" fill="url(#zoneBR)"/>

  <!-- Convex surface highlight overlay -->
  <rect x="200" y="150" width="80" height="80" rx="10" fill="url(#convexHL)"/>

  <!-- Cross dividers (very thin) -->
  <line x1="240" y1="151" x2="240" y2="229" stroke="#0e1018" stroke-width="1.2"/>
  <line x1="201" y1="190" x2="279" y2="190" stroke="#0e1018" stroke-width="1.2"/>
  <!-- Subtle inner highlight on dividers -->
  <line x1="240.8" y1="151" x2="240.8" y2="229" stroke="#2a2e44" stroke-width="0.4" stroke-opacity="0.5"/>
  <line x1="201" y1="190.8" x2="279" y2="190.8" stroke="#2a2e44" stroke-width="0.4" stroke-opacity="0.5"/>

  <!-- Outer border/edge -->
  <rect x="200" y="150" width="80" height="80" rx="10" fill="none" stroke="#2e3250" stroke-width="0.8"/>
  <!-- Inner edge highlight -->
  <rect x="200.8" y="150.8" width="78.4" height="78.4" rx="9.5" fill="none" stroke="#3a3e58" stroke-width="0.4" stroke-opacity="0.4"/>

  <!-- ─── Zone icons ─── -->
  <!-- TL: Sun icon (morning/bright) — warm yellow -->
  <circle cx="220" cy="168" r="5.5" fill="#f59e0b" fill-opacity="0.75"/>
  <line x1="220" y1="159" x2="220" y2="157.5" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="220" y1="177" x2="220" y2="178.5" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="211" y1="168" x2="209.5" y2="168" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="229" y1="168" x2="230.5" y2="168" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="213.9" y1="161.9" x2="212.8" y2="160.8" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="226.1" y1="174.1" x2="227.2" y2="175.2" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="226.1" y1="161.9" x2="227.2" y2="160.8" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="213.9" y1="174.1" x2="212.8" y2="175.2" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>

  <!-- TR: Moon icon (night/sleep) — indigo/blue -->
  <path d="M260 162 Q256 165 256 169 Q259 174 264 172 Q260 172 260 168 Q260 163 264 161 Z"
        fill="#818cf8" fill-opacity="0.75"/>

  <!-- BL: Party/sparkle icon — pink/magenta -->
  <!-- Sparkle star -->
  <line x1="220" y1="204" x2="220" y2="216" stroke="#ec4899" stroke-width="1.4" stroke-opacity="0.75"/>
  <line x1="214" y1="210" x2="226" y2="210" stroke="#ec4899" stroke-width="1.4" stroke-opacity="0.75"/>
  <line x1="215.8" y1="205.8" x2="224.2" y2="214.2" stroke="#ec4899" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="224.2" y1="205.8" x2="215.8" y2="214.2" stroke="#ec4899" stroke-width="1" stroke-opacity="0.55"/>
  <!-- Small dots around sparkle -->
  <circle cx="215" cy="204" r="1" fill="#ec4899" fill-opacity="0.5"/>
  <circle cx="225" cy="216" r="0.8" fill="#ec4899" fill-opacity="0.4"/>

  <!-- BR: Shield/away icon — green -->
  <path d="M258 206 L260 203 L262 206 L262 214 Q260 217 258 214 Z"
        fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.75"/>
  <!-- Shield inner check -->
  <path d="M258.8 210 L260 212 L262.5 207.5" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.65"/>

  <!-- ─── Center circle: Zakey "Z" logo ─── -->
  <circle cx="240" cy="190" r="9" fill="#0e1018" stroke="#2e3250" stroke-width="0.8"/>
  <circle cx="240" cy="190" r="7.5" fill="none" stroke="#252840" stroke-width="0.5" stroke-opacity="0.6"/>
  <text x="240" y="194" text-anchor="middle"
        font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="8" font-weight="700" fill="#3a4060" fill-opacity="0.85">Z</text>

  <!-- ─── Battery indicator: tiny bar at bottom edge ─── -->
  <rect x="228" y="232" width="24" height="4" rx="1.5" fill="#0a0b14" stroke="#2a2d3e" stroke-width="0.5"/>
  <!-- 3 battery segments -->
  <rect x="229" y="232.7" width="6" height="2.6" rx="0.5" fill="url(#battFull)"/>
  <rect x="236" y="232.7" width="6" height="2.6" rx="0.5" fill="url(#battFull)" fill-opacity="0.85"/>
  <rect x="243" y="232.7" width="6" height="2.6" rx="0.5" fill="#2a3050" fill-opacity="0.5"/>
  <!-- Battery nub -->
  <rect x="252" y="233.5" width="1.5" height="1" rx="0.5" fill="#2a2d3e"/>

  <!-- ─── Magnetic mounting ridge (back edge suggestion) ─── -->
  <rect x="210" y="228" width="60" height="1.5" rx="0.75" fill="#1a1e2e" fill-opacity="0.6"/>
  <rect x="215" y="229.5" width="50" height="0.5" rx="0.25" fill="#2a2e40" fill-opacity="0.4"/>

  <!-- Label below -->
  <text x="240" y="340" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="7.5" letter-spacing="2"
        fill="#1e2235" fill-opacity="0.85">ZAKEY SCENE BUTTON</text>
</svg>
