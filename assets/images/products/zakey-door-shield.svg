<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <defs>
    <radialGradient id="ds-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <pattern id="ds-hex" x="0" y="0" width="20" height="17.3" patternUnits="userSpaceOnUse">
      <polygon points="10,1 19,5.5 19,11.8 10,16.3 1,11.8 1,5.5" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <!-- Main sensor body -->
    <linearGradient id="ds-main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e3250"/>
      <stop offset="50%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#13151f"/>
    </linearGradient>
    <!-- Main body right side -->
    <linearGradient id="ds-main-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#181a28"/>
      <stop offset="100%" stop-color="#0d0e18"/>
    </linearGradient>
    <!-- Magnet piece -->
    <linearGradient id="ds-mag-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3e58"/>
      <stop offset="60%" stop-color="#2a2d3e"/>
      <stop offset="100%" stop-color="#1e2030"/>
    </linearGradient>
    <!-- Alert glow — red-amber -->
    <radialGradient id="ds-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4422" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ff6600" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ff4422" stop-opacity="0"/>
    </radialGradient>
    <!-- Gap red glow -->
    <radialGradient id="ds-gap-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2222" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff2222" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="ds-shadow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Top face -->
    <linearGradient id="ds-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e4262"/>
      <stop offset="100%" stop-color="#282a40"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#ds-bg)"/>
  <rect width="480" height="360" fill="url(#ds-hex)"/>

  <!-- Alert amber-red glow background -->
  <ellipse cx="240" cy="188" rx="145" ry="110" fill="url(#ds-glow)"/>

  <!-- Drop shadow -->
  <ellipse cx="245" cy="316" rx="105" ry="12" fill="url(#ds-shadow)"/>

  <!-- === MAIN SENSOR BODY === -->
  <!-- 3D perspective: front + right side + top -->
  <!-- Right side -->
  <polygon points="195,120 207,114 207,278 195,284" fill="url(#ds-main-side)"/>
  <!-- Top face -->
  <polygon points="170,120 195,120 207,114 182,114" fill="url(#ds-top)"/>
  <!-- Front face -->
  <rect x="170" y="120" width="25" height="164" rx="7" fill="url(#ds-main-grad)"/>
  <!-- Front left highlight edge -->
  <rect x="170" y="120" width="4" height="164" rx="2" fill="#ffffff" opacity="0.08"/>
  <!-- Front top edge highlight -->
  <rect x="172" y="121" width="22" height="3" rx="1.5" fill="#ffffff" opacity="0.07"/>
  <!-- Front face border -->
  <rect x="170" y="120" width="25" height="164" rx="7" fill="none" stroke="#2a2e48" stroke-width="1.2"/>

  <!-- Zakey Z logo on main body -->
  <text x="182.5" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#404468" opacity="0.8">Z</text>

  <!-- Status LED — red (door open alert) -->
  <circle cx="182.5" cy="162" r="4.5" fill="#ff2244" opacity="0.95"/>
  <circle cx="182.5" cy="162" r="8" fill="#ff2244" opacity="0.28"/>
  <circle cx="182.5" cy="161" r="2" fill="#ffaabb" opacity="0.7"/>

  <!-- WiFi arc icon on main body -->
  <path d="M177,176 Q182.5,170 188,176" stroke="#404468" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M179,180 Q182.5,175 186,180" stroke="#404468" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <circle cx="182.5" cy="183.5" r="1.5" fill="#404468" opacity="0.7"/>

  <!-- === GAP with red glow === -->
  <!-- Gap glow -->
  <rect x="195" y="148" width="18" height="84" rx="2" fill="url(#ds-gap-glow)" opacity="0.6"/>
  <!-- Gap edge lines -->
  <line x1="196" y1="148" x2="196" y2="232" stroke="#ff2222" stroke-width="0.8" opacity="0.4"/>
  <line x1="212" y1="148" x2="212" y2="232" stroke="#ff2222" stroke-width="0.8" opacity="0.4"/>

  <!-- Magnetic field arc lines between pieces -->
  <path d="M196,165 Q204,158 212,165" stroke="#ff6644" stroke-width="0.8" fill="none" opacity="0.35" stroke-dasharray="3,2"/>
  <path d="M196,180 Q204,170 212,180" stroke="#ff6644" stroke-width="0.8" fill="none" opacity="0.28" stroke-dasharray="3,2"/>
  <path d="M196,196 Q204,184 212,196" stroke="#ff6644" stroke-width="0.8" fill="none" opacity="0.22" stroke-dasharray="3,2"/>

  <!-- === MAGNET PIECE === -->
  <!-- Right side (3D) -->
  <polygon points="285,145 298,139 298,246 285,252" fill="#141620"/>
  <!-- Top face -->
  <polygon points="213,145 285,145 298,139 226,139" fill="#343856"/>
  <!-- Front face -->
  <rect x="213" y="145" width="72" height="107" rx="6" fill="url(#ds-mag-grad)"/>
  <!-- Front left highlight -->
  <rect x="213" y="145" width="5" height="107" rx="2.5" fill="#ffffff" opacity="0.08"/>
  <!-- Front top highlight -->
  <rect x="215" y="146" width="68" height="3" rx="1.5" fill="#ffffff" opacity="0.07"/>
  <!-- Border -->
  <rect x="213" y="145" width="72" height="107" rx="6" fill="none" stroke="#2a2e46" stroke-width="1.2"/>
  <!-- Magnet ribbed side texture on top face -->
  <line x1="240" y1="139" x2="240" y2="145" stroke="#404468" stroke-width="0.8" opacity="0.3"/>
  <line x1="255" y1="139" x2="255" y2="145" stroke="#404468" stroke-width="0.8" opacity="0.3"/>
  <line x1="270" y1="139" x2="270" y2="145" stroke="#404468" stroke-width="0.8" opacity="0.3"/>

  <!-- Labels -->
  <text x="240" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" opacity="0.40" letter-spacing="1.5">DOOR SHIELD</text>
  <text x="240" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.40" letter-spacing="2.5">SMART DOOR SENSOR</text>
</svg>
