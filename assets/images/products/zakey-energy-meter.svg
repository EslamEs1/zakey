<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <defs>
    <radialGradient id="em-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <pattern id="em-hex" x="0" y="0" width="20" height="17.3" patternUnits="userSpaceOnUse">
      <polygon points="10,1 19,5.5 19,11.8 10,16.3 1,11.8 1,5.5" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <!-- Body gradient -->
    <linearGradient id="em-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e3250"/>
      <stop offset="45%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#131520"/>
    </linearGradient>
    <!-- Body right side -->
    <linearGradient id="em-side-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#181a28"/>
      <stop offset="100%" stop-color="#0d0e18"/>
    </linearGradient>
    <!-- Body top -->
    <linearGradient id="em-top-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3e58"/>
      <stop offset="100%" stop-color="#262840"/>
    </linearGradient>
    <!-- Display screen -->
    <linearGradient id="em-screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#061018"/>
      <stop offset="100%" stop-color="#030a10"/>
    </linearGradient>
    <!-- Terminal screw -->
    <radialGradient id="em-screw-grad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#606060"/>
      <stop offset="100%" stop-color="#303030"/>
    </radialGradient>
    <!-- Cyan glow -->
    <radialGradient id="em-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="0.20"/>
      <stop offset="65%" stop-color="#00cfff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00cfff" stop-opacity="0"/>
    </radialGradient>
    <!-- Screen glow -->
    <radialGradient id="em-screen-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00cfff" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="em-shadow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- DIN clip -->
    <linearGradient id="em-clip-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#303448"/>
      <stop offset="100%" stop-color="#1a1c28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#em-bg)"/>
  <rect width="480" height="360" fill="url(#em-hex)"/>

  <!-- Cyan glow behind meter -->
  <ellipse cx="240" cy="188" rx="110" ry="145" fill="url(#em-glow)"/>

  <!-- Drop shadow -->
  <ellipse cx="250" cy="316" rx="58" ry="11" fill="url(#em-shadow)"/>

  <!-- === ENERGY METER BODY === -->
  <!-- Right side depth (3D) -->
  <polygon points="270,70 284,64 284,282 270,288" fill="url(#em-side-grad)"/>
  <!-- Top face -->
  <polygon points="210,70 270,70 284,64 224,64" fill="url(#em-top-grad)"/>
  <!-- Main front face -->
  <rect x="210" y="70" width="60" height="212" rx="6" fill="url(#em-body-grad)"/>
  <!-- Front face edge highlight left -->
  <rect x="210" y="70" width="4" height="212" rx="2" fill="#ffffff" opacity="0.08"/>
  <!-- Front face top edge highlight -->
  <rect x="212" y="71" width="56" height="3" rx="1.5" fill="#ffffff" opacity="0.07"/>
  <!-- Front face border -->
  <rect x="210" y="70" width="60" height="212" rx="6" fill="none" stroke="#2a2e48" stroke-width="1.2"/>

  <!-- ZAKEY ENERGY brand label -->
  <text x="240" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#404468" opacity="0.8" letter-spacing="1">ZAKEY ENERGY</text>

  <!-- Terminal screws — top pair -->
  <rect x="218" y="100" width="10" height="10" rx="2" fill="#1e2030"/>
  <rect x="218" y="100" width="10" height="10" rx="2" fill="none" stroke="#404468" stroke-width="1"/>
  <circle cx="223" cy="105" r="3.5" fill="url(#em-screw-grad)"/>
  <line x1="220.5" y1="105" x2="225.5" y2="105" stroke="#181a28" stroke-width="1.2"/>
  <rect x="242" y="100" width="10" height="10" rx="2" fill="#1e2030"/>
  <rect x="242" y="100" width="10" height="10" rx="2" fill="none" stroke="#404468" stroke-width="1"/>
  <circle cx="247" cy="105" r="3.5" fill="url(#em-screw-grad)"/>
  <line x1="244.5" y1="105" x2="249.5" y2="105" stroke="#181a28" stroke-width="1.2"/>
  <!-- Wire entry slots at top edge -->
  <circle cx="221" cy="72" r="3" fill="#0a0c18"/>
  <circle cx="221" cy="72" r="3" fill="none" stroke="#2a2e48" stroke-width="0.8"/>
  <circle cx="240" cy="72" r="3" fill="#0a0c18"/>
  <circle cx="240" cy="72" r="3" fill="none" stroke="#2a2e48" stroke-width="0.8"/>
  <circle cx="259" cy="72" r="3" fill="#0a0c18"/>
  <circle cx="259" cy="72" r="3" fill="none" stroke="#2a2e48" stroke-width="0.8"/>

  <!-- Display area background glow -->
  <rect x="216" y="118" width="48" height="60" rx="4" fill="url(#em-screen-glow)"/>

  <!-- Display screen -->
  <rect x="218" y="120" width="44" height="56" rx="3" fill="url(#em-screen-grad)"/>
  <rect x="218" y="120" width="44" height="56" rx="3" fill="none" stroke="#00aacc" stroke-width="0.8" opacity="0.5"/>
  <!-- Screen inner glow -->
  <rect x="219" y="121" width="42" height="10" rx="2" fill="#00cfff" opacity="0.05"/>

  <!-- Display content: "2.4 kW" -->
  <!-- Large number segments simulated with rectangles -->
  <!-- "2" -->
  <rect x="222" y="128" width="12" height="2" rx="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="232" y="128" width="2" height="7" rx="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="222" y="134" width="12" height="2" rx="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="222" y="136" width="2" height="7" rx="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="222" y="142" width="12" height="2" rx="1" fill="#00e5ff" opacity="0.9"/>
  <!-- "." dot -->
  <rect x="237" y="142" width="2" height="2" rx="0.5" fill="#00e5ff" opacity="0.9"/>
  <!-- "4" -->
  <rect x="241" y="128" width="2" height="7" rx="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="241" y="134" width="8" height="2" rx="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="247" y="128" width="2" height="16" rx="1" fill="#00e5ff" opacity="0.9"/>
  <!-- "kW" label -->
  <text x="240" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00e5ff" opacity="0.75">kW</text>

  <!-- "487 kWh" smaller text area -->
  <text x="240" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#00aacc" opacity="0.70">487 kWh</text>

  <!-- Bar chart: 3 bars in cyan -->
  <rect x="224" y="166" width="6" height="6" rx="1" fill="#00cfff" opacity="0.80"/>
  <rect x="232" y="162" width="6" height="10" rx="1" fill="#00cfff" opacity="0.85"/>
  <rect x="240" y="159" width="6" height="13" rx="1" fill="#00cfff" opacity="0.90"/>

  <!-- Status LEDs: green, green, amber -->
  <circle cx="222" cy="188" r="3.5" fill="#22ff88" opacity="0.9"/>
  <circle cx="222" cy="188" r="6" fill="#22ff88" opacity="0.20"/>
  <circle cx="234" cy="188" r="3.5" fill="#22ff88" opacity="0.9"/>
  <circle cx="234" cy="188" r="6" fill="#22ff88" opacity="0.20"/>
  <circle cx="246" cy="188" r="3.5" fill="#ffaa22" opacity="0.9"/>
  <circle cx="246" cy="188" r="6" fill="#ffaa22" opacity="0.20"/>
  <circle cx="258" cy="188" r="3.5" fill="#22ff88" opacity="0.75"/>

  <!-- Terminal screws — bottom pair -->
  <rect x="218" y="242" width="10" height="10" rx="2" fill="#1e2030"/>
  <rect x="218" y="242" width="10" height="10" rx="2" fill="none" stroke="#404468" stroke-width="1"/>
  <circle cx="223" cy="247" r="3.5" fill="url(#em-screw-grad)"/>
  <line x1="220.5" y1="247" x2="225.5" y2="247" stroke="#181a28" stroke-width="1.2"/>
  <rect x="242" y="242" width="10" height="10" rx="2" fill="#1e2030"/>
  <rect x="242" y="242" width="10" height="10" rx="2" fill="none" stroke="#404468" stroke-width="1"/>
  <circle cx="247" cy="247" r="3.5" fill="url(#em-screw-grad)"/>
  <line x1="244.5" y1="247" x2="249.5" y2="247" stroke="#181a28" stroke-width="1.2"/>

  <!-- DIN rail clip at bottom -->
  <rect x="208" y="272" width="64" height="10" rx="3" fill="url(#em-clip-grad)"/>
  <rect x="208" y="272" width="64" height="10" rx="3" fill="none" stroke="#2a2e48" stroke-width="1"/>
  <rect x="218" y="278" width="44" height="4" rx="2" fill="#14162a"/>
  <rect x="218" y="278" width="44" height="4" rx="2" fill="none" stroke="#2a2e48" stroke-width="0.8"/>
  <!-- DIN rail clip hooks -->
  <path d="M210,282 L206,282 L206,290 L210,290" stroke="#404468" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M270,282 L274,282 L274,290 L270,290" stroke="#404468" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Product label -->
  <text x="240" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.40" letter-spacing="2.5">SMART ENERGY METER</text>
</svg>
