<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <defs>
    <!-- Background: deep navy radial -->
    <radialGradient id="bgG" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <!-- Fine grid texture -->
    <pattern id="gridPat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20,0 L0,0 0,20" fill="none" stroke="#6080c0" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <!-- Hub body front face -->
    <linearGradient id="hubFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2235"/>
      <stop offset="100%" stop-color="#171928"/>
    </linearGradient>
    <!-- Hub top face (lighter) -->
    <linearGradient id="hubTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#252840"/>
      <stop offset="100%" stop-color="#1d2035"/>
    </linearGradient>
    <!-- Hub right side (darker) -->
    <linearGradient id="hubRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111322"/>
      <stop offset="100%" stop-color="#0d0f1c"/>
    </linearGradient>
    <!-- Cyan glow behind hub -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Status ring gradient -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <radialGradient id="shadowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#bgG)"/>
  <rect width="480" height="360" fill="url(#gridPat)"/>

  <!-- Product glow behind hub -->
  <ellipse cx="220" cy="175" rx="120" ry="100" fill="url(#hubGlow)"/>

  <!-- Drop shadow -->
  <ellipse cx="220" cy="292" rx="80" ry="12" fill="url(#shadowG)" opacity="0.55"/>

  <!-- === 3D HUB BODY === -->
  <!-- Right side face (darker, angled) -->
  <polygon points="285,112 320,128 320,258 285,242" fill="url(#hubRight)"/>
  <!-- Right side top edge highlight -->
  <line x1="285" y1="112" x2="320" y2="128" stroke="#222538" stroke-width="1"/>

  <!-- Top face (lighter) -->
  <polygon points="155,98 285,112 320,128 190,114" fill="url(#hubTop)"/>
  <!-- Top face vent holes grid (6x6 small circles) -->
  <g fill="#181a2e" opacity="0.85">
    <circle cx="195" cy="102" r="2"/><circle cx="207" cy="102" r="2"/><circle cx="219" cy="102" r="2"/>
    <circle cx="231" cy="102" r="2"/><circle cx="243" cy="102" r="2"/><circle cx="255" cy="102" r="2"/>
    <circle cx="198" cy="111" r="2"/><circle cx="210" cy="111" r="2"/><circle cx="222" cy="111" r="2"/>
    <circle cx="234" cy="111" r="2"/><circle cx="246" cy="111" r="2"/><circle cx="258" cy="111" r="2"/>
    <circle cx="201" cy="120" r="2"/><circle cx="213" cy="120" r="2"/><circle cx="225" cy="120" r="2"/>
    <circle cx="237" cy="120" r="2"/><circle cx="249" cy="120" r="2"/><circle cx="261" cy="120" r="2"/>
  </g>
  <!-- Top face edge highlight -->
  <line x1="155" y1="98" x2="285" y2="112" stroke="#303558" stroke-width="1.5" opacity="0.8"/>
  <line x1="155" y1="98" x2="190" y2="114" stroke="#303558" stroke-width="1" opacity="0.5"/>

  <!-- Front face (main) -->
  <rect x="155" y="112" width="130" height="130" rx="6" fill="url(#hubFront)"/>
  <!-- Front face left+top edge highlight (lit side) -->
  <rect x="155" y="112" width="2.5" height="130" rx="1" fill="#404568" opacity="0.9"/>
  <rect x="155" y="112" width="130" height="2.5" rx="1" fill="#383c60" opacity="0.8"/>

  <!-- Mesh vent on front face (bottom-right area) -->
  <g opacity="0.25" fill="#9090b0">
    <circle cx="250" cy="200" r="1.5"/><circle cx="258" cy="200" r="1.5"/>
    <circle cx="250" cy="208" r="1.5"/><circle cx="258" cy="208" r="1.5"/>
    <circle cx="250" cy="216" r="1.5"/><circle cx="258" cy="216" r="1.5"/>
    <circle cx="266" cy="200" r="1.5"/><circle cx="266" cy="208" r="1.5"/><circle cx="266" cy="216" r="1.5"/>
    <circle cx="274" cy="200" r="1.5"/><circle cx="274" cy="208" r="1.5"/><circle cx="274" cy="216" r="1.5"/>
  </g>

  <!-- Status ring (pulsing glow look) around Z logo -->
  <circle cx="207" cy="165" r="30" fill="url(#ringGlow)" opacity="0.35"/>
  <circle cx="207" cy="165" r="26" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="207" cy="165" r="22" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.2"/>

  <!-- Zakey Z logo on front face -->
  <g transform="translate(196,153)" filter="url(#glow)">
    <polygon points="0,0 22,0 22,5 6,19 22,19 22,24 0,24 0,19 16,5 0,5" fill="#00e5ff" opacity="0.95"/>
  </g>

  <!-- Port indicators on bottom edge of front face -->
  <!-- Ethernet port -->
  <rect x="167" y="232" width="18" height="12" rx="2" fill="#0d0f1c" stroke="#303558" stroke-width="1"/>
  <g stroke="#404870" stroke-width="0.8" fill="none">
    <line x1="170" y1="235" x2="170" y2="241"/>
    <line x1="173" y1="235" x2="173" y2="241"/>
    <line x1="176" y1="235" x2="176" y2="241"/>
    <line x1="179" y1="235" x2="179" y2="241"/>
    <line x1="182" y1="235" x2="182" y2="241"/>
  </g>
  <!-- USB port -->
  <rect x="192" y="233" width="12" height="10" rx="1.5" fill="#0d0f1c" stroke="#303558" stroke-width="1"/>
  <rect x="194" y="235" width="8" height="6" rx="1" fill="#181a2e" opacity="0.8"/>
  <!-- Power LED -->
  <circle cx="222" cy="237" r="4" fill="#00ff66" opacity="0.85" filter="url(#softGlow)"/>
  <circle cx="222" cy="237" r="2" fill="#00ff99" opacity="0.9"/>

  <!-- Antenna: thin vertical line top-right corner of front face -->
  <rect x="282" y="70" width="2.5" height="44" rx="1" fill="#2a2e4a"/>
  <circle cx="283" cy="69" r="3" fill="#1e2238"/>
  <rect x="281" y="112" width="4" height="6" rx="1" fill="#242740"/>

  <!-- Floor reflection -->
  <rect x="155" y="242" width="130" height="50" rx="6" fill="url(#hubFront)" opacity="0.1" transform="scale(1,-1) translate(0,-484)"/>

  <!-- Product name label -->
  <text x="240" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10"
        fill="white" opacity="0.5" letter-spacing="2">CORE HUB</text>
</svg>
