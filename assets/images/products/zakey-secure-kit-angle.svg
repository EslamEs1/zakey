<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <title>Zakey Secure Kit — Smart Door Lock Angled View</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f1c"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <radialGradient id="glow" cx="240" cy="190" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.09"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frontFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#222540"/>
      <stop offset="100%" stop-color="#1e2235"/>
    </linearGradient>
    <linearGradient id="sideFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#141626"/>
      <stop offset="100%" stop-color="#0e1020"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="480" height="360" fill="url(#bg)"/>
  <ellipse cx="240" cy="190" rx="200" ry="160" fill="url(#glow)"/>

  <!-- Door context - subtle vertical lines suggesting wood grain -->
  <rect x="155" y="40" width="200" height="300" rx="2" fill="#0a0b14" fill-opacity="0.4"/>
  <line x1="175" y1="40" x2="175" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="195" y1="40" x2="195" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="215" y1="40" x2="215" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="235" y1="40" x2="235" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="255" y1="40" x2="255" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="275" y1="40" x2="275" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="295" y1="40" x2="295" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="315" y1="40" x2="315" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="335" y1="40" x2="335" y2="340" stroke="#0d0f1c" stroke-width="1" stroke-opacity="0.4"/>

  <!-- === ANGLED LOCK: front face + side face visible === -->
  <!-- Side face (right side, darker) using polygon for perspective -->
  <polygon points="295,75 325,88 325,285 295,272" fill="url(#sideFace)" stroke="#1a1c2e" stroke-width="0.5" filter="url(#shadow)"/>
  <!-- Front face (left/main face) - skewed polygon -->
  <polygon points="205,68 295,68 295,272 205,272" fill="url(#frontFace)" stroke="#2a2d3e" stroke-width="0.5"/>
  <!-- Top face (thin top edge) -->
  <polygon points="205,68 295,68 325,81 235,81" fill="#252840" stroke="#2a2d3e" stroke-width="0.5"/>

  <!-- Front: status LED ring at top -->
  <circle cx="250" cy="96" r="9" fill="none" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.85"/>
  <circle cx="250" cy="96" r="4" fill="#22d3ee" fill-opacity="0.5"/>
  <circle cx="250" cy="96" r="13" fill="#22d3ee" fill-opacity="0.07"/>

  <!-- Front: ZAKEY text -->
  <text x="250" y="118" font-family="system-ui,sans-serif" font-size="8" fill="#8b92a9" text-anchor="middle" letter-spacing="0.1em">ZAKEY</text>

  <!-- Front: Keypad area inset -->
  <rect x="216" y="128" width="60" height="72" rx="4" fill="#161928"/>
  <!-- Keypad buttons 3x3 -->
  <circle cx="234" cy="144" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="250" cy="144" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="266" cy="144" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="234" cy="160" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="250" cy="160" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="266" cy="160" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="234" cy="176" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>
  <circle cx="250" cy="176" r="6" fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="266" cy="176" r="6" fill="#1e2235" stroke="#2a2d3e" stroke-width="0.5"/>

  <!-- Fingerprint sensor below keypad -->
  <ellipse cx="250" cy="218" rx="20" ry="14" fill="#141628" stroke="#2a2d3e" stroke-width="0.8"/>
  <!-- Fingerprint lines -->
  <path d="M242 218 Q250 211 258 218" fill="none" stroke="#22d3ee" stroke-width="0.7" stroke-opacity="0.45"/>
  <path d="M240 222 Q250 213 260 222" fill="none" stroke="#22d3ee" stroke-width="0.7" stroke-opacity="0.32"/>
  <path d="M242 225 Q250 218 258 225" fill="none" stroke="#22d3ee" stroke-width="0.7" stroke-opacity="0.22"/>

  <!-- Lock handle bar front -->
  <rect x="244" y="243" width="12" height="24" rx="3" fill="#2a2d3e"/>
  <rect x="244" y="243" width="12" height="6" rx="2" fill="#333650"/>

  <!-- Side face details: vent lines -->
  <line x1="300" y1="120" x2="322" y2="128" stroke="#0d1020" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="300" y1="130" x2="322" y2="138" stroke="#0d1020" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="300" y1="140" x2="322" y2="148" stroke="#0d1020" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="300" y1="150" x2="322" y2="158" stroke="#0d1020" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- Ground shadow -->
  <ellipse cx="255" cy="285" rx="80" ry="8" fill="#000" fill-opacity="0.4"/>

  <!-- Label -->
  <text x="240" y="318" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#22d3ee" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.08em">SECURE KIT — ANGLE</text>
</svg>
