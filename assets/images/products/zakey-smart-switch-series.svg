<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <title>Zakey Smart Switch Series — 1-Gang, 2-Gang, 3-Gang Lineup</title>
  <defs>
    <!-- Light warm background gradient -->
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0ece6"/>
      <stop offset="100%" stop-color="#e0dbd4"/>
    </linearGradient>
    <!-- Switch body gradient (dark graphite) -->
    <linearGradient id="ss-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e3142"/>
      <stop offset="50%" stop-color="#252835"/>
      <stop offset="100%" stop-color="#1e2030"/>
    </linearGradient>
    <!-- Touch area gradient (embossed look) -->
    <linearGradient id="ss-touch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#30344a"/>
      <stop offset="50%" stop-color="#282c3e"/>
      <stop offset="100%" stop-color="#1e2132"/>
    </linearGradient>
    <!-- Left edge highlight on switch body -->
    <linearGradient id="ss-edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#52597a"/>
      <stop offset="100%" stop-color="#2e3142"/>
    </linearGradient>
    <!-- Floor shadow under switches -->
    <radialGradient id="ss-shadow" cx="50%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#b0a898" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b0a898" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan LED glow -->
    <radialGradient id="ss-led-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Connecting arc gradient -->
    <linearGradient id="ss-arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Background grid pattern -->
    <pattern id="ss-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <line x1="30" y1="0" x2="30" y2="30" stroke="#c8c2bc" stroke-width="0.3" opacity="0.4"/>
      <line x1="0" y1="30" x2="30" y2="30" stroke="#c8c2bc" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background: light warm gradient -->
  <rect width="480" height="360" fill="url(#ss-bg)"/>
  <!-- Subtle grid overlay -->
  <rect width="480" height="360" fill="url(#ss-grid)" opacity="0.4"/>

  <!-- ══ 1-GANG SWITCH (left, centered at 155,175) ══ -->
  <!-- Shadow beneath -->
  <ellipse cx="155" cy="295" rx="40" ry="8" fill="url(#ss-shadow)"/>

  <!-- Body: 70×120, top-left at 120,115, rx=6 -->
  <rect x="120" y="115" width="70" height="120" rx="6" ry="6" fill="url(#ss-body)"/>
  <!-- Left edge highlight -->
  <rect x="120" y="115" width="3" height="120" rx="2" ry="2" fill="url(#ss-edge)"/>
  <!-- Top edge highlight -->
  <rect x="122" y="115" width="66" height="2" rx="1" fill="#404866" opacity="0.5"/>
  <!-- Bottom shadow strip -->
  <rect x="122" y="231" width="66" height="3" rx="1.5" fill="#0e1018" opacity="0.4"/>

  <!-- Touch area: 56×90 centered inside body → left at 127, top at 125 -->
  <rect x="127" y="125" width="56" height="90" rx="4" ry="4" fill="url(#ss-touch)"/>
  <!-- Touch area subtle border -->
  <rect x="127" y="125" width="56" height="90" rx="4" ry="4" fill="none" stroke="#38405a" stroke-width="0.8"/>
  <!-- Embossed center highlight on touch area -->
  <rect x="132" y="130" width="46" height="20" rx="3" fill="#34394e" opacity="0.3"/>

  <!-- Zakey "Z" brand in cyan, top-center of touch area -->
  <text x="155" y="143" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#22d3ee" opacity="0.85" letter-spacing="0">Z</text>

  <!-- Status LED: 3px circle, glowing cyan, bottom-center of touch area -->
  <circle cx="155" cy="207" r="7" fill="#22d3ee" opacity="0.1"/>
  <circle cx="155" cy="207" r="3.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="155" cy="207" r="1.8" fill="#22d3ee"/>

  <!-- Label "1-GANG" below body -->
  <text x="155" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8" letter-spacing="2">1-GANG</text>

  <!-- ══ 2-GANG SWITCH (center, at 240,175) ══ -->
  <!-- Shadow beneath -->
  <ellipse cx="240" cy="295" rx="55" ry="8" fill="url(#ss-shadow)"/>

  <!-- Body: 100×120, top-left at 190,115, rx=6 -->
  <rect x="190" y="115" width="100" height="120" rx="6" ry="6" fill="url(#ss-body)"/>
  <!-- Left edge highlight -->
  <rect x="190" y="115" width="3" height="120" rx="2" ry="2" fill="url(#ss-edge)"/>
  <!-- Top edge highlight -->
  <rect x="192" y="115" width="96" height="2" rx="1" fill="#404866" opacity="0.5"/>
  <!-- Bottom shadow -->
  <rect x="192" y="231" width="96" height="3" rx="1.5" fill="#0e1018" opacity="0.4"/>

  <!-- Touch area LEFT: 42×90 at (195,125) -->
  <rect x="195" y="125" width="42" height="90" rx="4" ry="4" fill="url(#ss-touch)"/>
  <rect x="195" y="125" width="42" height="90" rx="4" ry="4" fill="none" stroke="#38405a" stroke-width="0.8"/>
  <!-- Sun icon in cyan on left zone, centered at 216,160 -->
  <circle cx="216" cy="160" r="7" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.55"/>
  <line x1="216" y1="149" x2="216" y2="147" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="216" y1="171" x2="216" y2="173" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="205" y1="160" x2="203" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="227" y1="160" x2="229" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="208.1" y1="153.1" x2="206.7" y2="151.7" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="223.9" y1="166.9" x2="225.3" y2="168.3" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="223.9" y1="153.1" x2="225.3" y2="151.7" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="208.1" y1="166.9" x2="206.7" y2="168.3" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <!-- LED left zone -->
  <circle cx="216" cy="207" r="6" fill="#22d3ee" opacity="0.1"/>
  <circle cx="216" cy="207" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="216" cy="207" r="1.5" fill="#22d3ee"/>

  <!-- Separator gap 4px between the two touch areas -->
  <!-- Touch area RIGHT: 42×90 at (243,125) -->
  <rect x="243" y="125" width="42" height="90" rx="4" ry="4" fill="url(#ss-touch)"/>
  <rect x="243" y="125" width="42" height="90" rx="4" ry="4" fill="none" stroke="#38405a" stroke-width="0.8"/>
  <!-- Wind swirl icon in cyan at 264,160 -->
  <path d="M258,155 Q264,150 270,155 Q276,160 270,165 Q267,167 264,165" fill="none" stroke="#22d3ee" stroke-width="1.3" opacity="0.55"/>
  <path d="M260,165 Q264,162 268,165" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <!-- LED right zone -->
  <circle cx="264" cy="207" r="6" fill="#22d3ee" opacity="0.1"/>
  <circle cx="264" cy="207" r="3" fill="#22d3ee" opacity="0.45"/>
  <circle cx="264" cy="207" r="1.5" fill="#22d3ee"/>

  <!-- Label "2-GANG" -->
  <text x="240" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8" letter-spacing="2">2-GANG</text>

  <!-- ══ 3-GANG SWITCH (right, at 330,175) ══ -->
  <!-- Shadow beneath -->
  <ellipse cx="330" cy="295" rx="70" ry="8" fill="url(#ss-shadow)"/>

  <!-- Body: 130×120, top-left at 265,115, rx=6 -->
  <rect x="265" y="115" width="130" height="120" rx="6" ry="6" fill="url(#ss-body)"/>
  <!-- Left edge highlight -->
  <rect x="265" y="115" width="3" height="120" rx="2" ry="2" fill="url(#ss-edge)"/>
  <!-- Top edge highlight -->
  <rect x="267" y="115" width="126" height="2" rx="1" fill="#404866" opacity="0.5"/>
  <!-- Bottom shadow -->
  <rect x="267" y="231" width="126" height="3" rx="1.5" fill="#0e1018" opacity="0.4"/>

  <!-- Touch area 1 of 3: 36×90 at (270,125) — Sun icon -->
  <rect x="270" y="125" width="36" height="90" rx="4" ry="4" fill="url(#ss-touch)"/>
  <rect x="270" y="125" width="36" height="90" rx="4" ry="4" fill="none" stroke="#38405a" stroke-width="0.8"/>
  <!-- Sun icon at 288,160 -->
  <circle cx="288" cy="160" r="6" fill="none" stroke="#22d3ee" stroke-width="1.1" opacity="0.55"/>
  <line x1="288" y1="150" x2="288" y2="148" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="288" y1="170" x2="288" y2="172" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="278" y1="160" x2="276" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <line x1="298" y1="160" x2="300" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <!-- LED zone 1 -->
  <circle cx="288" cy="207" r="5" fill="#22d3ee" opacity="0.1"/>
  <circle cx="288" cy="207" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="288" cy="207" r="1.2" fill="#22d3ee"/>

  <!-- Touch area 2 of 3: 36×90 at (309,125) — Wind icon -->
  <rect x="309" y="125" width="36" height="90" rx="4" ry="4" fill="url(#ss-touch)"/>
  <rect x="309" y="125" width="36" height="90" rx="4" ry="4" fill="none" stroke="#38405a" stroke-width="0.8"/>
  <!-- Wind icon at 327,160 -->
  <path d="M321,156 Q327,152 333,156 Q339,160 333,164 Q330,166 327,164" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.55"/>
  <path d="M323,164 Q327,161 331,164" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.55"/>
  <!-- LED zone 2 -->
  <circle cx="327" cy="207" r="5" fill="#22d3ee" opacity="0.1"/>
  <circle cx="327" cy="207" r="2.5" fill="#22d3ee" opacity="0.45"/>
  <circle cx="327" cy="207" r="1.2" fill="#22d3ee"/>

  <!-- Touch area 3 of 3: 36×90 at (348,125) — Shield icon -->
  <rect x="348" y="125" width="36" height="90" rx="4" ry="4" fill="url(#ss-touch)"/>
  <rect x="348" y="125" width="36" height="90" rx="4" ry="4" fill="none" stroke="#38405a" stroke-width="0.8"/>
  <!-- Shield icon at 366,160 -->
  <path d="M366,151 L374,155 L374,163 Q374,170 366,173 Q358,170 358,163 L358,155 Z" fill="none" stroke="#22d3ee" stroke-width="1.1" opacity="0.55"/>
  <!-- LED zone 3 -->
  <circle cx="366" cy="207" r="5" fill="#22d3ee" opacity="0.1"/>
  <circle cx="366" cy="207" r="2.5" fill="#22d3ee" opacity="0.45"/>
  <circle cx="366" cy="207" r="1.2" fill="#22d3ee"/>

  <!-- Label "3-GANG" -->
  <text x="330" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8" letter-spacing="2">3-GANG</text>

  <!-- ══ Connecting dotted arc above all three ══ -->
  <!-- Arc from 120,115 through 240,80 to 395,115 -->
  <path d="M125,110 Q240,70 390,110" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,5" opacity="0.3"/>
  <!-- Endpoint dots -->
  <circle cx="125" cy="110" r="3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="240" cy="72" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="390" cy="110" r="3" fill="#22d3ee" opacity="0.4"/>
  <!-- Midpoint dots on arc -->
  <circle cx="175" cy="83" r="2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="310" cy="83" r="2" fill="#22d3ee" opacity="0.3"/>

  <!-- Product line label -->
  <text x="240" y="330" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280" letter-spacing="3" opacity="0.6">ZAKEY SMART SWITCH SERIES</text>
</svg>
