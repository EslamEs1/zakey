<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <title>Zakey Climate Hub — Display Detail</title>
  <defs>
    <radialGradient id="chd-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f1428"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="chd-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="360" fill="url(#chd-bg)"/>
  <rect width="480" height="360" fill="url(#chd-glow)"/>
  <!-- Display face -->
  <rect x="80" y="30" width="320" height="300" rx="16" fill="#0d0f1c" stroke="#1e2540" stroke-width="1.5"/>
  <!-- Large temp -->
  <text x="240" y="120" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="#ffffff" text-anchor="middle">22°</text>
  <text x="240" y="155" font-family="system-ui,sans-serif" font-size="20" fill="#8b92a9" text-anchor="middle">Celsius</text>
  <!-- Mode label -->
  <text x="240" y="182" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" letter-spacing="2">COOLING MODE</text>
  <!-- Sparkline / temperature graph -->
  <text x="96" y="210" font-family="system-ui,sans-serif" font-size="8" fill="#8b92a9">Temp. Today</text>
  <polyline points="96,240 128,234 160,228 192,232 224,222 256,218 288,220 320,216 352,210 384,212"
    fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <line x1="96" y1="245" x2="384" y2="245" stroke="#1e2540" stroke-width="1"/>
  <!-- Mode selector cards -->
  <rect x="96" y="258" width="60" height="52" rx="6" fill="#101425" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="126" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#22d3ee" text-anchor="middle">COOL</text>
  <text x="126" y="293" font-family="system-ui,sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">&#10052;</text>
  <rect x="170" y="258" width="60" height="52" rx="6" fill="#101425" stroke="#22283a" stroke-width="1"/>
  <text x="200" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#8b92a9" text-anchor="middle">HEAT</text>
  <text x="200" y="293" font-family="system-ui,sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">&#9788;</text>
  <rect x="244" y="258" width="60" height="52" rx="6" fill="#101425" stroke="#22283a" stroke-width="1"/>
  <text x="274" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#8b92a9" text-anchor="middle">FAN</text>
  <text x="274" y="293" font-family="system-ui,sans-serif" font-size="14" fill="#8b92a9" text-anchor="middle">&#9654;</text>
  <rect x="318" y="258" width="60" height="52" rx="6" fill="#101425" stroke="#22283a" stroke-width="1"/>
  <text x="348" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#8b92a9" text-anchor="middle">ECO</text>
  <text x="348" y="293" font-family="system-ui,sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">&#9835;</text>
  <!-- Humidity + set point -->
  <text x="150" y="198" font-family="system-ui,sans-serif" font-size="9" fill="#8b92a9" text-anchor="middle">Humidity</text>
  <text x="150" y="210" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">58%</text>
  <text x="330" y="198" font-family="system-ui,sans-serif" font-size="9" fill="#8b92a9" text-anchor="middle">Set Point</text>
  <text x="330" y="210" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle">20°C</text>
</svg>
