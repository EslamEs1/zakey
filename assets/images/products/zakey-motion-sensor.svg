<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <defs>
    <radialGradient id="ms-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <pattern id="ms-hex" x="0" y="0" width="20" height="17.3" patternUnits="userSpaceOnUse">
      <polygon points="10,1 19,5.5 19,11.8 10,16.3 1,11.8 1,5.5" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>
    <!-- Disc face gradient (angled view) -->
    <radialGradient id="ms-face-grad" cx="40%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#2e3248"/>
      <stop offset="65%" stop-color="#1e2035"/>
      <stop offset="100%" stop-color="#131528"/>
    </radialGradient>
    <!-- Disc side/rim -->
    <linearGradient id="ms-rim-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e46"/>
      <stop offset="50%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#131520"/>
    </linearGradient>
    <!-- Fresnel dome -->
    <radialGradient id="ms-fresnel-grad" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#252840"/>
      <stop offset="100%" stop-color="#161828"/>
    </radialGradient>
    <!-- Amber glow -->
    <radialGradient id="ms-glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#ffaa22" stop-opacity="0.16"/>
      <stop offset="65%" stop-color="#ff8800" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <!-- Detection cone fill -->
    <radialGradient id="ms-cone-fill" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#00e5cc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5cc" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="ms-shadow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom rim ellipse -->
    <linearGradient id="ms-bottom-rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2035"/>
      <stop offset="100%" stop-color="#0d0e18"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#ms-bg)"/>
  <rect width="480" height="360" fill="url(#ms-hex)"/>

  <!-- Amber glow behind sensor -->
  <ellipse cx="240" cy="185" rx="130" ry="120" fill="url(#ms-glow)"/>

  <!-- Detection cone below sensor (faint teal fan) -->
  <path d="M240,250 L138,330 L342,330 Z" fill="url(#ms-cone-fill)"/>
  <path d="M240,250 L138,330" stroke="#00e5cc" stroke-width="0.8" stroke-dasharray="5,4" fill="none" opacity="0.18"/>
  <path d="M240,250 L342,330" stroke="#00e5cc" stroke-width="0.8" stroke-dasharray="5,4" fill="none" opacity="0.18"/>
  <line x1="138" y1="330" x2="342" y2="330" stroke="#00e5cc" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.12"/>

  <!-- Drop shadow -->
  <ellipse cx="240" cy="308" rx="72" ry="12" fill="url(#ms-shadow)"/>

  <!-- === DISC SENSOR — shown at angle (see face + rim side) === -->
  <!-- Side rim (bottom visible rim) — thick rim ellipse -->
  <ellipse cx="240" cy="225" rx="100" ry="28" fill="url(#ms-rim-grad)"/>
  <!-- Side rim shadow bottom -->
  <ellipse cx="240" cy="235" rx="100" ry="18" fill="#0a0c16" opacity="0.55"/>
  <!-- Rim highlight top edge -->
  <ellipse cx="240" cy="225" rx="100" ry="28" fill="none" stroke="#2e3250" stroke-width="1.5"/>

  <!-- Main face circle (angled — ellipse) -->
  <ellipse cx="240" cy="182" rx="100" ry="46" fill="url(#ms-face-grad)"/>
  <!-- Face border -->
  <ellipse cx="240" cy="182" rx="100" ry="46" fill="none" stroke="#2a2e48" stroke-width="1.5"/>
  <!-- Face top highlight arc -->
  <path d="M165,170 Q215,148 285,158" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.12" stroke-linecap="round"/>

  <!-- Fresnel lens dome (slightly raised dome on face) -->
  <ellipse cx="240" cy="180" rx="78" ry="36" fill="url(#ms-fresnel-grad)"/>
  <ellipse cx="240" cy="180" rx="78" ry="36" fill="none" stroke="#202238" stroke-width="1"/>

  <!-- Fresnel concentric ring texture (simulating fresnel optic pattern) -->
  <ellipse cx="240" cy="180" rx="70" ry="32" fill="none" stroke="#2a2e44" stroke-width="1" opacity="0.6"/>
  <ellipse cx="240" cy="180" rx="62" ry="28" fill="none" stroke="#282c42" stroke-width="0.8" opacity="0.55"/>
  <ellipse cx="240" cy="180" rx="53" ry="24" fill="none" stroke="#262a40" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="240" cy="180" rx="44" ry="20" fill="none" stroke="#24283e" stroke-width="0.8" opacity="0.45"/>
  <ellipse cx="240" cy="180" rx="35" ry="16" fill="none" stroke="#22263c" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="240" cy="180" rx="26" ry="12" fill="none" stroke="#20243a" stroke-width="0.7" opacity="0.35"/>
  <ellipse cx="240" cy="180" rx="18" ry="8" fill="none" stroke="#1e2238" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="240" cy="180" rx="10" ry="5" fill="none" stroke="#1c2036" stroke-width="0.6" opacity="0.25"/>
  <!-- Irregular-ish irregularity lines for fresnel realism -->
  <path d="M173,175 Q195,162 240,159 Q285,156 307,175" stroke="#222640" stroke-width="0.7" fill="none" opacity="0.3"/>
  <path d="M168,182 Q200,167 240,165 Q280,163 312,182" stroke="#222640" stroke-width="0.6" fill="none" opacity="0.25"/>
  <!-- Gloss on fresnel dome -->
  <ellipse cx="220" cy="170" rx="28" ry="10" fill="#ffffff" opacity="0.05"/>

  <!-- LED indicator on rim side — amber -->
  <circle cx="316" cy="222" r="4.5" fill="#ffaa22" opacity="0.92"/>
  <circle cx="316" cy="222" r="8" fill="#ffaa22" opacity="0.25"/>
  <circle cx="316" cy="221" r="2" fill="#ffdd88" opacity="0.7"/>

  <!-- PIR 12M label on edge -->
  <text x="175" y="232" font-family="Arial, sans-serif" font-size="7.5" fill="#404468" opacity="0.7">PIR 12M</text>

  <!-- Mounting hole at bottom of rim -->
  <ellipse cx="240" cy="252" rx="6" ry="3" fill="#0a0c16"/>
  <ellipse cx="240" cy="252" rx="6" ry="3" fill="none" stroke="#2a2e48" stroke-width="0.8"/>

  <!-- Product label -->
  <text x="240" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.40" letter-spacing="2.5">PIR MOTION SENSOR</text>
</svg>
