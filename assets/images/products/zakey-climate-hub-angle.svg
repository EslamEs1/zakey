<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360">
  <title>Zakey Climate Hub — Angle View</title>
  <defs>
    <radialGradient id="cha-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#141830"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="cha-glow" cx="55%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="cha-shadow">
      <feDropShadow dx="4" dy="0" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="480" height="360" fill="url(#cha-bg)"/>
  <ellipse cx="260" cy="180" rx="200" ry="170" fill="url(#cha-glow)"/>
  <!-- 3D depth band (right edge) -->
  <ellipse cx="328" cy="180" rx="6" ry="78" fill="#1a1e30"/>
  <!-- Outer ring ellipse for angle -->
  <ellipse cx="240" cy="180" rx="88" ry="78" fill="none" stroke="#22283a" stroke-width="1"/>
  <!-- Arc indicator angled -->
  <path d="M158 240 A 92 82 0 1 1 322 240" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Tick marks angled -->
  <g stroke="#8b92a9" stroke-width="1" stroke-linecap="round">
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-120 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-105 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-90 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-75 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-60 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-45 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-30 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(-15 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(120 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(105 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(90 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(75 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(60 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(45 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(30 240 180)"/>
    <line x1="240" y1="98" x2="240" y2="106" transform="rotate(15 240 180)"/>
  </g>
  <!-- Body ellipse (perspective) -->
  <ellipse cx="240" cy="180" rx="85" ry="78" fill="#161828"/>
  <!-- Inner display ellipse -->
  <ellipse cx="240" cy="180" rx="60" ry="55" fill="#0d0f1c"/>
  <!-- Temperature -->
  <text x="240" y="173" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">22°C</text>
  <text x="240" y="192" font-family="system-ui,sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle" letter-spacing="1">Cooling</text>
  <text x="240" y="208" font-family="system-ui,sans-serif" font-size="9" fill="#8b92a9" text-anchor="middle">58% RH</text>
  <!-- Right depth edge highlight -->
  <line x1="325" y1="103" x2="325" y2="257" stroke="#2a3050" stroke-width="1"/>
</svg>
